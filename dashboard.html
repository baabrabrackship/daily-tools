<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Control — SPCA</title>
<style>
:root{
  --bg:#f5f5f0;--surface:#ffffff;--surface2:#f0efea;--border:#e2e1db;--border2:#cccbc4;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9d99;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --green:#1D9E75;--red:#E24B4A;
  --radius:10px;--radius-sm:6px;
  --fs:15px;--fs-sm:13px;--fs-xs:11px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;--border2:#4e4e4a;
    --text:#e8e7e2;--text2:#9e9d99;--text3:#6b6b67;
    --purple-light:#2a2660;--purple-dark:#AFA9EC;
    --teal-light:#0a2e26;--amber-light:#2e1e06;--blue-light:#0a1e36;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs);min-height:100vh;padding:20px 16px 40px}
.app{max-width:560px;margin:0 auto}

.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:10px}
.day-name{font-size:26px;font-weight:600;color:var(--text);line-height:1.1}
.day-date{font-size:var(--fs-sm);color:var(--text2);margin-top:3px}
.top-right{display:flex;align-items:center;gap:10px}
.font-ctrl{display:flex;align-items:center;gap:3px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px}
.fbtn{width:28px;height:28px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.fbtn:hover,.fbtn.active{background:var(--surface);color:var(--text)}
.score-box{text-align:right}
.score-n{font-size:26px;font-weight:600;color:var(--purple);line-height:1}
.score-l{font-size:var(--fs-xs);color:var(--text3)}

.sync-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px;height:18px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.synced{background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.offline{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:var(--fs-xs);color:var(--text3)}

.pips{display:flex;gap:5px;margin-bottom:22px}
.pip{flex:1;height:5px;border-radius:3px;background:var(--border);transition:background .3s}
.pip.done{background:var(--purple)}

.sec{margin-bottom:22px}
.sec-label{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:10px}

.must-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0;padding:4px 12px 4px 14px;margin-bottom:10px}
.win-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.win-item:last-child{border-bottom:none}
.cb{width:24px;height:24px;min-width:24px;border-radius:6px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;background:transparent}
.cb.done{background:var(--purple);border-color:var(--purple)}
.cb.done svg{display:block}
.cb svg{display:none;width:12px;height:12px}
.task-text{font-size:var(--fs);color:var(--text);flex:1;min-width:0;word-break:break-word;line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.tag{font-size:var(--fs-xs);padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.t-ops{background:var(--blue-light);color:var(--blue)}
.t-rep{background:var(--purple-light);color:var(--purple)}
.t-comms{background:var(--teal-light);color:var(--teal)}
.t-strat{background:var(--amber-light);color:var(--amber)}
.empty-msg{font-size:var(--fs-sm);color:var(--text3);font-style:italic;padding:10px 0}

.add-row{display:flex;gap:7px;align-items:stretch}
.add-row input,.add-row select{font-size:var(--fs-sm);padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.add-row input:focus,.add-row select:focus{border-color:var(--purple)}
.add-row input{flex:1;min-width:0}
.add-row select{width:105px;flex-shrink:0}
.add-btn{padding:9px 14px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:600;cursor:pointer;border:none;background:var(--purple);color:#fff;white-space:nowrap;flex-shrink:0;transition:background .15s}
.add-btn:hover{background:var(--purple-dark)}
.add-btn:active{transform:scale(.97)}

.block-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.block{background:var(--surface2);border:1px solid transparent;border-radius:var(--radius);padding:11px 13px;transition:all .2s}
.block.active{background:var(--purple-light);border-color:#AFA9EC}
.block-time{font-size:var(--fs-sm);font-weight:600;color:var(--text2)}
.block.active .block-time{color:var(--purple)}
.block-label{font-size:var(--fs);color:var(--text);margin-top:3px;line-height:1.3}

.del-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px 12px 10px}
.del-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:var(--fs-sm);color:var(--text2)}
.del-item:last-child{border-bottom:none}
.del-btn{font-size:var(--fs-xs);color:var(--red);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0}
.del-btn:hover{background:rgba(226,75,74,.1)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:600;color:var(--text)}
.stat-l{font-size:var(--fs-xs);color:var(--text3);margin-top:3px}

.footer{text-align:center;margin-top:28px;font-size:var(--fs-xs);color:var(--text3)}
.footer a{color:var(--purple);text-decoration:none}
.reset-btn{display:block;margin:16px auto 0;font-size:var(--fs-xs);color:var(--text3);background:none;border:1px solid var(--border);border-radius:20px;padding:4px 14px;cursor:pointer}
.reset-btn:hover{border-color:var(--border2);color:var(--text2)}
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div>
      <div class="day-name" id="day-name"></div>
      <div class="day-date" id="day-date"></div>
    </div>
    <div class="top-right">
      <div class="font-ctrl">
        <button class="fbtn" id="fs-s" onclick="setFont('s')">S</button>
        <button class="fbtn active" id="fs-m" onclick="setFont('m')">M</button>
        <button class="fbtn" id="fs-l" onclick="setFont('l')">L</button>
        <button class="fbtn" id="fs-xl" onclick="setFont('xl')">XL</button>
      </div>
      <div class="score-box">
        <div class="score-n" id="pct">0%</div>
        <div class="score-l">today</div>
      </div>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot offline" id="sync-dot"></div>
    <div class="sync-label" id="sync-label">Connecting…</div>
  </div>

  <div class="pips" id="pips"></div>

  <div class="sec">
    <div class="sec-label">Must win today — max 3</div>
    <div class="must-card" id="win-list"></div>
    <div class="add-row" style="margin-top:10px">
      <input id="win-input" placeholder="Add a must-win task…" maxlength="80"/>
      <select id="win-tag">
        <option value="ops">Ops</option>
        <option value="rep">Report</option>
        <option value="comms">Comms</option>
        <option value="strat">Strategy</option>
      </select>
      <button class="add-btn" onclick="addWin()">+ Add</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">Engine blocks</div>
    <div class="block-grid">
      <div class="block" id="bl0"><div class="block-time">9:00–9:20am</div><div class="block-label">Gmail triage</div></div>
      <div class="block" id="bl1"><div class="block-time">11:00am–12:00pm</div><div class="block-label">Reply block 1</div></div>
      <div class="block" id="bl2"><div class="block-time">2:00–3:30pm</div><div class="block-label">Ops / project work</div></div>
      <div class="block" id="bl3"><div class="block-time">4:00–5:00pm</div><div class="block-label">Reply block 2</div></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">Delegate / systemise</div>
    <div class="del-card">
      <div id="del-list"></div>
      <div class="add-row" style="margin-top:8px">
        <input id="del-input" placeholder="Task I should stop doing myself…" maxlength="80"/>
        <button class="add-btn" onclick="addDel()">Flag</button>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">done</div></div>
    <div class="stat"><div class="stat-n" id="s-rem">0</div><div class="stat-l">remaining</div></div>
    <div class="stat"><div class="stat-n" id="s-del">0</div><div class="stat-l">delegated</div></div>
  </div>

  <button class="reset-btn" onclick="resetDay()">Reset for new day</button>
  <div class="footer" style="margin-top:20px">
    SPCA Selangor — Daily Control &nbsp;·&nbsp;
    <a href="https://claude.ai" target="_blank">Refine in Claude</a>
  </div>

</div>

<script>
const SUPA_URL='https://ityciofmpvqsqhonhxvd.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWNpb2ZtcHZxc3Fob25oeHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzMwMDgsImV4cCI6MjA5MDAwOTAwOH0.Wnh0a1xPBogKuMdj3O658Tz7DCRnXpgE7Tapkq32Tj4';
const HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
const TODAY=now.toISOString().split('T')[0];

document.getElementById('day-name').textContent=DAYS[now.getDay()];
document.getElementById('day-date').textContent=now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();

const FONT_SIZES={s:'13px',m:'15px',l:'17px',xl:'19px'};
function setFont(size){
  document.documentElement.style.setProperty('--fs',FONT_SIZES[size]);
  document.documentElement.style.setProperty('--fs-sm',(parseInt(FONT_SIZES[size])-2)+'px');
  document.documentElement.style.setProperty('--fs-xs',(parseInt(FONT_SIZES[size])-4)+'px');
  ['s','m','l','xl'].forEach(s=>document.getElementById('fs-'+s)?.classList.toggle('active',s===size));
  localStorage.setItem('spca_font',size);
}
setFont(localStorage.getItem('spca_font')||'m');

const TAG_MAP={ops:['t-ops','Ops'],rep:['t-rep','Report'],comms:['t-comms','Comms'],strat:['t-strat','Strategy']};

let wins=[];
let delegates=[];
let rowId=null;
let syncTimeout=null;
let isSyncing=false;

function setSyncStatus(state,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+state;
  lbl.textContent=msg;
}

async function loadFromSupabase(){
  setSyncStatus('syncing','Loading…');
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/daily_tasks?date=eq.${TODAY}&select=*`,{headers:HEADERS});
    if(!res.ok)throw new Error('Load failed');
    const rows=await res.json();
    if(rows.length>0){
      const row=rows[0];
      rowId=row.id;
      wins=Array.isArray(row.wins)?row.wins:[];
      delegates=Array.isArray(row.delegates)?row.delegates:[];
    } else {
      wins=[];delegates=[];rowId=null;
    }
    setSyncStatus('synced','All devices synced');
    render();
  } catch(e){
    setSyncStatus('error','Sync error — working offline');
    const local=localStorage.getItem('spca_daily_'+TODAY);
    if(local){const d=JSON.parse(local);wins=d.wins||[];delegates=d.delegates||[];}
    render();
  }
}

async function saveToSupabase(){
  if(isSyncing)return;
  isSyncing=true;
  setSyncStatus('syncing','Saving…');
  const payload={date:TODAY,wins:wins,delegates:delegates,updated_at:new Date().toISOString()};
  try{
    let res;
    if(rowId){
      res=await fetch(`${SUPA_URL}/rest/v1/daily_tasks?id=eq.${rowId}`,{
        method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},
        body:JSON.stringify({wins:wins,delegates:delegates,updated_at:new Date().toISOString()})
      });
    } else {
      res=await fetch(`${SUPA_URL}/rest/v1/daily_tasks`,{
        method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},
        body:JSON.stringify(payload)
      });
      if(res.ok){const rows=await res.json();if(rows[0])rowId=rows[0].id;}
    }
    if(!res.ok)throw new Error('Save failed');
    localStorage.setItem('spca_daily_'+TODAY,JSON.stringify({wins,delegates}));
    setSyncStatus('synced','Synced — '+new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'}));
  } catch(e){
    setSyncStatus('error','Sync failed — saved locally');
    localStorage.setItem('spca_daily_'+TODAY,JSON.stringify({wins,delegates}));
  }
  isSyncing=false;
}

function scheduleSave(){
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(saveToSupabase,800);
}

function render(){
  const done=wins.filter(w=>w.done).length;
  const total=wins.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pct').textContent=pct+'%';

  document.getElementById('pips').innerHTML=
    Array.from({length:Math.max(total,3)},(_,i)=>`<div class="pip ${i<done?'done':''}"></div>`).join('');

  const wl=document.getElementById('win-list');
  if(!wins.length){
    wl.innerHTML='<div class="empty-msg">No must-wins yet — add up to 3 below</div>';
  } else {
    wl.innerHTML=wins.map((w,i)=>{
      const [cls,lbl]=TAG_MAP[w.tag]||TAG_MAP.ops;
      return`<div class="win-item">
        <div class="cb ${w.done?'done':''}" onclick="toggle(${i})">
          <svg viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-text ${w.done?'done':''}">${esc(w.text)}</div>
        <span class="tag ${cls}">${lbl}</span>
      </div>`;
    }).join('');
  }

  const dl=document.getElementById('del-list');
  if(!delegates.length){
    dl.innerHTML='<div class="empty-msg">Flag tasks you shouldn\'t repeat…</div>';
  } else {
    dl.innerHTML=delegates.map((d,i)=>`
      <div class="del-item">
        <span>${esc(d)}</span>
        <button class="del-btn" onclick="removeDel(${i})">remove</button>
      </div>`).join('');
  }

  document.getElementById('s-done').textContent=done;
  document.getElementById('s-rem').textContent=total-done;
  document.getElementById('s-del').textContent=delegates.length;

  const hr=now.getHours()+now.getMinutes()/60;
  [[9,9.33],[11,12],[14,15.5],[16,17]].forEach(([s,e],i)=>{
    document.getElementById('bl'+i)?.classList.toggle('active',hr>=s&&hr<e);
  });
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggle(i){wins[i].done=!wins[i].done;render();scheduleSave();}

function addWin(){
  const inp=document.getElementById('win-input');
  const tag=document.getElementById('win-tag').value;
  const text=inp.value.trim();
  if(!text)return;
  if(wins.length>=3){alert('Max 3 must-wins — keep it focused!');return;}
  wins.push({text,tag,done:false});
  inp.value='';render();scheduleSave();
}

function addDel(){
  const inp=document.getElementById('del-input');
  const text=inp.value.trim();
  if(!text)return;
  delegates.push(text);
  inp.value='';render();scheduleSave();
}

function removeDel(i){delegates.splice(i,1);render();scheduleSave();}

function resetDay(){
  if(!confirm('Reset all tasks for a new day?'))return;
  wins=[];rowId=null;render();scheduleSave();
}

loadFromSupabase();
</script>
</body>
</html>
