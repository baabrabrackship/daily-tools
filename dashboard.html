<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Control — Kelvin</title>
<style>
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f0efea;--border:#e2e1db;--border2:#cccbc4;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9d99;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --green:#1D9E75;--red:#E24B4A;--orange:#D4622A;
  --radius:10px;--radius-sm:6px;
  --fs:15px;--fs-sm:13px;--fs-xs:11px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;--border2:#4e4e4a;
    --text:#e8e7e2;--text2:#9e9d99;--text3:#6b6b67;
    --purple-light:#2a2660;--purple-dark:#AFA9EC;
    --teal-light:#0a2e26;--amber-light:#2e1e06;--blue-light:#0a1e36;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs);min-height:100vh;padding:20px 16px 40px}
.app{max-width:580px;margin:0 auto}

/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:10px;flex-wrap:wrap}
.day-name{font-size:26px;font-weight:700;line-height:1.1}
.day-date{font-size:var(--fs-sm);color:var(--text2);margin-top:3px}
.top-right{display:flex;align-items:center;gap:10px}
.font-ctrl{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;gap:3px}
.fbtn{width:28px;height:28px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.fbtn:hover,.fbtn.active{background:var(--surface);color:var(--text)}
.score-box{text-align:right}
.score-n{font-size:26px;font-weight:700;color:var(--purple);line-height:1}
.score-l{font-size:var(--fs-xs);color:var(--text3)}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;height:18px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.synced{background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
.sync-dot.offline{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:var(--fs-xs);color:var(--text3)}

/* PIPS */
.pips{display:flex;gap:5px;margin-bottom:20px}
.pip{flex:1;height:5px;border-radius:3px;background:var(--border);transition:background .4s}
.pip.done{background:var(--purple)}

/* SECTIONS */
.sec{margin-bottom:22px}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-label{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3)}
.sec-action{font-size:var(--fs-xs);color:var(--purple);cursor:pointer;background:none;border:none;font-family:inherit;padding:0}

/* AREA TABS */
.area-tabs{display:flex;gap:6px;margin-bottom:16px}
.area-tab{padding:6px 16px;border-radius:20px;font-size:var(--fs-sm);font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.area-tab.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* FOCUS CARD — top 3 */
.focus-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.focus-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);transition:background .15s}
.focus-item:last-child{border-bottom:none}
.focus-item.completing{background:var(--purple-light);opacity:.6;transition:all .4s}
.rank{width:20px;height:20px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-size:var(--fs-xs);font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rank.r1{background:var(--purple);color:#fff}
.cb{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;background:transparent;margin-top:1px}
.cb.done{background:var(--purple);border-color:var(--purple)}
.cb.done svg{display:block}
.cb svg{display:none;width:11px;height:11px}
.task-info{flex:1;min-width:0}
.task-name{font-size:var(--fs);color:var(--text);line-height:1.35;word-break:break-word}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:var(--fs-xs);padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.b-high{background:#fde8e8;color:var(--red)}
.b-medium{background:var(--amber-light);color:var(--amber)}
.b-low{background:var(--teal-light);color:var(--teal)}
.b-due{background:var(--surface2);color:var(--text2)}
.b-overdue{background:#fde8e8;color:var(--red)}
.score-badge{font-size:var(--fs-xs);color:var(--text3)}

/* ALL TASKS */
.all-tasks-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .15s}
.task-row:last-child{border-bottom:none}
.task-row.done-row .task-name{text-decoration:line-through;color:var(--text3)}

/* BLOCKS */
.block-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.block{background:var(--surface2);border:1.5px solid transparent;border-radius:var(--radius);padding:11px 13px;transition:all .2s;cursor:default}
.block.active{background:var(--purple-light);border-color:#AFA9EC}
.block-time{font-size:var(--fs-sm);font-weight:600;color:var(--text2)}
.block.active .block-time{color:var(--purple)}
.block-label{font-size:var(--fs);color:var(--text);margin-top:3px;line-height:1.3}
.block-tip{font-size:var(--fs-xs);color:var(--text3);margin-top:4px;line-height:1.3}

/* ADHD nudge banner */
.nudge{background:var(--purple-light);border:1px solid #AFA9EC;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:var(--fs-sm);color:var(--purple);line-height:1.4;display:none}
.nudge.show{display:block}

/* DELEGATE */
.del-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px 12px 10px}
.del-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:var(--fs-sm);color:var(--text2)}
.del-item:last-child{border-bottom:none}
.del-btn{font-size:var(--fs-xs);color:var(--red);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
.del-btn:hover{background:rgba(226,75,74,.1)}

/* ADD ROW */
.add-row{display:flex;gap:7px;align-items:stretch;margin-top:8px}
.add-row input,.add-row select{font-size:var(--fs-sm);padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.add-row input:focus,.add-row select:focus{border-color:var(--purple)}
.add-row input{flex:1;min-width:0}
.add-btn{padding:9px 14px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:600;cursor:pointer;border:none;background:var(--purple);color:#fff;white-space:nowrap;flex-shrink:0;transition:background .15s}
.add-btn:hover{background:var(--purple-dark)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--text)}
.stat-l{font-size:var(--fs-xs);color:var(--text3);margin-top:3px}

/* EMPTY */
.empty{font-size:var(--fs-sm);color:var(--text3);font-style:italic;padding:14px}

/* LOADING */
.loading{display:flex;align-items:center;gap:8px;padding:16px;color:var(--text3);font-size:var(--fs-sm)}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{text-align:center;margin-top:24px;font-size:var(--fs-xs);color:var(--text3)}
.footer a{color:var(--purple);text-decoration:none}
.reset-btn{display:block;margin:14px auto 0;font-size:var(--fs-xs);color:var(--text3);background:none;border:1px solid var(--border);border-radius:20px;padding:4px 14px;cursor:pointer}
.reset-btn:hover{border-color:var(--border2);color:var(--text2)}

/* NOTION LINK */
.notion-link{font-size:var(--fs-xs);color:var(--text3);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.notion-link:hover{color:var(--purple)}
</style>
</head>

function setFont(sz){

// ── SYNC STATUS ──────────────────────────────────────────────────────────────
function setSyncStatus(state, msg){
  document.getElementById('sync-dot').className = 'sync-dot '+state;
  document.getElementById('sync-label').textContent = msg;
}

// ── PRIORITY SCORING ─────────────────────────────────────────────────────────
// Score = priority_weight (40) + due_urgency (40) + done_penalty
function scoreTask(t){
  const priW = {High:40, Medium:25, Low:10, '':15}[t.priority||''] || 15;

  let dueW = 0;
  if(t.due){
    const diff = Math.floor((new Date(t.due) - new Date(TODAY)) / 86400000);
    if(diff < 0)      dueW = 40;  // overdue
    else if(diff===0) dueW = 35;  // due today
    else if(diff===1) dueW = 25;  // tomorrow
    else if(diff<=3)  dueW = 15;
    else if(diff<=7)  dueW = 8;
    else              dueW = 2;
  }

  return t.done ? -999 : priW + dueW;
}

// ── NOTION API ────────────────────────────────────────────────────────────────
async function fetchNotion(){
  setSyncStatus('syncing','Loading from Notion…');
  const headers = {
    'Authorization': 'Bearer '+NOTION_KEY,
    'Notion-Version': NOTION_VER,
    'Content-Type': 'application/json',
  };

  // Filter: not done (we'll load all and sort — Notion checkbox filter)
  const body = {
    filter: {
      property: 'Done',
      checkbox: { equals: false }
    },
    sorts: [{ property: 'Due Date', direction: 'ascending' }],
    page_size: 50,
  };

  const res = await fetch(
    `${NOTION_PROXY}/v1/databases/${DB_ID}/query`,
    { method:'POST', headers, body: JSON.stringify(body) }
  );
  if(!res.ok) throw new Error(`Notion ${res.status}`);
  const data = await res.json();
  return parseNotionResults(data.results, false);
}

async function fetchDoneToday(){
  const headers = {
    'Authorization': 'Bearer '+NOTION_KEY,
    'Notion-Version': NOTION_VER,
    'Content-Type': 'application/json',
  };
  const body = {
    filter: {
      and: [
        { property:'Done', checkbox:{ equals:true } },
        { property:'Due Date', date:{ equals: TODAY } }
      ]
    },
    page_size: 20,
  };
  const res2 = await fetch(
    `${NOTION_PROXY}/v1/databases/${DB_ID}/query`,
    { method:'POST', headers, body: JSON.stringify(body) }
  );
  if(!res2.ok) return [];
  const data2 = await res2.json();
  return parseNotionResults(data2.results, true);
}

function parseNotionResults(results, isDone){
  return (results||[]).map(p=>{
    const props = p.properties;
    const title = props['Task']?.title?.[0]?.plain_text
               || props['Name']?.title?.[0]?.plain_text
               || props['name']?.title?.[0]?.plain_text
               || '(untitled)';
    const due   = props['Due Date']?.date?.start || null;
    const done  = isDone || (props['Done']?.checkbox === true);
    const pri   = props['Priority']?.select?.name || '';
    const area  = props['Area']?.select?.name || '';
    return { id:p.id, title, due, done, priority:pri, area, score:0 };
  });
}

// ── MARK COMPLETE IN NOTION ────────────────────────────────────────────────────
async function markDoneNotion(pageId, done){
  const headers = {
    'Authorization': 'Bearer '+NOTION_KEY,
    'Notion-Version': NOTION_VER,
    'Content-Type': 'application/json',
  };
  const body = { properties: { Done: { checkbox: done } } };
  try {
    await fetch(`https://api.notion.com/v1/pages/${pageId}`,
      { method:'PATCH', headers, body: JSON.stringify(body) });
  } catch(e){
    try {
      await fetch(`https://corsproxy.io/?https://api.notion.com/v1/pages/${pageId}`,
        { method:'PATCH', headers, body: JSON.stringify(body) });
    } catch{}
  }
}

  try {
    if(sbRowId){
      await fetch(`${SUPA_URL}/rest/v1/daily_tasks?id=eq.${sbRowId}`,
        {method:'PATCH', headers:{...SB_HDR,'Prefer':'return=representation'}, body:JSON.stringify({delegates, updated_at:new Date().toISOString()})});
    } else {
      const res = await fetch(`${SUPA_URL}/rest/v1/daily_tasks`,
        {method:'POST', headers:{...SB_HDR,'Prefer':'return=representation'}, body:JSON.stringify(payload)});
      if(res.ok){ const rows=await res.json(); if(rows[0]) sbRowId=rows[0].id; }
    }
  } catch{}
}

// ── AREA FILTER ───────────────────────────────────────────────────────────────
function setArea(a){
  currentArea = a;
  ['all','work','personal'].forEach(x=>document.getElementById('tab-'+x)?.classList.toggle('active',x===a));
  renderAll();
}

function filterByArea(tasks){
  if(currentArea==='all') return tasks;
  return tasks.filter(t=> {
    const area = (t.area||'').toLowerCase();
    if(currentArea==='work') return area==='work' || area==='';
    if(currentArea==='personal') return area==='personal';
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function formatDue(due){
  if(!due) return null;
  const diff = Math.floor((new Date(due) - new Date(TODAY)) / 86400000);
  if(diff < 0)  return { label:`${Math.abs(diff)}d overdue`, cls:'b-overdue' };
  if(diff===0)  return { label:'due today', cls:'b-due' };
  if(diff===1)  return { label:'tomorrow', cls:'b-due' };
  if(diff<=7)   return { label:`${diff}d`, cls:'b-due' };
  const d = new Date(due);
  return { label: d.getDate()+' '+ ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()], cls:'b-due' };
}

function priCls(p){ return {High:'b-high',Medium:'b-medium',Low:'b-low'}[p]||'b-low'; }

function renderAll(){
  const filtered = filterByArea(allTasks);
  const sorted   = [...filtered].sort((a,b)=>b.score-a.score);
  const top3     = sorted.filter(t=>!t.done).slice(0,3);
  const remaining= sorted.filter(t=>!t.done);
  const done     = sorted.filter(t=>t.done);
  const overdue  = allTasks.filter(t=>!t.done&&t.due&&new Date(t.due)<new Date(TODAY));

  // pips
  const total = allTasks.filter(t=>t.done||!t.done).length;
  const doneN = allTasks.filter(t=>t.done).length;
  const pct   = total ? Math.round(doneN/total*100) : 0;
  document.getElementById('pct').textContent = total ? pct+'%' : '—';
  const pipCount = Math.max(total, 3);
  document.getElementById('pips').innerHTML =
    Array.from({length:pipCount},(_,i)=>`<div class="pip ${i<doneN?'done':''}"></div>`).join('');

  // stats
  document.getElementById('s-done').textContent = doneN;
  document.getElementById('s-rem').textContent  = allTasks.filter(t=>!t.done).length;
  document.getElementById('s-over').textContent = overdue.length;
  document.getElementById('s-del').textContent  = delegates.length;

  // top 3
  const t3el = document.getElementById('top3-list');
  if(!top3.length){
    t3el.innerHTML = `<div class="empty">🎉 No pending tasks in this view — you're clear!</div>`;
  } else {
    t3el.innerHTML = top3.map((t,i)=>{
      const due = formatDue(t.due);
      return `<div class="focus-item" id="fi-${t.id}">
        <div class="rank ${i===0?'r1':''}">${i+1}</div>
        <div class="cb ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
          <svg viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-info">
          <div class="task-name ${t.done?'done':''}">${esc(t.title)}</div>
          <div class="task-meta">
            ${t.priority?`<span class="badge ${priCls(t.priority)}">${t.priority}</span>`:''}
            ${t.area?`<span class="badge b-due">${t.area}</span>`:''}
            ${due?`<span class="badge ${due.cls}">${due.label}</span>`:''}
            <span class="score-badge">score ${t.score}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // all tasks
  const atel = document.getElementById('all-tasks-list');
  const allRows = [...remaining, ...done];
  if(!allRows.length){
    atel.innerHTML = `<div class="empty">Nothing here.</div>`;
  } else {
    atel.innerHTML = allRows.map(t=>{
      const due = formatDue(t.due);
      return `<div class="task-row ${t.done?'done-row':''}">
        <div class="cb ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
          <svg viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-info">
          <div class="task-name ${t.done?'done':''}">${esc(t.title)}</div>
          <div class="task-meta">
            ${t.priority?`<span class="badge ${priCls(t.priority)}">${t.priority}</span>`:''}
            ${t.area?`<span class="badge b-due">${t.area}</span>`:''}
            ${due?`<span class="badge ${due.cls}">${due.label}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // delegates
  const dl = document.getElementById('del-list');
  dl.innerHTML = delegates.length
    ? delegates.map((d,i)=>`<div class="del-item"><span>${esc(d)}</span><button class="del-btn" onclick="removeDel(${i})">remove</button></div>`).join('')
    : `<div class="empty">Flag tasks you shouldn't repeat…</div>`;
}

// ── TOGGLE TASK ───────────────────────────────────────────────────────────────
async function toggleTask(id){
  const task = allTasks.find(t=>t.id===id);
  if(!task) return;
  task.done = !task.done;
  task.score = scoreTask(task);
  renderAll();
  setSyncStatus('syncing', task.done ? 'Marking done in Notion…' : 'Updating Notion…');
  await markDoneNotion(id, task.done);
  setSyncStatus('synced', 'Synced · '+new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'}));
}

// ── DELEGATES ─────────────────────────────────────────────────────────────────
function addDel(){
  const inp = document.getElementById('del-input');
  const text = inp.value.trim();
  if(!text) return;
  delegates.push(text);
  inp.value='';
  renderAll();
  saveDelegates();
}
function removeDel(i){
  delegates.splice(i,1);
  renderAll();
  saveDelegates();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleAllTasks(){
  allTasksVisible = !allTasksVisible;
  document.getElementById('all-tasks-wrap').style.display = allTasksVisible ? 'block' : 'none';
}
function hardRefresh(){ allTasks=[]; init(); }

// ── MAIN INIT ─────────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('top3-list').innerHTML = '<div class="loading"><div class="spinner"></div>Loading from Notion…</div>';
  await loadDelegates();
  try {
    const [pending, done] = await Promise.all([fetchNotion(), fetchDoneToday()]);
    allTasks = [...pending, ...done].map(t=>({...t, score: scoreTask(t)}));
    setSyncStatus('synced','Notion synced · '+new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'}));
    maybeNudge(allTasks.filter(t=>!t.done));
  } catch(e){
    setSyncStatus('error','Notion unreachable — check CORS proxy or API key');
    document.getElementById('top3-list').innerHTML = `<div class="empty">⚠️ Could not load Notion tasks.<br><br>
      This dashboard must be hosted (GitHub Pages) to call the Notion API.<br>
      <a href="https://www.notion.so/baabrabrackship/da25681b3f2e4740aa351184d09f4701" target="_blank" style="color:var(--purple)">Open Notion directly ↗</a></div>`;
  }
  renderAll();
}

init();

// Refresh blocks every minute
setInterval(renderBlocks, 60000);
</script>
