<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Processor — SPCA</title>
<style>
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f0efea;--border:#e2e1db;--border2:#cccbc4;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9d99;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --green:#1D9E75;--red:#E24B4A;
  --radius:10px;--radius-sm:6px;
  --fs:15px;--fs-sm:13px;--fs-xs:11px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a18;--surface:#242422;--surface2:#2e2e2b;--border:#3a3a36;--border2:#4e4e4a;--text:#e8e7e2;--text2:#9e9d99;--text3:#6b6b67;--purple-light:#2a2660;--teal-light:#0a2e26;--amber-light:#2e1e06;--blue-light:#0a1e36;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs);min-height:100vh;padding:20px 16px 60px}
.app{max-width:600px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:var(--fs-sm);color:var(--text2);margin-bottom:20px}
.tab-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:9px 16px;font-size:var(--fs-sm);font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.panel{display:none}.panel.active{display:block}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:var(--fs-sm);color:var(--text2)}
.field input,.field select,.field textarea{font-size:var(--fs-sm);padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;width:100%;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple)}
.field textarea{resize:vertical;line-height:1.6}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.sm{padding:5px 12px;font-size:var(--fs-xs)}
.btn:active{transform:scale(.97)}
.out-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:14px}
.out-label{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.out-body{font-size:var(--fs-sm);color:var(--text);line-height:1.8;white-space:pre-wrap}
.classify-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.ci{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}
.ci-label{font-size:var(--fs-xs);color:var(--text3);margin-bottom:3px}
.ci-val{font-size:var(--fs-sm);font-weight:600;color:var(--text)}
.tag{font-size:var(--fs-xs);padding:3px 8px;border-radius:20px;font-weight:600;display:inline-block}
.tag-pri-high{background:#FCEBEB;color:#791F1F}
.tag-pri-med{background:var(--amber-light);color:var(--amber)}
.tag-pri-norm{background:var(--teal-light);color:var(--teal)}
.tag-group{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag-opt{font-size:var(--fs-xs);padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.tag-opt.sel{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
.sec-label{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin:14px 0 8px}
.log-row{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:6px;padding:8px 6px;border-bottom:1px solid var(--border);font-size:var(--fs-xs);align-items:center}
.log-row.hdr{font-weight:600;color:var(--text3);background:var(--surface2);border-radius:var(--radius-sm);padding:6px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:var(--fs-sm);color:var(--text2);min-width:150px;flex-shrink:0}
.bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:var(--fs-xs);color:var(--text3);min-width:32px;text-align:right}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-n{font-size:18px;font-weight:600;color:var(--text)}
.stat-l{font-size:var(--fs-xs);color:var(--text3);margin-top:2px}
.sync-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.synced{background:var(--green)}.sdot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sdot.error{background:var(--red)}.sdot.offline{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.slabel{font-size:var(--fs-xs);color:var(--text3)}
.hidden{display:none}
.empty{font-size:var(--fs-sm);color:var(--text3);font-style:italic;padding:10px 0}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 16px;gap:8px;justify-content:center}
.nav-link{font-size:var(--fs-xs);color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:20px;border:1px solid var(--border)}
.nav-link:hover{background:var(--surface2)}
</style>
</head>
<body>
<div class="app">
<h1>Email processor</h1>
<div class="subtitle">SPCA Selangor — classify · reply · log</div>
<div class="sync-bar"><div class="sdot offline" id="sdot"></div><div class="slabel" id="slabel">Loading…</div></div>

<div class="tab-row">
  <button class="tab active" onclick="sw('process')">Process email</button>
  <button class="tab" onclick="sw('log');renderLog()">Email log</button>
  <button class="tab" onclick="sw('analytics');renderAnalytics()">Analytics</button>
</div>

<!-- PROCESS -->
<div class="panel active" id="panel-process">
  <div class="field"><label>Paste the full email (From, Subject, body)</label>
    <textarea id="raw-email" rows="8" placeholder="From: Ahmad Faris &lt;ahmad@gmail.com&gt;&#10;Subject: Nak tanya pasal kucing liar&#10;&#10;Hi, saya duduk di Taman Maju Ampang. Ada banyak kucing liar. Boleh tolong?"></textarea>
  </div>
  <button class="btn primary" onclick="processEmail()">Analyse + classify + generate reply</button>

  <div id="proc-out" class="hidden">
    <div class="classify-grid" id="classify-grid"></div>

    <div class="sec-label">Adjust tags</div>
    <div style="margin-bottom:6px"><div style="font-size:var(--fs-xs);color:var(--text2);margin-bottom:4px">Species</div><div class="tag-group" id="tg-species"></div></div>
    <div style="margin-bottom:6px"><div style="font-size:var(--fs-xs);color:var(--text2);margin-bottom:4px">Language</div><div class="tag-group" id="tg-lang"></div></div>
    <div style="margin-bottom:6px"><div style="font-size:var(--fs-xs);color:var(--text2);margin-bottom:4px">Gender</div><div class="tag-group" id="tg-gender"></div></div>
    <div style="margin-bottom:6px"><div style="font-size:var(--fs-xs);color:var(--text2);margin-bottom:4px">Community</div><div class="tag-group" id="tg-ethnic"></div></div>

    <div class="out-card" style="border-left:4px solid var(--purple);border-radius:0 var(--radius) var(--radius) 0">
      <div class="out-label" style="color:var(--purple)">
        Suggested reply
        <div style="display:flex;gap:6px">
          <button class="btn sm" onclick="copyEl('reply-body')">Copy</button>
          <button class="btn sm teal" onclick="saveLog()">Save to log</button>
        </div>
      </div>
      <div style="font-size:var(--fs-xs);color:var(--text2);margin-bottom:8px" id="reply-meta"></div>
      <div class="out-body" id="reply-body"></div>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="panel" id="panel-log">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:var(--fs-sm);font-weight:600">Logged enquiries</div>
    <button class="btn sm" onclick="exportCSV()">Export CSV</button>
  </div>
  <div id="log-empty" class="empty">No emails logged yet.</div>
  <div id="log-table" class="hidden">
    <div class="log-row hdr"><div>Summary</div><div>Category</div><div>Lang</div><div>Date</div></div>
    <div id="log-rows"></div>
  </div>
</div>

<!-- ANALYTICS -->
<div class="panel" id="panel-analytics">
  <div class="stat-grid" id="a-stats"></div>
  <div id="a-charts"></div>
  <div id="a-empty" class="empty">No data yet — log some emails first.</div>
</div>

</div>

<nav class="nav-bar">
  <a class="nav-link" href="dashboard.html">Daily</a>
  <a class="nav-link" href="meetings.html">Meetings</a>
  <a class="nav-link" href="reports.html">Reports</a>
  <a class="nav-link" href="social.html">Social</a>
</nav>

<script>
const SUPA_URL='https://ityciofmpvqsqhonhxvd.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWNpb2ZtcHZxc3Fob25oeHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzMwMDgsImV4cCI6MjA5MDAwOTAwOH0.Wnh0a1xPBogKuMdj3O658Tz7DCRnXpgE7Tapkq32Tj4';
const H={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

let emailLog=[];
let classified={};
let activeTags={species:[],lang:[],gender:[],ethnic:[]};

const TAG_OPTS={
  species:['Cat','Dog','Both','Other','Not specified'],
  lang:['English','Bahasa Malaysia','Mandarin','Tamil','Mixed'],
  gender:['Male','Female','Unknown'],
  ethnic:['Malay','Chinese','Indian','Other','Unknown']
};

function setSS(s,m){document.getElementById('sdot').className='sdot '+s;document.getElementById('slabel').textContent=m;}

async function loadLog(){
  setSS('syncing','Loading…');
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/email_log?select=*&order=created_at.desc&limit=200`,{headers:H});
    if(!r.ok)throw new Error();
    emailLog=await r.json();
    setSS('synced','Synced');
  }catch{setSS('error','Offline');}
}

function sw(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
}

function detect(text){
  const t=text.toLowerCase();
  let cat='General info';
  if(/neuter|mandul|potong royong|tnrm|spay|kasi|绝育/.test(t))cat='Neutering / PoRo';
  else if(/surrender|serah|rehome|waitlist/.test(t))cat='Animal surrender';
  else if(/volunteer|sukarelawan|pcp|义工|csr/.test(t))cat='Volunteering';
  else if(/donat|derma|捐款|give\.asia/.test(t))cat='Donation';
  else if(/rescue|selamatkan|injured|stray|liar|kucing|anjing/.test(t))cat='Rescue / stray';
  else if(/media|press|interview/.test(t))cat='Media / press';
  else if(/gov|dbkl|mpaj|kerajaan/.test(t))cat='Government';
  else if(/complaint|unhappy|marah/.test(t))cat='Complaint';

  const malay=/\b(saya|anda|dengan|untuk|yang|tidak|boleh|tolong|kawasan|taman|terima kasih)\b/i;
  const chinese=/[\u4e00-\u9fff]/;
  const tamil=/[\u0B80-\u0BFF]/;
  let lang='English';
  if(chinese.test(text))lang='Mandarin';
  else if(tamil.test(text))lang='Tamil';
  else if(malay.test(text))lang=(/\b(the|and|for|is|are)\b/i.test(text))?'Mixed':'Bahasa Malaysia';

  const hasCat=/cat|kucing|meow|kitten/.test(t);
  const hasDog=/dog|anjing|puppy/.test(t);
  const species=hasCat&&hasDog?'Both':hasCat?'Cat':hasDog?'Dog':'Not specified';

  let gender='Unknown';
  if(/\b(mr\.?|encik|en\.|sir|lelaki)\b/i.test(text))gender='Male';
  else if(/\b(mrs\.?|ms\.?|puan|madam|perempuan)\b/i.test(text))gender='Female';

  let ethnic='Unknown';
  if(/\b(encik|puan|ahmad|ali|siti|nur |bin |binti )\b/i.test(text))ethnic='Malay';
  else if(/\b(tan |lim |wong |chen |lee |chan )\b/i.test(text))ethnic='Chinese';
  else if(/\b(kumar|raj|priya|muthu|krishna)\b/i.test(text))ethnic='Indian';

  const fromMatch=text.match(/from:\s*([^\n<]+)/i);
  const senderName=(fromMatch?fromMatch[1].trim().split(' ')[0]:'there')||'there';

  const priMap={'Government':'High','Donation':'High','Complaint':'High','Media / press':'Medium','Neutering / PoRo':'Medium','Rescue / stray':'Normal','Volunteering':'Normal','Animal surrender':'Normal','General info':'Normal'};
  const pri=priMap[cat]||'Normal';

  return{cat,lang,species,gender,ethnic,senderName,pri};
}

function generateReply(cat,lang,senderName){
  const isBM=lang==='Bahasa Malaysia'||lang==='Mixed';
  const sal=isBM?`Salam ${senderName},`:`Hi ${senderName},`;
  const thanks=isBM?'Terima kasih kerana menghubungi kami.':'Thank you for reaching out to us.';
  const sign=isBM?'Sekian, terima kasih.\n\nKelvin Cheah\n[Jawatan] | SPCA Selangor':'Warm regards,\nKelvin Cheah\n[Title] | SPCA Selangor';

  const bodies={
    'Rescue / stray':isBM?'Kami memahami kebimbangan anda. Kami menjalankan program Trap-Neuter-Return (TNR/PoRo) — kami tidak menangkap dan membuang haiwan.\n\nSila isi borang laporan komuniti kami: [PAUTAN BORANG]\n\nNota: Kami bukan pusat perlindungan. Untuk pengadopsian sila hubungi SPCA atau PAWS.':'We understand your concern. We run the Trap-Neuter-Return (TNR/PoRo) programme — we do not remove and discard animals.\n\nTo report your area, please fill our community form: [FORM LINK]\n\nNote: We are not a shelter. For adoptions please contact SPCA or PAWS.',
    'Volunteering':isBM?'Kami sangat gembira dengan minat anda!\n\nSila isi borang pendaftaran sukarelawan: [PAUTAN]\n\nTaklimat akan diadakan sebelum kempen bermula. Yuran latihan: RM80 (pelajar) / RM120 (dewasa).':'We\'re so glad you\'d like to volunteer!\n\nPlease fill in our registration form: [FORM LINK]\n\nA briefing will be held before the campaign. Training fee: RM80 (students) / RM120 (adults).',
    'Donation':isBM?'Terima kasih atas sokongan anda!\n\nSumbangan boleh dibuat melalui:\n• Give.Asia: [PAUTAN]\n• Pindahan bank: [BANK / NO. AKAUN]\n\nResit boleh disediakan atas permintaan.':'Thank you so much for your support!\n\nYou can donate via:\n• Give.Asia: [LINK]\n• Bank transfer: [BANK / ACCOUNT]\n\nA receipt can be provided on request.',
    'Neutering / PoRo':isBM?'Terima kasih atas minat anda terhadap PoRo!\n\nPoRo (Potong Royong) adalah kempen pemanduan haiwan liar secara besar-besaran. Jika anda ingin menganjurkan PoRo di kawasan anda, sila kongsikan lokasi dan anggaran bilangan haiwan liar.\n\nKami akan sediakan cadangan awal untuk anda.':'Thank you for your interest in PoRo!\n\nPoRo is our large-scale community neutering campaign. If you\'d like to host a PoRo in your area, please share the location and estimated stray population.\n\nWe\'ll put together a preliminary proposal for you.',
    'Complaint':isBM?'Terima kasih kerana memaklumkan perkara ini. Kami mengambil serius setiap maklum balas.\n\nPerkara ini akan kami selidiki dalam masa 48 jam. Sila kongsikan maklumat lanjut atau gambar/video jika ada.':'Thank you for bringing this to our attention. We take all feedback seriously.\n\nWe will look into this within 48 hours. Please share any additional details or photos/videos if available.',
    'Government':'Dear [Name],\n\nThank you for your message. We appreciate the opportunity to engage with your office.\n\n[Add specific response here]\n\nWe would welcome the opportunity to discuss further at your convenience.\n\nYours sincerely,\nKelvin Cheah\n[Title] | SPCA Selangor',
    'General info':isBM?'Kami dengan senang hati akan membantu anda.\n\n[Tambah jawapan spesifik di sini]\n\nJika ada pertanyaan lain, sila hubungi kami.':'We\'d be happy to help.\n\n[Add specific answer here]\n\nIf you have any other questions, please don\'t hesitate to reach out.',
  };
  return`${sal}\n\n${thanks}\n\n${bodies[cat]||bodies['General info']}\n\n${sign}`;
}

function renderTagGroup(group,options,selected){
  document.getElementById('tg-'+group).innerHTML=options.map(o=>`<span class="tag-opt ${selected.includes(o)?'sel':''}" onclick="toggleTag('${group}','${o}')">${o}</span>`).join('');
}

function toggleTag(g,v){
  if(g==='lang'||g==='gender')activeTags[g]=[];
  const i=activeTags[g].indexOf(v);
  if(i>-1)activeTags[g].splice(i,1);else activeTags[g].push(v);
  renderTagGroup(g,TAG_OPTS[{lang:'lang',gender:'gender',species:'species',ethnic:'ethnic'}[g]||g],activeTags[g]);
}

function processEmail(){
  const raw=document.getElementById('raw-email').value.trim();
  if(!raw){alert('Please paste an email first.');return;}
  const d=detect(raw);
  classified={...d,raw,date:new Date().toLocaleDateString('en-MY')};
  activeTags={species:[d.species],lang:[d.lang],gender:[d.gender],ethnic:[d.ethnic]};

  const priCls={'High':'tag-pri-high','Medium':'tag-pri-med','Normal':'tag-pri-norm'}[d.pri]||'tag-pri-norm';
  document.getElementById('classify-grid').innerHTML=`
    <div class="ci"><div class="ci-label">Category</div><div class="ci-val">${d.cat}</div></div>
    <div class="ci"><div class="ci-label">Priority</div><div class="ci-val"><span class="tag ${priCls}">${d.pri}</span></div></div>
    <div class="ci"><div class="ci-label">Sender</div><div class="ci-val">${d.senderName}</div></div>
    <div class="ci"><div class="ci-label">Language</div><div class="ci-val">${d.lang}</div></div>`;

  Object.keys(TAG_OPTS).forEach(g=>renderTagGroup(g,TAG_OPTS[g],activeTags[g]));
  document.getElementById('reply-meta').textContent=`Template: ${d.cat} · ${d.lang} · Priority: ${d.pri}`;
  document.getElementById('reply-body').textContent=generateReply(d.cat,d.lang,d.senderName);
  document.getElementById('proc-out').classList.remove('hidden');
}

async function saveLog(){
  const entry={
    category:classified.cat,language:activeTags.lang[0]||'Unknown',
    species:activeTags.species[0]||'Not specified',
    gender:activeTags.gender[0]||'Unknown',
    ethnicity:activeTags.ethnic[0]||'Unknown',
    sender_name:classified.senderName,
    priority:classified.pri,
    date:new Date().toISOString().split('T')[0]
  };
  setSS('syncing','Saving…');
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/email_log`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(entry)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    emailLog.unshift(d[0]);
    setSS('synced','Saved!');
    alert(`Saved! ${emailLog.length} email${emailLog.length>1?'s':''} in your log.`);
  }catch{setSS('error','Save failed');alert('Could not save — check connection.');}
}

function renderLog(){
  const empty=document.getElementById('log-empty');
  const table=document.getElementById('log-table');
  if(!emailLog.length){empty.style.display='block';table.classList.add('hidden');return;}
  empty.style.display='none';table.classList.remove('hidden');
  document.getElementById('log-rows').innerHTML=emailLog.map(e=>`
    <div class="log-row">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.sender_name||'—')} — ${esc(e.category||'—')}</div>
      <div style="font-size:var(--fs-xs)">${esc(e.category||'—')}</div>
      <div style="font-size:var(--fs-xs)">${esc(e.language||'—')}</div>
      <div style="font-size:var(--fs-xs);color:var(--text3)">${e.date||'—'}</div>
    </div>`).join('');
}

function renderAnalytics(){
  if(!emailLog.length){document.getElementById('a-empty').style.display='block';document.getElementById('a-stats').innerHTML='';document.getElementById('a-charts').innerHTML='';return;}
  document.getElementById('a-empty').style.display='none';
  const cats={},langs={},species={};
  emailLog.forEach(e=>{
    cats[e.category]=(cats[e.category]||0)+1;
    langs[e.language]=(langs[e.language]||0)+1;
    species[e.species]=(species[e.species]||0)+1;
  });
  const total=emailLog.length;
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('a-stats').innerHTML=`
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">total logged</div></div>
    <div class="stat"><div class="stat-n">${Object.keys(cats).length}</div><div class="stat-l">categories</div></div>
    <div class="stat"><div class="stat-n" style="font-size:12px">${topCat?topCat[0].split(' ')[0]:'—'}</div><div class="stat-l">top category</div></div>
    <div class="stat"><div class="stat-n">${Object.keys(langs).length}</div><div class="stat-l">languages</div></div>`;

  function bars(data,color){
    const max=Math.max(...Object.values(data),1);
    return Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
      <div class="bar-row">
        <div class="bar-label">${k}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${color}"></div></div>
        <div class="bar-val">${v}</div>
      </div>`).join('');
  }
  document.getElementById('a-charts').innerHTML=`
    <div style="font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:14px 0 8px">By category</div>
    ${bars(cats,'var(--purple)')}
    <div style="font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:14px 0 8px">By language</div>
    ${bars(langs,'var(--teal)')}
    <div style="font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:14px 0 8px">By species</div>
    ${bars(species,'var(--amber)')}`;
}

function exportCSV(){
  if(!emailLog.length){alert('No data to export.');return;}
  const h=['Date','Sender','Category','Priority','Species','Language','Gender','Ethnicity'];
  const rows=emailLog.map(e=>[e.date,e.sender_name,e.category,e.priority,e.species,e.language,e.gender,e.ethnicity].map(v=>`"${v||''}"`).join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([[h.join(','),...rows].join('\n')],{type:'text/csv'}));
  a.download='spca_email_log.csv';a.click();
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyEl(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.textContent).then(()=>{event.target.textContent='Copied!';setTimeout(()=>event.target.textContent='Copy',1500);});}

loadLog();
</script>
</body>
</html>
