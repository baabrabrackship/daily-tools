<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StreamOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Design tokens ─────────────────────────────────────────────────────── */
:root{
  --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f4;--surface3:#e8eaed;
  --on-s:#202124;--on-s2:#5f6368;--on-s3:#80868b;--on-s4:#bdc1c6;
  --border:#dadce0;--border-l:#e8eaed;
  --accent:#1a73e8;--accent-l:#e8f0fe;--accent-d:#1557b0;
  --green:#188038;--green-l:#e6f4ea;--green-b:#ceead6;
  --orange:#e37400;--orange-l:#fef7e0;--orange-b:#fce8b2;
  --red:#d93025;--red-l:#fce8e6;--red-b:#f5c6c3;
  --teal:#007b83;--teal-l:#e0f7fa;
  --purple:#7b1fa2;--purple-l:#f3e5f5;
  --personal-bg:#e6f4ea;--personal-b:#ceead6;
  --s1:0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
  --s2:0 1px 2px rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15);
  --s3:0 4px 8px 3px rgba(60,64,67,.15),0 1px 3px rgba(60,64,67,.3);
  --r:8px;--rsm:6px;--rpill:24px;
  --f:'Google Sans',Roboto,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  /* layout */
  --content-max:600px;
  --sidebar-w:280px;
  --rail-w:240px;
  --gap:16px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1b1f;--surface:#2b2930;--surface2:#36343b;--surface3:#48464e;
  --on-s:#e6e1e5;--on-s2:#cac4d0;--on-s3:#938f99;--on-s4:#49454f;
  --border:#49454f;--border-l:#36343b;
  --accent:#a8c7fa;--accent-l:#1e3354;--accent-d:#d3e3fd;
  --green:#81c995;--green-l:#1e3a24;--green-b:#2d5a34;
  --orange:#ffb74d;--orange-l:#3d2800;--orange-b:#5c3a00;
  --red:#f28b82;--red-l:#3d0f0a;--red-b:#5c1a14;
  --teal:#80deea;--teal-l:#00363a;
  --purple:#ce93d8;--purple-l:#3e1045;
  --personal-bg:#1e3a24;--personal-b:#2d5a34;
  --s1:0 1px 2px rgba(0,0,0,.5),0 1px 3px 1px rgba(0,0,0,.3);
  --s2:0 1px 2px rgba(0,0,0,.5),0 2px 6px 2px rgba(0,0,0,.3);
  --s3:0 4px 8px 3px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.5);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--on-s);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;overflow-x:hidden}

/* ── Boot overlay ──────────────────────────────────────────────────────── */
#boot{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#boot.off{display:none}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.boot-lbl{font-size:14px;color:var(--on-s2);font-weight:500}
#boot-err{display:none;text-align:center;padding:0 28px}
.boot-err-h{font-size:16px;font-weight:500;color:var(--on-s);margin-bottom:8px}
.boot-err-p{font-size:13px;color:var(--on-s2);margin-bottom:20px;line-height:1.5}
.boot-err-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ── Lock badge ────────────────────────────────────────────────────────── */
#lock-badge{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--on-s);color:var(--surface);padding:7px 16px;border-radius:var(--rpill);font-size:12px;font-weight:600;z-index:300;display:none;pointer-events:none;font-family:var(--f);white-space:nowrap;box-shadow:var(--s2)}
#lock-badge.show{display:block}

/* ── Session banner ────────────────────────────────────────────────────── */
#banner{display:none;position:sticky;top:0;z-index:200;background:var(--red-l);border-bottom:1px solid var(--red-b);padding:10px 16px}
#banner.show{display:block}
.banner-in{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.banner-txt{font-size:13px;color:var(--red);font-weight:500}
.banner-btns{display:flex;gap:8px}

/* ── Buttons ───────────────────────────────────────────────────────────── */
.btn{border:none;cursor:pointer;font-family:var(--f);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;border-radius:var(--rpill)}
.filled{background:var(--accent);color:#fff;padding:8px 18px;font-size:13px}.filled:hover{opacity:.9}
.filled.g{background:var(--green)}.filled.r{background:var(--red)}
.tonal{background:var(--accent-l);color:var(--accent);padding:8px 16px;font-size:13px}.tonal:hover{opacity:.85}
.outlined{background:transparent;color:var(--accent);border:1px solid var(--border);padding:7px 15px;font-size:13px}.outlined:hover{background:var(--accent-l)}
.ghost{background:transparent;color:var(--on-s2);padding:6px 12px;font-size:13px}.ghost:hover{background:var(--surface2)}
.ghost.r{color:var(--red)}.ghost.r:hover{background:var(--red-l)}
.sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.38;cursor:not-allowed}

/* ── Auth ──────────────────────────────────────────────────────────────── */
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
#auth.show{display:flex}
.auth-card{background:var(--surface);border-radius:12px;padding:40px 32px;max-width:380px;width:100%;box-shadow:var(--s2)}
.auth-logo{font-size:24px;font-weight:500;color:var(--accent);margin-bottom:4px;letter-spacing:-.5px}
.auth-tag{font-size:13px;color:var(--on-s2);margin-bottom:32px}
.flbl{display:block;font-size:12px;font-weight:500;color:var(--on-s2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 13px;font-size:14px;color:var(--on-s);font-family:var(--f);outline:none;transition:border-color .15s;margin-bottom:12px}
.finput:focus{border-color:var(--accent);background:var(--surface)}
.auth-div{text-align:center;font-size:12px;color:var(--on-s3);margin:10px 0}
.auth-msg{font-size:13px;text-align:center;margin-top:12px;min-height:18px}
.auth-msg.ok{color:var(--green)}.auth-msg.err{color:var(--red)}

/* ═══════════════════════════════════════════════════════════════════════
   APP SHELL — LAYOUT SYSTEM
   compact  (<720px):  single column, mobile-native
   medium   (720-1099px): wider single column, more breathing room
   expanded (≥1100px): three-region desktop layout
═══════════════════════════════════════════════════════════════════════ */
#app{display:none}
#app.show{display:block}

/* ── Topbar ────────────────────────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border-l);padding:0 var(--gap)}
.topbar-in{height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1280px;margin:0 auto}
.brand{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.brand-title{font-size:18px;font-weight:500;color:var(--accent);letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--on-s3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.focus-lbl{font-size:11px;font-weight:600;color:var(--on-s3);text-transform:uppercase;letter-spacing:.5px;display:none}
.energy-grp{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rpill);overflow:hidden}
.eopt{border:none;background:transparent;font-family:var(--f);font-size:12px;font-weight:500;color:var(--on-s2);padding:5px 11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.eopt.on{background:var(--accent);color:#fff}
.sync-chip{font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--rpill);border:1px solid var(--border);background:var(--surface2);color:var(--on-s2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--f)}
.sync-chip:hover{border-color:var(--accent);color:var(--accent)}
.sync-chip.saving{background:var(--orange-l);border-color:var(--orange-b);color:var(--orange)}
.sync-chip.err{background:var(--red-l);border-color:var(--red-b);color:var(--red)}
.sync-chip.reconn{background:var(--accent-l);border-color:var(--border);color:var(--accent)}

/* ── COMPACT layout (default / mobile) ────────────────────────────────── */
.app-body{max-width:var(--content-max);margin:0 auto;padding:0}

/* Filters */
.filters{padding:10px 16px 4px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--border);background:var(--surface);color:var(--on-s2);font-size:13px;font-weight:500;padding:5px 14px;border-radius:var(--rpill);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--f)}
.chip.on{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}

/* Main regions */
.region-guidance{padding:12px 16px 0}
.region-focus{padding:0 16px}
.region-stream{padding:4px 16px}
.region-later{padding:4px 16px}
.region-bottom{padding:8px 16px}

/* ── MEDIUM layout (720px+) ────────────────────────────────────────────── */
@media(min-width:720px){
  :root{--content-max:680px;--gap:20px}
  .app-body{max-width:780px;padding:0}
  .topbar-in{gap:16px}
  .focus-lbl{display:block}
  .region-guidance{padding:16px 20px 0}
  .region-focus{padding:0 20px}
  .region-stream{padding:4px 20px}
  .region-later{padding:4px 20px}
  .region-bottom{padding:10px 20px}
  .filters{padding:12px 20px 4px;flex-wrap:wrap;overflow:visible}
  .card-in{padding:16px 18px 14px}
}

/* ── EXPANDED layout (1100px+) ─────────────────────────────────────────── */
@media(min-width:1100px){
  :root{--gap:24px}

  /* Three-region grid: left-rail | main | right-rail */
  .app-body{
    max-width:1280px;
    padding:0 var(--gap);
    display:grid;
    grid-template-columns:var(--rail-w) 1fr var(--sidebar-w);
    grid-template-rows:auto;
    gap:0 20px;
    align-items:start;
  }

  /* Left rail: guidance + focus — sticky */
  .left-rail{
    grid-column:1;
    grid-row:1/10;
    position:sticky;
    top:72px;
    max-height:calc(100vh - 88px);
    overflow-y:auto;
    overflow-x:hidden;
    scrollbar-width:thin;
    padding:16px 0 20px;
  }
  .left-rail::-webkit-scrollbar{width:4px}
  .left-rail::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* Main column: filters + stream */
  .main-col{
    grid-column:2;
    grid-row:1/10;
    padding:16px 0 100px;
    min-width:0;
  }

  /* Right rail: later / done / archived */
  .right-rail{
    grid-column:3;
    grid-row:1/10;
    position:sticky;
    top:72px;
    max-height:calc(100vh - 88px);
    overflow-y:auto;
    overflow-x:hidden;
    scrollbar-width:thin;
    padding:16px 0 20px;
  }
  .right-rail::-webkit-scrollbar{width:4px}
  .right-rail::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* Move guidance + focus into left rail */
  .region-guidance,.region-focus{padding:0 0 10px}
  .region-stream{padding:0}
  .region-later,.region-bottom{padding:0 0 8px}

  /* Filters inside main col */
  .filters{padding:0 0 12px;flex-wrap:wrap;overflow:visible;gap:6px}

  /* Expanded cards get more room */
  .card-in{padding:16px 20px 14px}

  /* FAB moves to bottom-right of viewport, slightly inward */
  .fab{right:calc(var(--sidebar-w) + var(--gap) + 20px) !important;transform:none !important;bottom:28px}

  /* Section labels bigger */
  .slbl{font-size:11px;padding:10px 0 5px}

  /* Right rail section labels */
  .rail-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--on-s3);padding:4px 0 8px;display:flex;align-items:center;gap:8px}
  .rail-lbl::after{content:'';flex:1;height:1px;background:var(--border-l)}
}

/* Guidance */
.gc{border-radius:var(--r);padding:14px 16px;margin-bottom:10px;background:var(--surface);box-shadow:var(--s1)}
.gc:hover{box-shadow:var(--s2)}
.gc.na{background:var(--accent-l);border-left:3px solid var(--accent)}
.gc.pm{background:var(--personal-bg);border-left:3px solid var(--green)}
.gc.nudge{background:var(--surface2);box-shadow:none;border:1px solid var(--border-l)}
.gc.stop{background:var(--green-l);border-left:3px solid var(--green);text-align:center}
.gc.pulse{animation:gp .9s ease}
@keyframes gp{0%{box-shadow:var(--s1)}50%{box-shadow:0 0 0 4px rgba(26,115,232,.15)}100%{box-shadow:var(--s1)}}
.gc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--on-s3);margin-bottom:7px}
.gc-lbl.a{color:var(--accent)}.gc-lbl.g{color:var(--green)}
.gc-row{display:flex;align-items:center;gap:10px}
.gc-txt{flex:1;min-width:0;cursor:pointer}
.gc-title{font-size:14px;font-weight:500;color:var(--on-s);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-meta{font-size:12px;color:var(--on-s2);margin-top:2px}
.nudge-txt{font-size:13px;color:var(--on-s2);line-height:1.5;font-style:italic}
.stop-h{font-size:14px;font-weight:500;color:var(--green);margin-bottom:4px}
.stop-s{font-size:12px;color:var(--green);opacity:.85}

/* Focus card */
.focus-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--s1);margin-bottom:10px;overflow:hidden}
.focus-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--on-s3);padding:10px 14px 7px}
.focus-list{display:flex;flex-direction:column}
.focus-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-top:1px solid var(--border-l);cursor:pointer;transition:background .12s}
.focus-row:first-child{border-top:none}
.focus-row:hover{background:var(--surface2)}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--border)}
.fdot.g{background:var(--green)}.fdot.b{background:var(--accent)}.fdot.r{background:var(--red)}
.flabel{font-size:13px;color:var(--on-s);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftag{font-size:11px;color:var(--on-s3)}
.fremove{border:none;background:none;color:var(--on-s3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px}
.fremove:hover{color:var(--red);background:var(--red-l)}

/* Stream */
.stream{display:flex;flex-direction:column;gap:8px}
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--on-s3);padding:8px 0 4px;display:flex;align-items:center;gap:10px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border-l)}
.empty{text-align:center;padding:48px 20px;color:var(--on-s2)}
.empty-ic{font-size:40px;margin-bottom:10px}
.stream-err{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 20px}
.stream-err p{font-size:14px;color:var(--on-s2);text-align:center;line-height:1.55}

/* Cards */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--s1);overflow:hidden;transition:box-shadow .2s,opacity .2s}
.card:hover{box-shadow:var(--s2)}
.card.done{opacity:.42}
.card.chain{animation:gp .9s ease}
.stripe{height:4px}
.stripe.task{background:var(--accent)}.stripe.idea{background:var(--orange)}
.stripe.reflection{background:var(--purple)}.stripe.obligation{background:var(--orange)}
.stripe.routine{background:var(--teal)}.stripe.communication{background:#1a73e8}
.card-in{padding:13px 15px 11px}
.card.personal .card-in{background:var(--personal-bg)}
.card.type-reflection .card-in{background:var(--purple-l)}
.card.type-routine .card-in{background:var(--teal-l)}
.card.type-obligation .card-in{background:var(--orange-l)}
.card.urgent .card-in{background:var(--red-l)}
.card.locked .card-in{opacity:.65}
.card.locked .ca:not(.ca-safe){pointer-events:none;opacity:.35}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.card-chips{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.mc{font-size:11px;font-weight:500;padding:2px 7px;border-radius:var(--rpill)}
.mc-overdue{background:var(--red);color:#fff}
.mc-due{background:var(--red-l);color:var(--red)}
.mc-imp{background:var(--orange-l);color:var(--orange)}
.mc-ctx{background:var(--surface3);color:var(--on-s2);cursor:pointer;border:none;font-family:var(--f);font-size:11px;font-weight:500;padding:2px 7px;border-radius:var(--rpill)}
.mc-ctx:hover{background:var(--accent-l);color:var(--accent)}
.mc-cat{background:var(--accent-l);color:var(--accent)}
.card-time{font-size:11px;color:var(--on-s3);white-space:nowrap;flex-shrink:0}
.card-title{font-size:15px;font-weight:400;color:var(--on-s);line-height:1.4;margin-bottom:4px}
.card-due{font-size:12px;color:var(--on-s2);margin-bottom:7px}
.card-due.ov{color:var(--red);font-weight:500}
.card-body{font-size:14px;color:var(--on-s);line-height:1.55;margin-bottom:9px;word-break:break-word}
.card-body.rfl{font-style:italic;color:var(--on-s2);line-height:1.65}
.inline-edit{width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:var(--rsm);padding:8px 10px;font-size:14px;color:var(--on-s);font-family:var(--f);outline:none;margin-bottom:8px}
.routine-sub{font-size:12px;color:var(--teal);font-weight:500;margin-bottom:8px}
.card-actions{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:4px}
.ca{border:none;cursor:pointer;font-family:var(--f);font-weight:500;font-size:12px;padding:6px 12px;border-radius:var(--rpill);transition:all .12s}
.ca-done{background:var(--green);color:#fff}.ca-done:hover{opacity:.9}
.ca-primary{background:var(--accent);color:#fff}.ca-primary:hover{opacity:.9}
.ca-tonal{background:var(--accent-l);color:var(--accent)}.ca-tonal:hover{opacity:.85}
.ca-muted{background:var(--surface2);color:var(--on-s2)}.ca-muted:hover{background:var(--surface3)}
.ca-danger{background:transparent;color:var(--red);padding:6px 8px}.ca-danger:hover{background:var(--red-l)}
.ca-imp.on{background:var(--orange-l);color:var(--orange)}.ca-imp{background:var(--surface2);color:var(--on-s2)}
.ca-pin.on{background:var(--accent-l);color:var(--accent)}.ca-pin{background:var(--surface2);color:var(--on-s2)}
.ca:disabled{opacity:.35;cursor:not-allowed}
.review-row{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-l);align-items:center}
.rlbl{font-size:11px;color:var(--on-s3);font-weight:500;margin-right:2px}

/* Reply */
.reply-wrap{background:var(--surface2);border-radius:var(--rsm);padding:11px 13px;margin-bottom:10px}
.reply-ey{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--on-s3);margin-bottom:5px}
.reply-body{font-size:13px;color:var(--on-s2);line-height:1.6;white-space:pre-wrap}
.reply-edit{width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:var(--rsm);padding:9px 11px;font-size:13px;color:var(--on-s);line-height:1.6;resize:vertical;min-height:80px;font-family:var(--f);outline:none}
.tone-row{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.tlbl{font-size:11px;color:var(--on-s3);font-weight:500;margin-right:2px}
.tbtn{border:1px solid var(--border);background:none;font-size:11px;font-weight:500;padding:3px 9px;border-radius:var(--rpill);cursor:pointer;color:var(--on-s2);font-family:var(--f);transition:all .12s}
.tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Collapse sections */
.coll-section{margin-bottom:8px}
.coll-btn{width:100%;background:none;border:1px solid var(--border-l);border-radius:var(--rsm);padding:9px 13px;font-size:13px;font-weight:500;color:var(--on-s2);cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.coll-btn:hover{border-color:var(--accent);color:var(--accent)}
.coll-body{display:none;flex-direction:column;gap:7px;margin-top:6px}
.coll-body.open{display:flex}

/* Low mode */
body.low .low-hide{display:none!important}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;background:var(--accent);color:#fff;border:none;border-radius:var(--rpill);padding:0 22px;height:52px;font-size:14px;font-weight:500;cursor:pointer;box-shadow:var(--s3);display:flex;align-items:center;gap:8px;z-index:200;font-family:var(--f);transition:opacity .15s,right .3s}
.fab:hover{opacity:.92}.fab:disabled{opacity:.35;cursor:not-allowed}
@media(min-width:720px){.fab{right:24px}}

/* ── SHEET / MODAL ─────────────────────────────────────────────────────── */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:0 0 36px;box-shadow:var(--s3);max-height:90vh;overflow-y:auto}
.sheet-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 16px}
/* On medium+, become centered modal */
@media(min-width:720px){
  .sheet-bg{align-items:center;padding:20px}
  .sheet{border-radius:16px;max-height:78vh}
  .sheet-drag{display:none}
}
.sheet-body{padding:0 20px}
.detect-hint{font-size:12px;color:var(--on-s3);margin-bottom:8px;min-height:18px;font-weight:500}
.detect-hint span{color:var(--accent)}
.cap-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:13px;font-size:15px;color:var(--on-s);font-family:var(--f);outline:none;resize:none;min-height:80px;line-height:1.5;transition:border-color .15s}
.cap-ta:focus{border-color:var(--accent);background:var(--surface)}
.srow{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.srow-lbl{font-size:12px;font-weight:600;color:var(--on-s2);white-space:nowrap}
.sc{border:1px solid var(--border);background:none;font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--rpill);cursor:pointer;color:var(--on-s2);font-family:var(--f);transition:all .12s;white-space:nowrap}
.sc.on{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}
.sc.ctx-p.on{background:var(--personal-bg);color:var(--green);border-color:var(--green)}
.ref-toggle{border:none;background:none;font-size:12px;color:var(--on-s2);cursor:pointer;font-family:var(--f);margin-top:12px;font-weight:500;padding:2px 0}
.ref-toggle:hover{color:var(--accent)}
.ref-body{display:none;flex-direction:column;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-l)}
.ref-body.open{display:flex}
.flbl2{display:block;font-size:12px;font-weight:600;color:var(--on-s2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fi,.fsel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 12px;font-size:13px;color:var(--on-s);font-family:var(--f);outline:none;transition:border-color .15s}
.fi:focus,.fsel:focus{border-color:var(--accent)}

/* Undo / toast */
.undo-bar{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--on-s);color:var(--surface);padding:10px 16px;border-radius:var(--rpill);font-size:13px;font-weight:500;z-index:999;display:flex;align-items:center;gap:12px;box-shadow:var(--s3);opacity:0;transition:opacity .2s;pointer-events:none;font-family:var(--f)}
.undo-bar.show{opacity:1;pointer-events:all}
.undo-act{background:var(--accent);color:#fff;border:none;border-radius:var(--rpill);padding:4px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--on-s);color:var(--surface);padding:10px 20px;border-radius:var(--rpill);font-size:13px;font-weight:500;z-index:998;opacity:0;transition:opacity .2s;pointer-events:none;font-family:var(--f);white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-spin" class="spinner"></div>
  <div id="boot-lbl" class="boot-lbl">Starting up…</div>
  <div id="boot-err">
    <div class="boot-err-h">Couldn't start StreamOS</div>
    <div class="boot-err-p" id="boot-err-p">Check your connection and try again.</div>
    <div class="boot-err-btns">

</div>

<div id="auth">
  <div class="auth-card">
    <div class="auth-logo">StreamOS</div>
    <div class="auth-tag">Your personal operating system</div>
    <div id="auth-magic">
      <label class="flbl">Email</label>
      <input class="finput" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
      <button class="btn filled" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="sendMagicLink()">Send magic link</button>
      <div class="auth-div">or</div>
      <button class="btn outlined" style="width:100%;justify-content:center;padding:10px;font-size:13px" onclick="showPwForm()">Sign in with password</button>
    </div>
    <div id="auth-pw" style="display:none">
      <label class="flbl">Email</label>
      <input class="finput" id="pw-email" type="email" placeholder="you@example.com" autocomplete="email">
      <label class="flbl">Password</label>
      <input class="finput" id="pw-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn filled" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="signInPw()">Sign in</button>

    </div>
    <div class="auth-msg" id="auth-msg"></div>

</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand">
        <div class="brand-title">StreamOS</div>
        <div class="brand-sub" id="topbar-sub">—</div>
      </div>
      <div class="topbar-right">
        <span class="focus-lbl">Focus</span>
        <div class="energy-grp">
          <button class="eopt" onclick="setEnergy('low',this)">Light</button>
          <button class="eopt on" onclick="setEnergy('medium',this)">Standard</button>
          <button class="eopt" onclick="setEnergy('high',this)">Deep</button>
        </div>
        <button class="sync-chip" id="sync-chip" onclick="syncClick()" title="Tap to reconnect or sign out">Synced</button>
      </div>
    </div>
  </div>

  <!-- Responsive app body — JS adds layout class -->
  <div class="app-body" id="app-body">

    <!-- LEFT RAIL (desktop) / inline (mobile+tablet) -->
    <div class="left-rail" id="left-rail">
      <div class="region-guidance" id="region-guidance">
        <div id="guidance"></div>
      </div>
      <div class="region-focus low-hide" id="region-focus">
        <div id="focus-area"></div>
      </div>
    </div>

    <!-- MAIN COLUMN -->
    <div class="main-col" id="main-col">
      <div class="filters low-hide" id="filters">
        <button class="chip on" onclick="setFilter('all',this)">All</button>
        <button class="chip" onclick="setFilter('personal',this)">Personal</button>
        <button class="chip" onclick="setFilter('work',this)">Work</button>
        <button class="chip" onclick="setFilter('obligation',this)">Obligations</button>
        <button class="chip" onclick="setFilter('routine',this)">Routines</button>
        <button class="chip" onclick="setFilter('reflection',this)">Reflections</button>
      </div>
      <div class="region-stream">
        <div class="stream" id="stream"></div>
      </div>
    </div>

    <!-- RIGHT RAIL (desktop) / bottom (mobile+tablet) -->
    <div class="right-rail" id="right-rail">
      <div class="region-later low-hide" id="region-later">
        <div class="coll-section">
          <button class="coll-btn" onclick="toggleColl('low-later',this)"><span>Later</span><span>▸</span></button>
          <div class="coll-body" id="low-later"></div>
        </div>
      </div>
      <div class="region-bottom" id="region-bottom"></div>
    </div>

  </div><!-- end app-body -->
</div><!-- end app -->

<button class="fab" id="fab" onclick="openSheet()"><span style="font-size:20px;line-height:1">+</span> Capture</button>

<div class="sheet-bg" id="sheet-bg" onclick="bgClick(event)">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-body">
      <div class="detect-hint" id="detect-hint">What's on your mind?</div>
      <textarea class="cap-ta" id="cap-in" placeholder="Task, thought, email, reflection…" oninput="onCapIn()" rows="3"></textarea>
      <div class="srow">
        <span class="srow-lbl">Type</span>
        <button class="sc" onclick="setOvr('task',this)">Task</button>
        <button class="sc" onclick="setOvr('idea',this)">Idea</button>
        <button class="sc" onclick="setOvr('reflection',this)">Reflection</button>
        <button class="sc" onclick="setOvr('obligation',this)">Obligation</button>
        <button class="sc" onclick="setOvr('routine',this)">Routine</button>
        <button class="sc" onclick="setOvr('communication',this)">Email</button>
      </div>
      <div class="srow">
        <span class="srow-lbl">Context</span>
        <button class="sc on" id="ctx-work" onclick="setCtx('work')">Work</button>
        <button class="sc ctx-p" id="ctx-personal" onclick="setCtx('personal')">Personal</button>
      </div>
      <button class="ref-toggle" id="ref-btn" onclick="toggleRef()">▸ More options</button>
      <div class="ref-body" id="ref-body">
        <div><label class="flbl2">Due date</label><input type="date" class="fi" id="cap-due"></div>
        <div id="freq-w" style="display:none"><label class="flbl2">Frequency</label>
          <select class="fsel" id="cap-freq">
            <option value="">—</option><option value="daily">Daily</option>
            <option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option>
          </select>
        </div>
        <div><label class="flbl2">Priority</label>
          <select class="fsel" id="cap-pri">
            <option value="medium" selected>Medium</option><option value="high">High</option><option value="low">Low</option>
          </select>
        </div>
      </div>
      <div style="margin-top:16px">
        <button class="btn filled" id="save-btn" style="width:100%;justify-content:center;padding:12px;font-size:14px" onclick="submitCap()">Save</button>

</div>

<div class="undo-bar" id="undo-bar">
  <span>Marked done</span><button class="undo-act" onclick="undoDone()">Undo</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Layout detection ───────────────────────────────────────────────────────
function updateLayout(){
  const w=window.innerWidth;
  const b=document.body;
  b.classList.remove('layout-compact','layout-medium','layout-expanded');
  if(w>=1100){b.classList.add('layout-expanded')}
  else if(w>=720){b.classList.add('layout-medium')}
  else{b.classList.add('layout-compact')}
}
updateLayout();
window.addEventListener('resize',updateLayout);

// ── Supabase ───────────────────────────────────────────────────────────────
const{createClient}=supabase;
const SB=createClient(
  'https://ityciofmpvqsqhonhxvd.supabase.co',
  'sb_publishable_tpsNlUn2PEKoFUgcUdyTNg_0gZKyELZ',
  {auth:{storage:window.localStorage,storageKey:'sos-v3',autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}}
);

// ── State ──────────────────────────────────────────────────────────────────
let STATE='booting',USER=null,items=[],energy='medium',ovr=null,capCtx='work';
let undoStack=null,undoTimer=null,activeFilter='all',loadedAt=0;
let todayFocus=[];try{todayFocus=JSON.parse(localStorage.getItem('tf')||'[]')}catch(e){}
let bMem={low:0,med:0,high:0,avoided:0};
let actionsLocked=false;

const NOW=new Date(),H=NOW.getHours();
const isMorning=H<12,isEvening=H>=18;
const todayStr=NOW.toISOString().slice(0,10);
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── Helpers ────────────────────────────────────────────────────────────────
function withTimeout(p,ms,lbl){
  let t;return Promise.race([p,new Promise((_,rej)=>{t=setTimeout(()=>rej(new Error(`Timeout:${lbl}`)),ms)})]).finally(()=>clearTimeout(t));
}
function isAuthError(err){
  if(!err)return false;
  const m=(err.message||'').toLowerCase()+(err.code||'').toLowerCase();
  return/jwt|auth|expired|token|refresh|session|invalid.*claim|not authenticated/.test(m);
}
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const trunc=(s,n)=>{s=String(s||'');return s.length>n?s.slice(0,n)+'…':s};
const fmt=ts=>{const d=new Date(ts),df=Date.now()-d;if(df<60000)return'now';if(df<3600000)return Math.floor(df/60000)+'m';if(df<86400000)return Math.floor(df/3600000)+'h';return Math.floor(df/86400000)+'d'};
const ageDays=ts=>Math.floor((Date.now()-new Date(ts))/86400000);
const isToday=ts=>ts&&String(ts).slice(0,10)===todayStr;
const isOverdue=ts=>ts&&String(ts)<todayStr;
const isUrgent=i=>i.status==='active'&&(i.priority==='high'||(i.type==='task'&&(isOverdue(i.content?.due)||isToday(i.content?.due)))||((i.type==='obligation')&&(isOverdue(i.content?.due)||isToday(i.content?.due))));
const routineND=i=>{const f=i.content?.frequency,l=i.content?.last_completed;if(!f||!l)return null;const d=new Date(l);if(f==='daily')d.setDate(d.getDate()+1);else if(f==='weekly')d.setDate(d.getDate()+7);else if(f==='monthly')d.setMonth(d.getMonth()+1);else if(f==='yearly')d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10)};
const routineDue=i=>i.type==='routine'&&i.status==='active'&&(()=>{const nd=routineND(i);return!nd||nd<=todayStr})();
const iTitle=i=>{if(i.type==='task')return i.content?.title;if(i.type==='communication')return(i.content?.category||'Email')+' email';if(i.type==='routine')return i.content?.title||i.content?.text;if(i.type==='obligation')return i.content?.title||i.content?.text;return trunc(i.content?.text,48)};
function dCtx(txt){return/\b(buy|gym|dinner|family|rest|holiday|kids?|home|cook|sleep|relax|mum|dad|wife|husband|partner|friends?|weekend|grocery|groceries|birthday|health|doctor|dentist|exercise|run|walk|movie|date night|lunch|breakfast|clean|laundry|bank|renew|garden|pet|school|journal|meditate)\b/i.test(String(txt||''))?'personal':'work'}
function dType(txt){
  if(!txt||txt.trim().length<2)return null;
  const t=txt.trim(),s=t.toLowerCase();
  if(t.length>80&&/from:|to:|subject:|dear |hi,|hello,|regards,|sincerely,/.test(s))return'communication';
  if(/\b(feel|feeling|felt|i am|i'm feeling|sad|anxious|grateful|overwhelmed|tired|happy|worried|stressed|frustrated|excited|hopeful|lonely|angry|proud|ashamed|confused|need to process)\b/i.test(s))return'reflection';
  if(/\b(pay|bill|renew|renewal|deadline|appointment|insurance|roadtax|tax|subscription|due|expiry|expires|visa|passport|registration|rent|mortgage|utilities|invoice)\b/i.test(s))return'obligation';
  if(/\b(gym|run|jog|journal|meditate|clean|tidy|family dinner|weekly review|workout|exercise|stretch|water plants)\b/i.test(s))return'routine';
  if(/^(call|follow up|followup|send|email|write|ping|remind|buy|book|schedule|prepare|review|check|fix|update|submit|complete|talk|meet|order|pay|register|sign|fill|collect|research|draft)\b/i.test(t))return'task';
  return'idea';
}
function dEffort(txt,type){
  if(!txt)return'medium';const t=String(txt).toLowerCase();
  if(type==='idea'||type==='reflection'||type==='routine')return'low';
  if(/\b(call|meeting|plan|review|report|discuss|present|proposal|analyse|analyze|design|strategy|interview|prepare)\b/.test(t))return'high';
  if(t.length<40&&/\b(send|reply|buy|pay|book|ping|check|read|confirm|update)\b/.test(t))return'low';
  if(t.length<40)return'low';return'medium';
}
function dImp(txt){return/\b(family|health|doctor|dentist|partner|wife|husband|rest|kids?|child|children|therapy|medication|hospital|emergency|appointment|mum|dad|parents?)\b/i.test(String(txt||''))}
function enrich(i){
  if(!i.effort){const t=i.content?.text||i.content?.title||i.content?.preview||'';i.effort=dEffort(t,i.type)}
  if(i.important_personal==null){const t=i.content?.text||i.content?.title||'';i.important_personal=i.context==='personal'&&dImp(t)}
  return i;
}

// ── State machine ──────────────────────────────────────────────────────────
function applyState(s,msg){
  STATE=s;
  const chip=document.getElementById('sync-chip');
  const banner=document.getElementById('banner');
  const fab=document.getElementById('fab');
  const saveBtn=document.getElementById('save-btn');
  const badge=document.getElementById('lock-badge');
  const map={ready:'Synced',saving:'Saving…',reconnecting:'Reconnecting…',session_expired:'Session expired',error:'Error'};
  const cls={saving:'saving',session_expired:'err',error:'err',reconnecting:'reconn'};
  chip.textContent=map[s]||s;chip.className='sync-chip'+(cls[s]?' '+cls[s]:'');
  actionsLocked=s==='session_expired'||s==='error'||s==='reconnecting';
  if(fab)fab.disabled=actionsLocked;if(saveBtn)saveBtn.disabled=actionsLocked;
  const badgeTxt={reconnecting:'Reconnecting…',session_expired:'Session paused',error:'Error — actions paused'}[s];
  if(badgeTxt){badge.textContent=badgeTxt;badge.classList.add('show')}else badge.classList.remove('show');
  if(s==='session_expired'||s==='error'){banner.classList.add('show');document.getElementById('banner-msg').textContent=msg||(s==='session_expired'?'Session expired. Sign in again to continue.':'Something went wrong. Actions are paused.')}
  else banner.classList.remove('show');
  document.querySelectorAll('.card:not(.done)').forEach(c=>c.classList.toggle('locked',actionsLocked));
  if(s==='saving')setTimeout(()=>{if(STATE==='saving')applyState('ready')},4000);
}
function requireSession(){
  if(!USER||actionsLocked){applyState('session_expired','Session lost. Please sign in again.');return false}return true;
}

// ── Boot ───────────────────────────────────────────────────────────────────
function bootSpinner(lbl){const b=document.getElementById('boot');b.classList.remove('off');document.getElementById('boot-spin').style.display='block';document.getElementById('boot-lbl').style.display='block';document.getElementById('boot-err').style.display='none';document.getElementById('boot-lbl').textContent=lbl||'Loading…'}
function bootError(msg){document.getElementById('boot-spin').style.display='none';document.getElementById('boot-lbl').style.display='none';document.getElementById('boot-err').style.display='block';document.getElementById('boot-err-p').textContent=msg||'Something went wrong.'}
function hideBoot(){document.getElementById('boot').classList.add('off')}
async function retryBoot(){bootSpinner('Retrying…');await bootstrap()}

async function bootstrap(){
  applyState('booting');bootSpinner('Starting up…');
  try{
    const{data:{session},error}=await withTimeout(SB.auth.getSession(),8000,'getSession');
    if(error)throw error;
    if(session?.user){
      USER=session.user;showApp();bootSpinner('Loading your stream…');
      const results=await Promise.allSettled([loadBMem().catch(e=>{console.warn('bMem:',e)}),loadItems()]);
      hideBoot();
      if(results[1].status==='rejected')applyState('error','Could not load stream.');
      else applyState('ready');
    }else{hideBoot();showAuth()}
  }catch(e){
    const msg=e.message.includes('Timeout')?'Connection timed out. Check your network.':e.message||'Could not connect.';
    bootError(msg);applyState('error',msg);
  }
}

SB.auth.onAuthStateChange(async(event,session)=>{
  if(event==='INITIAL_SESSION')return;
  if(event==='SIGNED_IN'&&session?.user&&!USER){
    USER=session.user;showApp();bootSpinner('Loading…');
    await Promise.allSettled([loadBMem().catch(()=>{}),loadItems()]);
    hideBoot();applyState('ready');
  }else if(event==='TOKEN_REFRESHED'&&session?.user){
    USER=session.user;if(STATE==='session_expired'||STATE==='reconnecting')applyState('ready');
  }else if(event==='SIGNED_OUT'){USER=null;items=[];hideBoot();showAuth();applyState('ready')}
});

function showApp(){
  document.getElementById('auth').classList.remove('show');
  document.getElementById('app').classList.add('show');
  if(USER)document.getElementById('topbar-sub').textContent=`${DAYS[NOW.getDay()]}, ${NOW.getDate()} ${MONTHS[NOW.getMonth()]} · ${USER.email.split('@')[0]}`;
}
function showAuth(){document.getElementById('app').classList.remove('show');document.getElementById('auth').classList.add('show')}

// ── Auth ───────────────────────────────────────────────────────────────────
function showPwForm(){document.getElementById('auth-magic').style.display='none';document.getElementById('auth-pw').style.display='block';setAuthMsg('')}
function showMagicForm(){document.getElementById('auth-pw').style.display='none';document.getElementById('auth-magic').style.display='block';setAuthMsg('')}
async function sendMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  if(!email){setAuthMsg('Enter your email address.','err');return}
  const{error}=await SB.auth.signInWithOtp({email,options:{emailRedirectTo:location.href}});
  if(error)setAuthMsg(error.message,'err');else setAuthMsg('Magic link sent — check your inbox.','ok');
}
async function signInPw(){
  const email=document.getElementById('pw-email').value.trim(),pw=document.getElementById('pw-pass').value;
  if(!email||!pw){setAuthMsg('Enter email and password.','err');return}
  const{error}=await SB.auth.signInWithPassword({email,password:pw});
  if(error)setAuthMsg(error.message,'err');
}
async function signOut(){
  try{await SB.auth.signOut()}catch(e){}
  USER=null;items=[];localStorage.removeItem('sos-v3');localStorage.removeItem('tf');
  hideBoot();showAuth();applyState('ready');document.getElementById('auth-msg').textContent='';
}
async function handleReconnect(){
  applyState('reconnecting','Reconnecting…');
  try{
    const{data,error}=await withTimeout(SB.auth.refreshSession(),8000,'refresh');
    if(error||!data.session)throw new Error('Failed');
    USER=data.session.user;applyState('ready');
    if(Date.now()-loadedAt>60000)loadItems().catch(()=>{});
  }catch(e){USER=null;applyState('session_expired','Could not reconnect. Please sign in again.')}

function syncClick(){

}

async function loadItems(){

  showStreamLoading();

// ── Guidance ───────────────────────────────────────────────────────────────
function allowedEffort(){
  if(energy==='low')return new Set(['low']);
  if(energy==='high')return new Set(['low','medium','high']);
  if(isMorning)return new Set(['low','medium']);
  if(isEvening)return new Set(['low']);
  return new Set(['low','medium','high']);
}
function naScore(i){
  if(i.type==='reflection'&&!i.important_personal)return-100;
  let s=0;if(i.important_personal)s+=100;if(i.context==='personal')s+=20;
  if(isOverdue(i.content?.due))s+=50;if(isToday(i.content?.due))s+=30;
  if(i.type==='obligation'&&(isOverdue(i.content?.due)||isToday(i.content?.due)))s+=60;
  if(routineDue(i))s+=35;if(i.priority==='high')s+=15;if(i.type==='communication')s+=5;
  const e=i.effort||'medium';if(allowedEffort().has(e))s+=10;else s-=20;
  if(e==='low'&&bMem.low>bMem.high)s+=5;return s;
}
function pickNA(){const a=items.filter(i=>i.status==='active');return a.length?a.slice().sort((a,b)=>naScore(b)-naScore(a))[0]:null}
function pickPM(){
  const a=items.filter(i=>i.status==='active'&&(i.context==='personal'||i.type==='routine'||i.type==='obligation'));
  if(!a.length)return null;
  const sc=i=>{let s=0;if(i.important_personal)s+=50;if(i.type==='obligation'&&isOverdue(i.content?.due))s+=60;if(i.type==='obligation'&&isToday(i.content?.due))s+=45;if(isOverdue(i.content?.due))s+=40;if(isToday(i.content?.due))s+=25;if(routineDue(i))s+=30;if(i.priority==='high')s+=15;if(i.type==='reflection'&&!i.important_personal)s-=50;return s};
  return a.slice().sort((a,b)=>sc(b)-sc(a))[0];
}
function pickNudge(){
  const a=items.filter(i=>i.status==='active');
  const dt=items.filter(i=>i.status==='done'&&isToday(i.completed_at||i.created_at));
  const dtP=dt.filter(i=>i.context==='personal');
  const oi=a.filter(i=>i.type==='idea'&&ageDays(i.created_at)>=3);
  const oob=a.filter(i=>i.type==='obligation'&&isOverdue(i.content?.due));
  const dr=a.filter(i=>routineDue(i));
  const op=a.filter(i=>i.type==='task'&&i.context==='personal'&&isOverdue(i.content?.due));
  const wc=a.filter(i=>i.context!=='personal'&&i.type!=='routine').length;
  const pc=a.filter(i=>i.context==='personal').length;
  if(oob.length)return`${oob.length} overdue obligation${oob.length>1?'s':''} — worth attending to.`;
  if(dr.length)return`${dr[0].content?.title||'A routine'} is due.`;
  if(op.length)return`${op.length} overdue personal task${op.length>1?'s':''} — worth a look.`;
  if(isEvening&&!dtP.length&&pc>0)return'Nothing personal done today. Even one small thing counts.';
  if(oi.length>=3)return`${oi.length} ideas getting dusty. Worth a quick pass?`;
  if(wc>6&&pc<2)return'Work is stacking up. Your personal list is quiet.';
  if(isMorning&&dt.length===0)return'Morning. One small thing done before noon makes the rest easier.';
  return null;
}
function checkStop(){
  const a=items.filter(i=>i.status==='active');
  return!a.some(i=>isOverdue(i.content?.due)&&i.type!=='reflection')&&!a.some(i=>i.context!=='personal'&&i.priority==='high'&&i.type!=='reflection')&&items.some(i=>i.status==='done'&&i.context==='personal'&&isToday(i.completed_at||i.created_at));
}

// ── Today focus ────────────────────────────────────────────────────────────
function saveTF(){localStorage.setItem('tf',JSON.stringify(todayFocus))}
function pinItem(id){
  if(todayFocus.includes(id)){todayFocus=todayFocus.filter(x=>x!==id);saveTF();render();return}
  if(todayFocus.length>=3){showToast('Today Focus is full');return}
  todayFocus.push(id);saveTF();render();showToast('Pinned');
}
function removeTodayPin(id){todayFocus=todayFocus.filter(x=>x!==id);saveTF();render()}
function buildFocus(){
  const pinned=todayFocus.filter(id=>items.find(i=>i.id===id&&i.status==='active'));
  if(pinned.length>=3)return pinned.map(id=>({id,auto:false}));
  const used=new Set(pinned),sug=[];
  const a=items.filter(i=>i.status==='active');
  const p=a.filter(i=>(i.context==='personal'||i.type==='routine')&&!used.has(i.id));
  if(p.length&&sug.length<3-pinned.length){sug.push({id:p[0].id,auto:true});used.add(p[0].id)}
  const uw=a.filter(i=>i.context!=='personal'&&isUrgent(i)&&!used.has(i.id));
  if(uw.length&&sug.length<3-pinned.length){sug.push({id:uw[0].id,auto:true});used.add(uw[0].id)}
  const m=a.filter(i=>!used.has(i.id)&&i.priority!=='low'&&i.type!=='reflection');
  if(m.length&&sug.length<3-pinned.length)sug.push({id:m[0].id,auto:true});
  return[...pinned.map(id=>({id,auto:false})),...sug].slice(0,3);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  document.body.classList.toggle('low',energy==='low');
  renderGuidance();renderFocus();renderStream();renderSidebar();
  if(actionsLocked)document.querySelectorAll('.card:not(.done)').forEach(c=>c.classList.add('locked'));
  else document.querySelectorAll('.card.locked').forEach(c=>c.classList.remove('locked'));
}

function renderGuidance(){
  const el=document.getElementById('guidance');
  const na=pickNA(),pm=pickPM(),nudge=pickNudge(),stop=checkStop();
  let h='';
  if(stop)h+=`<div class="gc stop"><div class="gc-lbl g">Done for now</div><div class="stop-h">Good stopping point ✓</div><div class="stop-s">No overdue. No urgent work. Personal done today.</div></div>`;
  if(na){
    const meta=isOverdue(na.content?.due)?'Overdue':isToday(na.content?.due)?'Due today':routineDue(na)?'Due now':na.type==='communication'?(na.content?.category||''):'';
    const act=na.type==='task'||na.type==='obligation'?`markDone('${na.id}')`:na.type==='communication'?`copyReply('${na.id}')`:na.type==='routine'?`completeRoutine('${na.id}')`:` convertToTask('${na.id}')`;
    const aLbl=na.type==='task'||na.type==='obligation'?'Mark done':na.type==='communication'?'Copy reply':na.type==='routine'?'Done for today':'Convert to task';
    h+=`<div class="gc na" id="gc-na"><div class="gc-lbl a">Next action</div>
      <div class="gc-row"><div class="gc-txt" onclick="scrollTo('${na.id}')">
        <div class="gc-title">${esc(iTitle(na))}${na.important_personal?' 🌟':''}</div>
        <div class="gc-meta">${na.context==='personal'?'Personal':'Work'}${meta?' · '+meta:''}</div>
      </div><button class="btn filled sm" onclick="${act}" ${actionsLocked?'disabled':''}>${aLbl}</button></div></div>`;
  }
  if(pm&&(!na||pm.id!==na.id)){
    const pmMeta=routineDue(pm)?'Due now':isOverdue(pm.content?.due)?'Overdue':isToday(pm.content?.due)?'Due today':'';
    const pmAct=pm.type==='routine'?`completeRoutine('${pm.id}')`:pm.type==='task'||pm.type==='obligation'?`markDone('${pm.id}')`:null;
    h+=`<div class="gc pm"><div class="gc-lbl g">Personal must do</div>
      <div class="gc-row"><div class="gc-txt" onclick="scrollTo('${pm.id}')">
        <div class="gc-title">${esc(iTitle(pm))}${pm.important_personal?' 🌟':''}</div>
        <div class="gc-meta">${pmMeta||'Personal'}</div>
      </div>${pmAct?`<button class="btn filled sm g" onclick="${pmAct}" ${actionsLocked?'disabled':''}>${pm.type==='routine'?'Done for today':'Mark done'}</button>`:`<button class="btn tonal sm" onclick="scrollTo('${pm.id}')">View</button>`}</div></div>`;
  }
  if(nudge&&energy!=='low')h+=`<div class="gc nudge"><div class="nudge-txt">${esc(nudge)}</div></div>`;
  el.innerHTML=h;
}

function renderFocus(){
  const el=document.getElementById('focus-area');
  const slots=buildFocus();
  if(!slots.some(s=>s&&items.find(i=>i.id===s.id))){el.innerHTML='';return}
  let h=`<div class="focus-card"><div class="focus-hd">Today</div><div class="focus-list">`;
  for(let i=0;i<3;i++){
    const slot=slots[i];
    if(slot){
      const it=items.find(x=>x.id===slot.id);
      if(it){
        const dc=it.important_personal?'r':it.context==='personal'?'g':'b';
        h+=`<div class="focus-row" onclick="scrollTo('${it.id}')"><div class="fdot ${dc}"></div><span class="flabel">${esc(iTitle(it))}</span><span class="ftag">${slot.auto?'suggested':''}</span>${!slot.auto?`<button class="fremove" onclick="event.stopPropagation();removeTodayPin('${it.id}')">✕</button>`:''}</div>`;
      }
    }else{
      h+=`<div class="focus-row"><div class="fdot"></div><span class="flabel" style="color:var(--on-s3);font-style:italic">Slot ${i+1} — pin from stream</span></div>`;
    }
  }
  el.innerHTML=h+'</div></div>';
}

function getVisible(){
  let a=items.filter(i=>i.status==='active');
  if(energy==='low')a=a.filter(i=>i.context==='personal'||i.type==='routine'||i.type==='obligation'||isUrgent(i));
  if(activeFilter==='personal')a=a.filter(i=>i.context==='personal'||i.type==='routine'||i.type==='reflection');
  else if(activeFilter==='work')a=a.filter(i=>i.context==='work'&&!['routine','reflection','obligation'].includes(i.type));
  else if(['obligation','routine','reflection'].includes(activeFilter))a=a.filter(i=>i.type===activeFilter);
  return a;
}
function sortItems(arr){
  const o=i=>{if(i.important_personal)return 0;if(i.type==='routine'&&routineDue(i))return 1;if(i.type==='obligation'&&isUrgent(i))return 1;if(i.context==='personal')return 2;if(isUrgent(i))return 3;if(i.type==='communication')return 4;if(i.type==='task')return 5;if(i.type==='reflection')return 8;return 6};
  return[...arr].sort((a,b)=>o(a)-o(b)||new Date(b.created_at)-new Date(a.created_at));
}
function renderStream(){
  const el=document.getElementById('stream');
  const vis=getVisible();
  if(!vis.length){el.innerHTML=`<div class="empty"><div class="empty-ic">🌊</div><div>Stream is clear.<br>Tap <strong>+ Capture</strong> to add something.</div></div>`;return}
  const sorted=sortItems(vis);
  let html='',lastSec='';
  sorted.forEach(i=>{
    const sec=i.important_personal?'important':i.type==='routine'?'routine':i.type==='obligation'?'obligation':i.type==='reflection'?'reflection':i.context==='personal'?'personal':isUrgent(i)?'urgent':i.type==='communication'?'inbox':i.type==='task'?'tasks':'ideas';
    if(sec!==lastSec){const lbl={important:'Important',routine:'Routines',obligation:'Obligations',reflection:'Reflections',personal:'Personal',urgent:'Urgent',inbox:'Inbox',tasks:'Tasks',ideas:'Ideas'};html+=`<div class="slbl">${lbl[sec]}</div>`;lastSec=sec}
    html+=renderCard(i);
  });
  el.innerHTML=html;
}

function renderSidebar(){
  // Later section (low mode)
  const lowerBody=document.getElementById('low-later');
  if(energy==='low'){
    const d=items.filter(i=>i.status==='active'&&i.context!=='personal'&&i.type!=='routine'&&i.type!=='obligation'&&!isUrgent(i));
    lowerBody.innerHTML=d.length?d.slice(0,5).map(i=>renderCard(i)).join(''):`<div style="font-size:13px;color:var(--on-s3);padding:6px 0;font-style:italic">Nothing else waiting.</div>`;
  }else{lowerBody.innerHTML=''}
  // Bottom: completed + archived
  const btm=document.getElementById('region-bottom');

    }else{
      h+=`<div class="coll-section"><button class="coll-btn" onclick="toggleColl('done-body',this)"><span>Completed today (${dt.length})</span><span>▸</span></button><div class="coll-body" id="done-body">${dt.map(i=>renderCard(i)).join('')}</div></div>`;
    }
  }

function toggleColl(id,btn){const b=document.getElementById(id);if(!b)return;const open=b.classList.toggle('open');btn.querySelector('span:last-child').textContent=open?'▾':'▸'}

// ── renderCard ─────────────────────────────────────────────────────────────
function renderCard(item){
  const done=item.status==='done'||item.status==='archived';
  const c=item.content||{};
  const ctx=item.context||'work';
  const urgent=isUrgent(item)&&!done;
  const imp=item.important_personal;
  const pinned=todayFocus.includes(item.id);
  const age=ageDays(item.created_at);
  const lk=actionsLocked||done;
  const ov=isOverdue(c.due),tod=isToday(c.due);
  const stateChip=()=>{if(ov)return`<span class="mc mc-overdue">Overdue</span>`;if(tod)return`<span class="mc mc-due">Due today</span>`;if(imp)return`<span class="mc mc-imp">🌟 Important</span>`;return''};
  const ctxBtn=`<button class="mc mc-ctx" onclick="toggleCtx('${item.id}')">${ctx==='personal'?'Personal':'Work'}</button>`;
  const ca=(lbl,fn,cls,safe)=>`<button class="ca ${cls}${safe?' ca-safe':''}" onclick="${fn}" ${lk&&!safe?'disabled':''}>${lbl}</button>`;
  let inner='';

  if(item.type==='communication'){
    const tone=c.tone||'normal';
    inner=`<div class="card-top"><div class="card-chips">${stateChip()}<span class="mc mc-cat">${c.category||'General'}</span>${ctxBtn}</div><span class="card-time">${fmt(item.created_at)}</span></div>
    <div class="card-body">${esc(trunc(c.preview||'',180))}</div>
    <div class="tone-row"><span class="tlbl">Tone</span>
      <button class="tbtn${tone==='soft'?' on':''}" onclick="setTone('${item.id}','soft')">Soft</button>
      <button class="tbtn${tone==='normal'?' on':''}" onclick="setTone('${item.id}','normal')">Normal</button>
      <button class="tbtn${tone==='firm'?' on':''}" onclick="setTone('${item.id}','firm')">Firm</button>
    </div>
    <div class="reply-wrap"><div class="reply-ey">Suggested reply</div>
      <div class="reply-body" id="rt-${item.id}">${esc(c.reply||'')}</div>
      <textarea class="reply-edit" id="re-${item.id}" style="display:none">${esc(c.reply||'')}</textarea>
    </div>
    <div class="card-actions">
      ${ca('Copy reply',`copyReply('${item.id}')`,`ca-primary`,true)}${ca('Edit reply',`toggleEdit('${item.id}')`,`ca-tonal`)}
      ${!done?ca('Mark done',`markDone('${item.id}')`,`ca-done`)+ca(pinned?'Pinned':'Pin',`pinItem('${item.id}')`,`ca-pin${pinned?' on':''}`):''}
      ${ca('Delete',`deleteItem('${item.id}')`,`ca-danger`,true)}
    </div>`;
  }else if(item.type==='reflection'){
    inner=`<div class="card-top"><div class="card-chips">${stateChip()}</div><span class="card-time">${fmt(item.created_at)}</span></div>
    <div class="card-body rfl">${esc(c.text||'')}</div>
    <div class="card-actions">
      ${!done?ca('Keep',`keepItem('${item.id}')`,`ca-muted`)+ca('→ Task',`convertToTask('${item.id}')`,`ca-tonal`)+ca('Archive',`archiveItem('${item.id}')`,`ca-muted`)+ca(imp?'🌟 Important':'Mark important',`toggleImp('${item.id}')`,`ca-imp${imp?' on':''}`):''}
      ${ca('Delete',`deleteItem('${item.id}')`,`ca-danger`,true)}
    </div>`;
  }else if(item.type==='routine'){
    const nd=routineND(item);
    inner=`<div class="card-top"><div class="card-chips">${c.frequency?`<span class="mc" style="background:var(--teal-l);color:var(--teal)">${c.frequency}</span>`:''}</div><span class="card-time">${fmt(item.created_at)}</span></div>
    <div class="card-title">${esc(c.title||c.text||'Routine')}</div>
    <div class="routine-sub">${c.last_completed?`Last: ${c.last_completed}`:'Not started'}${nd?' · Next: '+nd:''}</div>
    <div class="card-actions">
      ${!done?ca('Done for today',`completeRoutine('${item.id}')`,`ca-done`)+ca(pinned?'Pinned':'Pin',`pinItem('${item.id}')`,`ca-pin${pinned?' on':''}`)+ca(imp?'🌟':'Mark important',`toggleImp('${item.id}')`,`ca-imp${imp?' on':''}`):''}
      ${ca('Delete',`deleteItem('${item.id}')`,`ca-danger`,true)}
    </div>`;
  }else if(item.type==='obligation'){
    inner=`<div class="card-top"><div class="card-chips">${stateChip()}${ctxBtn}</div><span class="card-time">${fmt(item.created_at)}</span></div>
    ${item._editing?`<input class="inline-edit" id="ie-${item.id}" value="${esc(c.title||c.text||'')}" onkeydown="if(event.key==='Enter')saveIE('${item.id}');if(event.key==='Escape')cancelIE('${item.id}')">`:`<div class="card-title">${esc(c.title||c.text||'Obligation')}</div>`}
    ${c.due?`<div class="card-due${ov?' ov':''}">${ov?'Overdue · ':tod?'Due today · ':'Due '}${c.due}</div>`:''}
    ${c.frequency?`<div class="routine-sub">Repeats: ${c.frequency}</div>`:''}
    <div class="card-actions">
      ${!done?ca('Mark done',`markDone('${item.id}')`,`ca-done`)+(item._editing?ca('Save',`saveIE('${item.id}')`,`ca-primary`)+ca('Cancel',`cancelIE('${item.id}')`,`ca-muted`):ca('Edit',`startIE('${item.id}')`,`ca-muted`))+ca(imp?'🌟':'Mark important',`toggleImp('${item.id}')`,`ca-imp${imp?' on':''}`):''}
      ${ca('Delete',`deleteItem('${item.id}')`,`ca-danger`,true)}
    </div>`;
  }else if(item.type==='task'){
    inner=`<div class="card-top"><div class="card-chips">${stateChip()}${ctxBtn}</div><span class="card-time">${fmt(item.created_at)}</span></div>
    ${item._editing?`<input class="inline-edit" id="ie-${item.id}" value="${esc(c.title||'')}" onkeydown="if(event.key==='Enter')saveIE('${item.id}');if(event.key==='Escape')cancelIE('${item.id}')">`:`<div class="card-title">${esc(c.title||'Untitled')}</div>`}
    ${c.due?`<div class="card-due${ov?' ov':''}">${ov?'Overdue · ':tod?'Due today · ':'Due '}${c.due}</div>`:''}
    <div class="card-actions">
      ${!done?ca('Mark done',`markDone('${item.id}')`,`ca-done`)+(item._editing?ca('Save',`saveIE('${item.id}')`,`ca-primary`)+ca('Cancel',`cancelIE('${item.id}')`,`ca-muted`):ca('Edit',`startIE('${item.id}')`,`ca-muted`))+ca(pinned?'Pinned':'Pin',`pinItem('${item.id}')`,`ca-pin${pinned?' on':''}`)+ca(imp?'🌟':'Mark important',`toggleImp('${item.id}')`,`ca-imp${imp?' on':''}`):''}
      ${ca('Delete',`deleteItem('${item.id}')`,`ca-danger`,true)}
    </div>`;
  }else{
    const ageBadge=age>=7?`<span class="mc" style="background:var(--orange-l);color:var(--orange)">${age}d old</span>`:age>=3?`<span class="mc" style="background:var(--surface3);color:var(--on-s2)">${age}d</span>`:'';
    inner=`<div class="card-top"><div class="card-chips">${ageBadge}${ctxBtn}</div><span class="card-time">${fmt(item.created_at)}</span></div>
    <div class="card-body">${esc(c.text||'')}</div>
    <div class="card-actions">
      ${!done?ca('→ Task',`convertToTask('${item.id}')`,`ca-tonal`)+ca('Archive',`archiveItem('${item.id}')`,`ca-muted`)+ca(pinned?'Pinned':'Pin',`pinItem('${item.id}')`,`ca-pin${pinned?' on':''}`):''}
      ${ca('Delete',`deleteItem('${item.id}')`,`ca-danger`,true)}
    </div>
    ${age>=7&&!done?`<div class="review-row"><span class="rlbl">Review</span>${ca('→ Task',`convertToTask('${item.id}')`,`ca-tonal`)}${ca('Archive',`archiveItem('${item.id}')`,`ca-muted`)}${ca('Keep',`keepItem('${item.id}')`,`ca-muted`)}</div>`:''}`;
  }
  const cls=`card type-${item.type}${done?' done':''}${urgent?' urgent':''}${ctx==='personal'?' personal':''}`;
  return`<div class="${cls}" id="card-${item.id}"><div class="stripe ${item.type}"></div><div class="card-in">${inner}</div></div>`;
}

// ── Card actions ───────────────────────────────────────────────────────────
function startIE(id){const i=items.find(x=>x.id===id);if(!i)return;i._editing=true;render();setTimeout(()=>{const e=document.getElementById('ie-'+id);if(e){e.focus();e.select()}},50)}
function cancelIE(id){const i=items.find(x=>x.id===id);if(i){i._editing=false;render()}}
async function saveIE(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const el=document.getElementById('ie-'+id);if(!el)return;
  i.content.title=el.value;i._editing=false;i.effort=dEffort(el.value,i.type);
  try{await dbUpdate(id,{content:i.content,effort:i.effort});render();showToast('Saved')}catch(e){render()}
}
async function toggleCtx(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  i.context=i.context==='personal'?'work':'personal';if(i.context!=='personal')i.important_personal=false;
  try{await dbUpdate(id,{context:i.context,important_personal:i.important_personal});render()}catch(e){}
}
async function toggleImp(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  i.important_personal=!i.important_personal;if(i.important_personal)i.context='personal';
  try{await dbUpdate(id,{important_personal:i.important_personal,context:i.context});render();showToast(i.important_personal?'Marked important':'Removed')}catch(e){}
}
function setTone(id,tone){
  const i=items.find(x=>x.id===id);if(!i)return;
  i.content.tone=tone;
  // genReply inline
  const n=extractName(i.content.full||i.content.preview||''),g=n?`Dear ${n},\n\n`:'Dear valued supporter,\n\n',sign='\n\nWarm regards,\nSPCA Selangor';
  const T={soft:{Neutering:`${g}Thank you for reaching out. Our subsidised programme, Potong Royong, is available. Register at [INSERT POTONG ROYONG LINK] or WhatsApp us.${sign}`,Surrender:`${g}We understand. Our intake is on a waiting list. Please share a photo, species, breed, and age.${sign}`,Volunteering:`${g}Thank you! New volunteers complete our Pet Care Programme (PCP) first. Register at [INSERT PCP LINK].${sign}`,Donation:`${g}Your support means everything. Donate at [INSERT DONATION LINK]. Tax-exempt receipts above RM50.${sign}`,General:`${g}Thank you for reaching out. We'll respond within 2–3 working days.${sign}`},normal:{Neutering:`${g}Thank you for contacting SPCA Selangor. Our subsidised neutering programme, Potong Royong, is available. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}Thank you. Our intake is on a waiting list. Please share species, breed, age, and a photo.${sign}`,Volunteering:`${g}Thank you. All first-time volunteers complete our Pet Care Programme (PCP) at [INSERT PCP LINK].${sign}`,Donation:`${g}Thank you. Donate via [INSERT DONATION LINK]. Receipts above RM50.${sign}`,General:`${g}Thank you for reaching out. We'll respond within 2–3 working days.${sign}`},firm:{Neutering:`${g}Our subsidised neutering programme, Potong Royong, is slot-based. Walk-ins not accepted. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}Intake is on a strict waiting list. Provide: species, breed, age, reason, photo.${sign}`,Volunteering:`${g}All volunteers complete PCP before joining shifts. Register at [INSERT PCP LINK].${sign}`,Donation:`${g}Donate via [INSERT DONATION LINK] only.${sign}`,General:`${g}Thank you. We respond within 2–3 working days.${sign}`}};
  i.content.reply=(T[tone]||T.normal)[i.content.category]||(T[tone]||T.normal).General;
  dbUpdate(id,{content:i.content}).catch(()=>{});
  const rt=document.getElementById('rt-'+id),re=document.getElementById('re-'+id);
  if(rt)rt.textContent=i.content.reply;if(re)re.value=i.content.reply;
  document.querySelectorAll(`#card-${id} .tbtn`).forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===tone));
  showToast('Tone updated');
}
function extractName(text){const m=text.match(/(?:my name is|i am|i'm|from|regards,|sincerely,|cheers,)\s*([A-Z][a-z]+(?: [A-Z][a-z]+)?)/i);if(m)return m[1];for(const l of text.split('\n').slice(-5)){const nm=l.trim().match(/^([A-Z][a-z]+(?: [A-Z][a-z]+)?)$/);if(nm&&nm[1].length<30)return nm[1]}return null}
function toggleEdit(id){
  const te=document.getElementById('rt-'+id),ee=document.getElementById('re-'+id);
  if(!te||!ee)return;
  if(ee.style.display==='none'){ee.style.display='block';te.style.display='none'}
  else{const v=ee.value;te.textContent=v;ee.style.display='none';te.style.display='block';const i=items.find(x=>x.id===id);if(i){i.content.reply=v;dbUpdate(id,{content:i.content}).catch(()=>{})}}
}
function copyReply(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  navigator.clipboard.writeText(i.content?.reply||'').catch(()=>{const ta=document.createElement('textarea');ta.value=i.content?.reply||'';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});
  showToast('Reply copied');
}
async function markDone(id){
  if(!requireSession())return;
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  const prev=JSON.parse(JSON.stringify(items[idx]));
  const ts=new Date().toISOString();
  const eff=items[idx].effort||'medium';
  if(eff==='low')bMem.low++;else if(eff==='medium')bMem.med++;else bMem.high++;
  saveBMem();items[idx].status='done';items[idx].completed_at=ts;render();
  try{await dbUpdate(id,{status:'done',completed_at:ts})}catch(e){items[idx]=prev;render();return}
  showUndo(id,prev);
  setTimeout(()=>{const nna=pickNA();if(nna){const c=document.getElementById('card-'+nna.id);if(c)c.classList.add('chain');const gn=document.getElementById('gc-na');if(gn)gn.classList.add('pulse');setTimeout(()=>{if(c)c.classList.remove('chain');if(gn)gn.classList.remove('pulse')},1200)}},300);
}
async function completeRoutine(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  i.content.last_completed=todayStr;
  try{await dbUpdate(id,{content:i.content,completed_at:new Date().toISOString()});render();showToast('Routine done ✓')}catch(e){}
}
async function keepItem(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const ts=new Date().toISOString();i.reviewed_at=ts;
  try{await dbUpdate(id,{reviewed_at:ts});render();showToast('Kept')}catch(e){}
}
async function archiveItem(id){
  if(!requireSession())return;
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  items[idx].status='archived';render();
  try{await dbUpdate(id,{status:'archived'});showToast('Archived')}catch(e){items[idx].status='active';render()}
}
async function convertToTask(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  const txt=i.content.text||i.content.title||'Task from idea';
  try{const saved=await dbSave({type:'task',content:{title:txt},priority:'medium',context:i.context||'work',important_personal:i.important_personal||false,effort:dEffort(txt,'task'),status:'active',created_at:new Date().toISOString()});
    if(saved){items.unshift(enrich(saved));await markDone(id);render();showToast('Converted to task')}}catch(e){}
}
async function deleteItem(id){
  if(!confirm('Delete permanently?'))return;
  items=items.filter(i=>i.id!==id);render();
  try{await dbDelete(id);showToast('Deleted')}catch(e){await loadItems()}
}
function showUndo(id,prev){
  clearTimeout(undoTimer);undoStack={id,prev};
  document.getElementById('undo-bar').classList.add('show');
  undoTimer=setTimeout(()=>{document.getElementById('undo-bar').classList.remove('show');undoStack=null},5000);
}
async function undoDone(){
  if(!undoStack)return;
  const{id,prev}=undoStack;const idx=items.findIndex(i=>i.id===id);
  if(idx>=0){
    const eff=items[idx].effort||'medium';
    if(eff==='low'&&bMem.low>0)bMem.low--;else if(eff==='medium'&&bMem.med>0)bMem.med--;else if(bMem.high>0)bMem.high--;
    saveBMem();items[idx]=prev;
    try{await dbUpdate(id,{status:'active',completed_at:null});render();showToast('Undone')}catch(e){}
  }
  document.getElementById('undo-bar').classList.remove('show');undoStack=null;clearTimeout(undoTimer);
}
function scrollTo(id){
  const el=document.getElementById('card-'+id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(()=>el.style.outline='none',1400)}
}

// ── Capture ────────────────────────────────────────────────────────────────
function onCapIn(){
  if(ovr)return;
  const val=document.getElementById('cap-in').value;
  const det=dType(val),sugCtx=val.length>2?dCtx(val):null;
  const el=document.getElementById('detect-hint');
  if(!det){el.innerHTML='What\'s on your mind?';return}
  const lbl={task:'Task',idea:'Idea',reflection:'Reflection',obligation:'Obligation',routine:'Routine',communication:'Email'};
  el.innerHTML=`<span>Detected: ${lbl[det]||det}</span>${sugCtx==='personal'?' · Personal?':''}`;
  const fw=document.getElementById('freq-w');if(fw)fw.style.display=(det==='routine'||det==='obligation')?'block':'none';
  if(sugCtx&&sugCtx!==capCtx)setCtx(sugCtx);
}
function setOvr(type,btn){
  ovr=type===ovr?null:type;
  document.querySelectorAll('.sc:not(#ctx-work):not(#ctx-personal)').forEach(b=>b.classList.remove('on'));
  if(ovr)btn.classList.add('on');
  const fw=document.getElementById('freq-w');if(fw)fw.style.display=(ovr==='routine'||ovr==='obligation')?'block':'none';
  const el=document.getElementById('detect-hint');
  if(ovr){const lbl={task:'Task',idea:'Idea',reflection:'Reflection',obligation:'Obligation',routine:'Routine',communication:'Email'};el.innerHTML=`<span>Set to: ${lbl[ovr]}</span>`}else onCapIn();
}
function setCtx(ctx){
  capCtx=ctx;
  document.getElementById('ctx-work').className='sc'+(ctx==='work'?' on':'');
  document.getElementById('ctx-personal').className='sc ctx-p'+(ctx==='personal'?' on':'');
}
function toggleRef(){const b=document.getElementById('ref-body'),btn=document.getElementById('ref-btn');const open=b.classList.toggle('open');btn.textContent=(open?'▾':'▸')+' More options'}
function openSheet(){
  if(!requireSession())return;
  document.getElementById('sheet-bg').classList.add('open');
  ovr=null;capCtx='work';
  document.querySelectorAll('.sc').forEach(b=>b.classList.remove('on'));
  setCtx('work');
  document.getElementById('detect-hint').innerHTML='What\'s on your mind?';
  document.getElementById('ref-body').classList.remove('open');
  document.getElementById('ref-btn').textContent='▸ More options';
  document.getElementById('cap-in').value='';
  document.getElementById('cap-due').value='';
  document.getElementById('cap-freq').value='';
  document.getElementById('cap-pri').value='medium';
  const fw=document.getElementById('freq-w');if(fw)fw.style.display='none';
  setTimeout(()=>document.getElementById('cap-in').focus(),80);
}
function closeSheet(){document.getElementById('sheet-bg').classList.remove('open')}
function bgClick(e){if(e.target===document.getElementById('sheet-bg'))closeSheet()}

async function submitCap(){
  if(!requireSession())return;
  const txt=document.getElementById('cap-in').value.trim();
  if(!txt){showToast('Type something first');return}
  const type=ovr||dType(txt)||'idea';
  const pri=document.getElementById('cap-pri').value||'medium';
  const ctx=capCtx||'work';
  const due=document.getElementById('cap-due').value;
  const freq=document.getElementById('cap-freq').value;
  const effort=dEffort(txt,type);
  const impP=ctx==='personal'&&dImp(txt);
  const now=new Date().toISOString();
  let item={status:'active',created_at:now,context:ctx,priority:pri,effort,important_personal:impP};
  if(type==='communication'){
    const s=txt.toLowerCase();let sc=0,cat='General';
    if(/neuter|mandul|spay|castrat|potong/.test(s)){cat='Neutering';sc=/subsidis/.test(s)?3:2}
    else if(/surrender|rehome|re-home|give up/.test(s)){cat='Surrender';sc=2}
    else if(/volunteer|volunteering/.test(s)){cat='Volunteering';sc=2}
    else if(/donat|contribut|fund/.test(s)){cat='Donation';sc=2}
    const confidence=sc>=3?'high':sc>=2?'medium':'low';
    // simple reply
    const n=extractName(txt),g=n?`Dear ${n},\n\n`:'Dear valued supporter,\n\n',sign='\n\nWarm regards,\nSPCA Selangor';
    const replies={Neutering:`${g}Thank you for contacting SPCA Selangor. Our subsidised neutering programme, Potong Royong, is available. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}Thank you. Our intake is on a waiting list. Please share species, breed, age, and a photo.${sign}`,Volunteering:`${g}Thank you. All first-time volunteers complete our Pet Care Programme (PCP) at [INSERT PCP LINK].${sign}`,Donation:`${g}Thank you. Donate via [INSERT DONATION LINK]. Receipts above RM50.${sign}`,General:`${g}Thank you for reaching out. We'll respond within 2–3 working days.${sign}`};
    item={...item,type:'communication',content:{preview:txt.replace(/\s+/g,' ').slice(0,300),category:cat,confidence,reply:replies[cat]||replies.General,full:txt,tone:'normal'}};
  }else if(type==='task')item={...item,type:'task',content:{title:txt,due}}
  else if(type==='reflection')item={...item,type:'reflection',context:'personal',content:{text:txt}}
  else if(type==='obligation')item={...item,type:'obligation',context:ctx,content:{title:txt,due,frequency:freq||null}}
  else if(type==='routine')item={...item,type:'routine',context:'personal',content:{title:txt,frequency:freq||'weekly',last_completed:null}}
  else item={...item,type:'idea',content:{text:txt}}
  document.getElementById('save-btn').disabled=true;
  try{const saved=await dbSave(item);if(saved){items.unshift(enrich(saved));render();closeSheet();showToast('Saved')}}catch(e){}
  document.getElementById('save-btn').disabled=false;
}

function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');renderStream()}
function setEnergy(level,btn){energy=level;document.querySelectorAll('.eopt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}

let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200)}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSheet();
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSheet()}
});

bootstrap();
</script>
