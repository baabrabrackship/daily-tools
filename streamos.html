<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f8f7ff;--surface:#fff;--surface2:#f3f0ff;--border:#e8e2ff;
  --text:#1a1523;--text2:#6b5fa6;--text3:#9e94c4;
  --purple:#7c3aed;--purple-light:#ede9fe;--purple-dark:#5b21b6;
  --green:#059669;--green-light:#d1fae5;--green-mid:#bbf7d0;
  --orange:#d97706;--orange-light:#fef3c7;
  --red:#dc2626;--red-light:#fee2e2;
  --blue:#2563eb;--blue-light:#dbeafe;
  --teal:#0891b2;--teal-light:#cffafe;
  --rose:#e11d48;--rose-light:#ffe4e6;
  --personal-bg:#f0fdf4;--personal-border:#bbf7d0;
  --reflect-bg:#fdf4ff;--reflect-border:#e9d5ff;
  --routine-bg:#f0f9ff;--routine-border:#bae6fd;
  --oblig-bg:#fff7ed;--oblig-border:#fed7aa;
  --shadow:0 2px 12px rgba(124,58,237,0.08);
  --shadow-lg:0 8px 32px rgba(124,58,237,0.14);
  --radius:14px;--radius-sm:8px;
  --urgent-bg:#fff5f5;--urgent-border:#fca5a5;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f0d17;--surface:#1a1726;--surface2:#231f35;--border:#2d2645;
  --text:#f0ecff;--text2:#a99fd4;--text3:#6b5fa6;
  --purple-light:#2d1f5e;--green-light:#064e3b;--green-mid:#166534;
  --orange-light:#451a03;--red-light:#450a0a;--blue-light:#1e3a5f;
  --teal-light:#083344;--rose-light:#4c0519;
  --personal-bg:#0a1f12;--personal-border:#166534;
  --reflect-bg:#1a0a2e;--reflect-border:#4c1d95;
  --routine-bg:#082030;--routine-border:#075985;
  --oblig-bg:#1c0f00;--oblig-border:#7c2d12;
  --shadow:0 2px 12px rgba(0,0,0,0.4);--shadow-lg:0 8px 32px rgba(0,0,0,0.5);
  --urgent-bg:#2a1010;--urgent-border:#7f1d1d;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Auth ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;max-width:380px;width:100%;box-shadow:var(--shadow-lg)}
.auth-logo{font-size:22px;font-weight:800;color:var(--purple);letter-spacing:-0.5px;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.auth-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:6px;display:block}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;margin-bottom:12px;transition:border-color 0.2s}
.auth-input:focus{border-color:var(--purple)}
.auth-btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;margin-bottom:10px}
.auth-btn:hover{background:var(--purple-dark)}
.auth-btn.secondary{background:var(--surface2);color:var(--text2);font-weight:600;font-size:13px;padding:9px}
.auth-msg{font-size:13px;color:var(--text3);text-align:center;margin-top:8px;min-height:20px}
.auth-msg.success{color:var(--green)}
.auth-msg.error{color:var(--red)}
.auth-divider{text-align:center;font-size:11px;color:var(--text3);margin:10px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.auth-divider::before{left:0}.auth-divider::after{right:0}

/* ── App ── */
#app-screen{display:none;padding-bottom:120px}

.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow);padding:10px 20px}
.topbar-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-left{flex:1;min-width:0}
.topbar-title{font-size:19px;font-weight:700;color:var(--purple);letter-spacing:-0.5px}
.topbar-date{font-size:11px;color:var(--text3)}
.topbar-personal{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.personal-anchor-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:var(--green);white-space:nowrap}
.personal-anchor-item{font-size:11px;color:var(--text2);background:var(--personal-bg);border:1px solid var(--personal-border);border-radius:12px;padding:2px 9px;cursor:pointer;transition:all 0.15s;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.personal-anchor-item:hover{border-color:var(--green)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.energy-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px}
.energy-btn{border:none;background:none;font-size:11px;font-weight:600;padding:4px 8px;border-radius:16px;cursor:pointer;color:var(--text3);transition:all 0.2s;font-family:inherit}
.energy-btn.active{background:var(--purple);color:#fff}
.profile-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;font-family:inherit}
.profile-chip:hover{border-color:var(--purple)}

/* ── Filter bar ── */
.filter-bar{max-width:680px;margin:0 auto;padding:10px 16px 4px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:inherit}
.filter-chip.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ── Guidance ── */
.wrap{max-width:680px;margin:0 auto;padding:12px 16px 0}
.guidance-stack{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.guidance-card{border-radius:var(--radius);padding:13px 15px;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow);transition:all 0.3s}
.guidance-card.next-action{border-color:var(--purple);background:linear-gradient(135deg,var(--purple-light) 0%,var(--surface) 100%)}
.guidance-card.next-action.chain-highlight{animation:chainpulse 1.2s ease}
@keyframes chainpulse{0%{box-shadow:0 0 0 0 rgba(124,58,237,0.4)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0)}100%{box-shadow:var(--shadow)}}
.guidance-card.personal-must{border-color:var(--personal-border);background:var(--personal-bg)}
.guidance-card.nudge-card{background:var(--surface2)}
.guidance-card.stop-card{border-color:var(--green-mid);background:var(--green-light);text-align:center;padding:16px}
.gc-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.gc-label.purple{color:var(--purple)}.gc-label.green{color:var(--green)}
.gc-body{display:flex;align-items:center;gap:10px}
.gc-text{flex:1;min-width:0}
.gc-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.gc-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.gc-action{border:none;font-size:12px;font-weight:700;padding:6px 13px;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.gc-action.purple{background:var(--purple);color:#fff}.gc-action.purple:hover{background:var(--purple-dark)}
.gc-action.green{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.gc-action.plain{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.gc-action.plain:hover{border-color:var(--purple);color:var(--purple)}
.nudge-text{font-size:13px;color:var(--text2);font-style:italic;line-height:1.4}
.stop-title{font-size:15px;font-weight:700;color:var(--green);margin-bottom:3px}
.stop-sub{font-size:12px;color:var(--green);opacity:0.85}

/* ── Cmd layer ── */
.section-head{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);display:flex;align-items:center;gap:8px;margin-bottom:5px}
.section-head span{flex:1;height:1px;background:var(--border)}
.cmd-items{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.cmd-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all 0.15s}
.cmd-item:hover{border-color:var(--purple);background:var(--purple-light)}
.cmd-item.urgent-item{background:var(--urgent-bg);border-color:var(--urgent-border)}
.cmd-item.personal-item{background:var(--personal-bg);border-color:var(--personal-border)}
.cmd-item-text{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-item-meta{font-size:11px;color:var(--text3);white-space:nowrap}
.cmd-action{border:none;background:var(--purple-light);color:var(--purple);font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.cmd-action:hover{background:var(--purple);color:#fff}

/* ── Today Focus ── */
.today-focus-block{margin-bottom:12px}
.today-slots{display:flex;flex-direction:column;gap:4px}
.today-slot{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;gap:8px;min-height:38px}
.today-slot.filled{border-style:solid;border-color:var(--purple-light)}
.today-slot.suggested{border-style:dashed;border-color:var(--text3);opacity:0.8}
.today-slot-text{font-size:13px;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.today-slot-empty{font-size:12px;color:var(--text3);font-style:italic;flex:1}
.today-slot-tag{font-size:10px;color:var(--text3);font-style:italic;white-space:nowrap}
.today-remove{border:none;background:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;transition:color 0.15s}
.today-remove:hover{color:var(--red)}

/* ── Stream ── */
.stream{max-width:680px;margin:0 auto;padding:4px 16px;display:flex;flex-direction:column;gap:9px}

/* ── Cards ── */
.card{border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 15px;transition:all 0.3s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.card.type-communication::before{background:var(--blue)}
.card.type-task::before{background:var(--purple)}
.card.type-idea::before{background:var(--orange)}
.card.type-reflection::before{background:#a855f7}
.card.type-obligation::before{background:var(--orange)}
.card.type-routine::before{background:var(--teal)}
.card.ctx-personal,.card.type-routine,.card.type-reflection{background:var(--personal-bg);border-color:var(--personal-border)}
.card.type-reflection{background:var(--reflect-bg);border-color:var(--reflect-border)}
.card.type-routine{background:var(--routine-bg);border-color:var(--routine-border)}
.card.type-obligation{background:var(--oblig-bg);border-color:var(--oblig-border)}
.card.is-urgent{background:var(--urgent-bg);border-color:var(--urgent-border)}
.card.is-urgent::before{background:var(--red)}
.card.is-focus{box-shadow:0 4px 24px rgba(124,58,237,0.18);border-color:var(--purple)}
.card.done{opacity:0.38}
.card.chain-next{animation:chainpulse 1.4s ease;border-color:var(--purple)}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-meta{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:0.3px}
.badge-type-communication{background:var(--blue-light);color:var(--blue)}
.badge-type-task{background:var(--purple-light);color:var(--purple)}
.badge-type-idea{background:var(--orange-light);color:var(--orange)}
.badge-type-reflection{background:#f3e8ff;color:#7e22ce}
.badge-type-obligation{background:var(--oblig-bg);color:var(--orange);border:1px solid var(--oblig-border)}
.badge-type-routine{background:var(--routine-bg);color:var(--teal);border:1px solid var(--routine-border)}
.badge-priority-high{background:var(--red-light);color:var(--red)}
.badge-priority-medium{background:var(--orange-light);color:var(--orange)}
.badge-priority-low{background:var(--green-light);color:var(--green)}
.badge-category,.badge-work{background:var(--surface2);color:var(--text2)}
.badge-conf-high{background:var(--green-light);color:var(--green)}
.badge-conf-medium{background:var(--orange-light);color:var(--orange)}
.badge-conf-low{background:var(--red-light);color:var(--red)}
.badge-done{background:var(--green-light);color:var(--green)}
.badge-overdue{background:var(--red-light);color:var(--red)}
.badge-personal{background:var(--personal-bg);color:var(--green);border:1px solid var(--personal-border)}
.badge-age,.badge-work{background:var(--surface2);color:var(--text3)}
.badge-age-old{background:var(--orange-light);color:var(--orange)}
.badge-effort-low{background:var(--green-light);color:var(--green)}
.badge-effort-medium{background:var(--surface2);color:var(--text2)}
.badge-effort-high{background:var(--orange-light);color:var(--orange)}
.badge-imp{background:var(--orange-light);color:var(--orange)}

.card-time{font-size:11px;color:var(--text3);white-space:nowrap}
.card-content{font-size:14px;line-height:1.5;margin-bottom:9px;word-break:break-word}
.card-content.reflect-style{font-size:13px;color:var(--text2);font-style:italic;line-height:1.6}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-due{font-size:12px;color:var(--text3);margin-bottom:7px}
.card-due.overdue{color:var(--red);font-weight:600}
.ctx-toggle{border:none;background:none;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:10px;transition:all 0.15s}
.ctx-toggle:hover{opacity:0.7}
.tone-row{display:flex;gap:5px;margin-bottom:9px;align-items:center}
.tone-label{font-size:11px;color:var(--text3);font-weight:600}
.tone-btn{border:1px solid var(--border);background:none;font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;cursor:pointer;color:var(--text3);transition:all 0.15s;font-family:inherit}
.tone-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.reply-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;margin-bottom:9px}
.reply-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px;margin-bottom:5px}
.reply-text{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.reply-edit{width:100%;background:var(--surface);border:1px solid var(--purple);border-radius:var(--radius-sm);padding:9px;font-size:13px;color:var(--text);line-height:1.6;resize:vertical;min-height:80px;font-family:inherit;outline:none}
.inline-edit-wrap{margin-bottom:7px}
.inline-edit{width:100%;background:var(--surface2);border:1px solid var(--purple);border-radius:var(--radius-sm);padding:7px 10px;font-size:14px;font-weight:600;color:var(--text);font-family:inherit;outline:none}
.card-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.action-btn{border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.action-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-light)}
.action-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.action-btn.primary:hover{background:var(--purple-dark)}
.action-btn.success{background:var(--green-light);color:var(--green);border-color:var(--green-light)}
.action-btn.today-btn{font-size:11px;padding:4px 9px}
.action-btn.today-btn.pinned{background:var(--purple-light);color:var(--purple);border-color:var(--purple-light)}
.action-btn.imp-btn{font-size:11px;padding:4px 9px}
.action-btn.imp-btn.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange-light)}
.review-actions{display:flex;gap:5px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.routine-freq{font-size:11px;color:var(--teal);font-weight:600;margin-bottom:5px}

/* ── Low mode ── */
body.low-mode .full-stream{display:none}
body.low-mode .command-layer-inner{display:none}
body.low-mode .today-focus-block{display:none}
body.low-mode .filter-bar-wrap{display:none}
.low-later{display:none}
body.low-mode .low-later{display:block}
body.low-mode .low-spacer{height:16px}

/* ── Bottom sections ── */
.bottom-sections{max-width:680px;margin:0 auto;padding:8px 16px;display:flex;flex-direction:column;gap:7px}
.collapse-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;transition:all 0.2s}
.collapse-btn:hover{border-color:var(--purple);color:var(--purple)}
.collapse-body{display:none;flex-direction:column;gap:7px;margin-top:7px}
.collapse-body.open{display:flex}

/* ── FAB ── */
.fab{position:fixed;bottom:26px;right:50%;transform:translateX(calc(50% + 316px));background:var(--purple);color:#fff;border:none;border-radius:28px;padding:0 20px;height:50px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,0.4);display:flex;align-items:center;gap:7px;transition:all 0.2s;z-index:200;font-family:inherit}
.fab:hover{background:var(--purple-dark);transform:translateX(calc(50% + 316px)) scale(1.04)}
@media(max-width:740px){.fab{right:16px;transform:none}.fab:hover{transform:scale(1.04)}}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:680px;padding:20px 20px 30px;box-shadow:var(--shadow-lg);max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--radius);max-height:80vh}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-detect{font-size:11px;color:var(--text3);margin-bottom:5px;min-height:16px;font-weight:600}
.modal-detect span{color:var(--purple)}
.smart-input{width:100%;background:var(--surface2);border:1.5px solid var(--purple);border-radius:var(--radius-sm);padding:11px;font-size:15px;color:var(--text);font-family:inherit;outline:none;resize:vertical;min-height:68px;line-height:1.5}
.override-row{display:flex;gap:5px;margin-top:7px;align-items:center;flex-wrap:wrap}
.override-label{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap}
.override-btn{border:1px solid var(--border);background:none;font-size:11px;font-weight:600;padding:3px 10px;border-radius:16px;cursor:pointer;color:var(--text3);transition:all 0.15s;font-family:inherit}
.override-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.ctx-row{display:flex;gap:5px;margin-top:7px;align-items:center}
.ctx-row-label{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap}
.ctx-btn{border:1px solid var(--border);background:none;font-size:11px;font-weight:600;padding:3px 10px;border-radius:16px;cursor:pointer;color:var(--text3);transition:all 0.15s;font-family:inherit}
.ctx-btn.active-work{background:var(--surface2);color:var(--text2);border-color:var(--border)}
.ctx-btn.active-personal{background:var(--personal-bg);color:var(--green);border-color:var(--personal-border)}
.refine-toggle{border:none;background:none;font-size:12px;color:var(--text3);cursor:pointer;font-family:inherit;margin-top:9px;padding:2px 0;font-weight:600}

<script>
// ── Supabase init ──────────────────────────────────────────────────────────
const {createClient}=supabase;
const SB=createClient(
  'https://ityciofmpvqsqhonhxvd.supabase.co',
  'sb_publishable_tpsNlUn2PEKoFUgcUdyTNg_0gZKyELZ',
  {
    auth:{
      storage:window.localStorage,
      storageKey:'streamos-auth',
      autoRefreshToken:true,
      persistSession:true,
      detectSessionInUrl:true
    }
  }
);

// ── State ──────────────────────────────────────────────────────────────────
let USER=null, items=[], energy='medium', override=null, modalCtx='work';
let undoStack=null, undoTimer=null, activeFilter='all';
let todayFocus=[];try{todayFocus=JSON.parse(localStorage.getItem('tf')||'[]')}catch(e){}
let bMem={completedLow:0,completedMed:0,completedHigh:0,avoidedHigh:0};

const NOW=new Date(), HOUR=NOW.getHours();
const isMorning=HOUR<12, isEvening=HOUR>=18;
const todayStr=NOW.toISOString().slice(0,10);
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const trunc=(s,n)=>{s=String(s||'');return s.length>n?s.slice(0,n)+'…':s};
const fmtTime=ts=>{const d=new Date(ts),df=Date.now()-d;if(df<60000)return'now';if(df<3600000)return Math.floor(df/60000)+'m';if(df<86400000)return Math.floor(df/3600000)+'h';return Math.floor(df/86400000)+'d'};
const ageDays=ts=>Math.floor((Date.now()-new Date(ts))/86400000);
const isToday=ts=>ts&&String(ts).slice(0,10)===todayStr;
const isOverdue=ts=>ts&&String(ts)<todayStr;
const isUrgent=i=>i.status==='active'&&(i.priority==='high'||(i.type==='task'&&(isOverdue(i.content?.due)||isToday(i.content?.due)))||((i.type==='obligation')&&(isOverdue(i.content?.due)||isToday(i.content?.due))));
const itemTitle=i=>{
  if(i.type==='task')return i.content?.title;
  if(i.type==='communication')return(i.content?.category||'Email')+' email';
  if(i.type==='reflection')return trunc(i.content?.text,50);
  if(i.type==='routine')return i.content?.title||i.content?.text;
  if(i.type==='obligation')return i.content?.title||i.content?.text;
  return trunc(i.content?.text,40);
};

// ── Routine next-due ───────────────────────────────────────────────────────
function routineNextDue(item){
  const freq=item.content?.frequency;
  const last=item.content?.last_completed;
  if(!freq||!last)return null;
  const d=new Date(last);
  if(freq==='daily'){d.setDate(d.getDate()+1)}
  else if(freq==='weekly'){d.setDate(d.getDate()+7)}
  else if(freq==='monthly'){d.setMonth(d.getMonth()+1)}
  else if(freq==='yearly'){d.setFullYear(d.getFullYear()+1)}
  return d.toISOString().slice(0,10);
}
const routineDue=i=>i.type==='routine'&&i.status==='active'&&(()=>{const nd=routineNextDue(i);return !nd||nd<=todayStr})();

// ── Auth ───────────────────────────────────────────────────────────────────
SB.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    USER=session.user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('profile-chip').textContent=USER.email.split('@')[0]+' · sign out';
    document.getElementById('profile-chip').title=`${USER.email} — click to sign out`;
    document.getElementById('topbar-date').textContent=`${DAYS[NOW.getDay()]}, ${NOW.getDate()} ${MONTHS[NOW.getMonth()]}`;
    if(event==='SIGNED_IN'||event==='INITIAL_SESSION'){
      await loadBMem();
      await loadItems();
    }
    if(event==='TOKEN_REFRESHED'){
      // session refreshed silently, no reload needed
    }
  }else{
    USER=null;
    items=[];
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

// Proactively refresh session every 10 minutes to prevent expiry freeze
setInterval(async()=>{
  if(USER){
    const{data,error}=await SB.auth.refreshSession();
    if(error||!data.session){
      USER=null;
      document.getElementById('auth-screen').style.display='flex';
      document.getElementById('app-screen').style.display='none';
      setAuthMsg('Session expired. Please sign in again.','error');
    }
  }
},10*60*1000);

function showPasswordForm(){document.getElementById('auth-form-magic').style.display='none';document.getElementById('auth-form-pw').style.display='block';document.getElementById('auth-msg').textContent=''}
function showMagicForm(){document.getElementById('auth-form-pw').style.display='none';document.getElementById('auth-form-magic').style.display='block';document.getElementById('auth-msg').textContent=''}

async function sendMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  if(!email){setAuthMsg('Please enter your email.','error');return}
  const{error}=await SB.auth.signInWithOtp({email,options:{emailRedirectTo:location.href}});
  if(error)setAuthMsg(error.message,'error');
  else setAuthMsg('Magic link sent! Check your inbox.','success');
}
async function signInWithPassword(){
  const email=document.getElementById('auth-email-pw').value.trim();
  const pw=document.getElementById('auth-pw').value;
  if(!email||!pw){setAuthMsg('Please fill in email and password.','error');return}
  const{error}=await SB.auth.signInWithPassword({email,password:pw});
  if(error)setAuthMsg(error.message,'error');
}
async function signOut(){
  try{
    await SB.auth.signOut();
  }catch(e){}
  USER=null;
  items=[];
  localStorage.removeItem('streamos-auth');
  localStorage.removeItem('tf');
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-msg').textContent='';
}
function setAuthMsg(msg,type=''){
  const el=document.getElementById('auth-msg');el.textContent=msg;el.className='auth-msg'+( type?' '+type:'');
}

// ── Behaviour memory (synced) ──────────────────────────────────────────────
async function loadBMem(){
  try{
    const{data}=await SB.from('user_memory').select('*').eq('user_id',USER.id).maybeSingle();
    if(data){bMem={completedLow:data.completed_low||0,completedMed:data.completed_medium||0,completedHigh:data.completed_high||0,avoidedHigh:data.avoided_high||0}}
    else{await SB.from('user_memory').insert({user_id:USER.id,completed_low:0,completed_medium:0,completed_high:0,avoided_high:0})}
  }catch(e){}
}
async function saveBMem(){
  try{await SB.from('user_memory').upsert({user_id:USER.id,completed_low:bMem.completedLow,completed_medium:bMem.completedMed,completed_high:bMem.completedHigh,avoided_high:bMem.avoidedHigh},{onConflict:'user_id'})}catch(e){}
}

// ── DB ─────────────────────────────────────────────────────────────────────
async function loadItems(){
  if(!USER)return;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000));
  try{
    const{data,error}=await Promise.race([
      SB.from('stream_items').select('*').eq('user_id',USER.id).order('created_at',{ascending:false}),
      timeout
    ]);
    if(error)throw error;
    items=(data||[]).map(enrichItem);
    render();
  }catch(e){
    document.getElementById('stream').innerHTML=`<div class="stream-empty"><div class="emoji">⚠️</div><p>Could not load stream.<br><button onclick="loadItems()" style="margin-top:12px;background:var(--purple);color:#fff;border:none;padding:8px 18px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600">Retry</button></p></div>`;
  }
}
async function dbSave(item){
  if(!USER)return null;
  try{
    const{data,error}=await SB.from('stream_items').insert({...item,user_id:USER.id}).select().single();
    if(error)throw error;
    return data;
  }catch(e){showToast('Save failed');return null}
}
async function dbUpdate(id,patch){
  if(!USER)return;
  try{await SB.from('stream_items').update(patch).eq('id',id).eq('user_id',USER.id)}
  catch(e){showToast('Update failed')}
}
async function dbDelete(id){
  if(!USER)return;
  try{await SB.from('stream_items').delete().eq('id',id).eq('user_id',USER.id)}
  catch(e){showToast('Delete failed')}
}
async function deleteItem(id){
  if(!confirm('Delete this item permanently?'))return;
  items=items.filter(i=>i.id!==id);
  render();
  await dbDelete(id);
  showToast('Deleted');
}

function enrichItem(i){
  if(!i.effort){const txt=i.content?.text||i.content?.title||i.content?.preview||'';i.effort=detectEffort(txt,i.type)}
  if(i.important_personal===undefined||i.important_personal===null){
    const txt=i.content?.text||i.content?.title||'';
    i.important_personal=i.context==='personal'&&detectImportantPersonal(txt);
  }
  return i;
}

// ── Classification ─────────────────────────────────────────────────────────
function detectCtx(txt){
  return/\b(buy|gym|dinner|family|rest|holiday|personal|kids?|home|cook|sleep|relax|mum|dad|wife|husband|partner|friends?|weekend|grocery|groceries|birthday|health|doctor|dentist|exercise|run|walk|movie|date night|lunch|breakfast|clean|laundry|bank|renew|garden|pet|school|journal|meditate)\b/i.test(String(txt||''))?'personal':'work';
}
function detectType(txt){
  if(!txt||txt.trim().length<2)return null;
  const t=txt.trim(), s=t.toLowerCase();
  // email
  if(t.length>80&&/from:|to:|subject:|dear |hi,|hello,|regards,|sincerely,/.test(s))return'communication';
  // reflection
  if(/\b(feel|feeling|felt|i am|i'm feeling|sad|anxious|grateful|overwhelmed|tired|happy|worried|stressed|frustrated|excited|hopeful|lonely|angry|proud|ashamed|confused|need to process|thinking about)\b/i.test(s))return'reflection';
  // obligation
  if(/\b(pay|bill|renew|renewal|deadline|appointment|insurance|roadtax|tax|subscription|due|expiry|expires|visa|passport|registration|rent|mortgage|utilities|invoice)\b/i.test(s))return'obligation';
  // routine
  if(/\b(gym|run|jog|journal|meditate|clean|tidy|family dinner|weekly review|daily|every morning|every evening|workout|exercise|stretch|read before|water plants)\b/i.test(s))return'routine';
  // task
  if(/^(call|follow up|followup|send|email|write|ping|remind|buy|book|schedule|prepare|review|check|fix|update|submit|complete|talk|meet|order|pay|register|sign|fill|collect|research|draft)\b/i.test(t))return'task';
  return'idea';
}
function detectEffort(txt,type){
  if(!txt)return'medium';
  const t=String(txt).toLowerCase();
  if(type==='idea'||type==='reflection')return'low';
  if(type==='routine')return'low';
  if(/\b(call|meeting|plan|review|report|discuss|present|proposal|analyse|analyze|design|strategy|interview|prepare)\b/.test(t))return'high';
  if(t.length<40&&/\b(send|reply|buy|pay|book|ping|check|read|confirm|update)\b/.test(t))return'low';
  if(t.length<40)return'low';
  return'medium';
}
function detectImportantPersonal(txt){
  return/\b(family|health|doctor|dentist|partner|wife|husband|rest|kids?|child|children|therapy|medication|hospital|emergency|appointment|mum|dad|parents?)\b/i.test(String(txt||''));
}
function classifyEmail(t){
  const s=t.toLowerCase();let score=0,cat='General';
  if(/neuter|mandul|spay|castrat|potong/.test(s)){cat='Neutering';score=/subsidis/.test(s)?3:2}
  else if(/surrender|rehome|re-home|give up|can't keep|cannot keep/.test(s)){cat='Surrender';score=2}
  else if(/volunteer|volunteering/.test(s)){cat='Volunteering';score=2}
  else if(/donat|contribut|fund|support financially/.test(s)){cat='Donation';score=2}
  return{category:cat,confidence:score>=3?'high':score>=2?'medium':'low'};
}
function extractName(text){
  const m=text.match(/(?:my name is|i am|i'm|from|regards,|sincerely,|cheers,)\s*([A-Z][a-z]+(?: [A-Z][a-z]+)?)/i);
  if(m)return m[1];
  for(const l of text.split('\n').slice(-5)){const nm=l.trim().match(/^([A-Z][a-z]+(?: [A-Z][a-z]+)?)$/);if(nm&&nm[1].length<30)return nm[1]}
  return null;
}
function generateReply(cat,tone,raw){
  const name=extractName(raw||'');
  const g=name?`Dear ${name},\n\n`:'Dear valued supporter,\n\n';
  const sign='\n\nWarm regards,\nSPCA Selangor';
  const T={
    soft:{
      Neutering:`${g}Thank you so much for contacting us about neutering — your commitment to responsible pet ownership truly matters.\n\nOur subsidised neutering programme, Potong Royong, is open to community cats and dogs. Slots fill quickly, so we encourage early registration. Please visit [INSERT POTONG ROYONG LINK] or WhatsApp us with your pet's details and preferred date.${sign}`,
      Surrender:`${g}We understand this is not an easy decision. Our shelter intake is on a waiting list. Could you share a photo, your pet's species, breed, and age so we can add you to the list?${sign}`,
      Volunteering:`${g}How wonderful — thank you! All new volunteers must complete our Pet Care Programme (PCP) orientation first. Please register at [INSERT PCP LINK].${sign}`,
      Donation:`${g}Your generosity means everything. Please donate at [INSERT DONATION LINK]. Tax-exempt receipts are issued above RM50.${sign}`,
      General:`${g}Thank you for reaching out. We'll respond within 2–3 working days. For urgent matters, please WhatsApp us.${sign}`
    },
    normal:{
      Neutering:`${g}Thank you for contacting SPCA Selangor. Our subsidised neutering programme, Potong Royong, is available for community cats and dogs. Register at [INSERT POTONG ROYONG LINK] or WhatsApp us with your pet's details and preferred date.${sign}`,
      Surrender:`${g}Thank you. Our intake is on a waiting list. Please share your pet's species, breed, age, and a photo to be added.${sign}`,
      Volunteering:`${g}Thank you for your interest. All first-time volunteers must complete our Pet Care Programme (PCP) orientation at [INSERT PCP LINK].${sign}`,
      Donation:`${g}Thank you for your support. Please donate via [INSERT DONATION LINK]. Receipts issued above RM50.${sign}`,
      General:`${g}Thank you for reaching out. We'll respond within 2–3 working days. For urgent matters, WhatsApp us via the number on our website.${sign}`
    },
    firm:{
      Neutering:`${g}Our subsidised neutering programme, Potong Royong, operates on a slot-based system. Walk-ins not accepted. Register at [INSERT POTONG ROYONG LINK].${sign}`,
      Surrender:`${g}Our intake is on a strict waiting list. Provide: species, breed, age, reason, and a photo. We'll contact you when space is available.${sign}`,
      Volunteering:`${g}All volunteers must complete the PCP orientation before joining shifts — no exceptions. Register at [INSERT PCP LINK].${sign}`,
      Donation:`${g}All donations via [INSERT DONATION LINK] only. Receipts above RM50. For corporate donations, reply directly.${sign}`,
      General:`${g}Thank you. We respond within 2–3 working days. For urgent matters, WhatsApp us via our website.${sign}`
    }
  };
  return(T[tone]||T.normal)[cat]||(T[tone]||T.normal).General;
}

// ── Guidance ───────────────────────────────────────────────────────────────
function allowedEffort(){
  if(energy==='low')return new Set(['low']);
  if(energy==='high')return new Set(['low','medium','high']);
  if(isMorning)return new Set(['low','medium']);
  if(isEvening)return new Set(['low']);
  return new Set(['low','medium','high']);
}
function naScore(i){
  if(i.type==='reflection')return -100; // never auto Next Action
  let s=0;
  if(i.important_personal)s+=100;
  if(i.context==='personal')s+=20;
  if(isOverdue(i.content?.due))s+=50;
  if(isToday(i.content?.due))s+=30;
  if(i.type==='obligation'&&(isOverdue(i.content?.due)||isToday(i.content?.due)))s+=60;
  if(routineDue(i))s+=35;
  if(i.priority==='high')s+=15;
  if(i.type==='communication')s+=5;
  const e=i.effort||'medium';
  if(allowedEffort().has(e))s+=10;else s-=20;
  if(e==='low'&&bMem.completedLow>bMem.completedHigh)s+=5;
  return s;
}
function pickNextAction(){
  const a=items.filter(i=>i.status==='active'&&i.type!=='reflection');
  if(!a.length)return null;
  return a.slice().sort((a,b)=>naScore(b)-naScore(a))[0]||null;
}
function pickPersonalMust(){
  const a=items.filter(i=>i.status==='active'&&(i.context==='personal'||i.type==='routine'||i.type==='obligation'));
  if(!a.length)return null;
  const score=i=>{
    let s=0;
    if(i.important_personal)s+=50;
    if(i.type==='obligation'&&isOverdue(i.content?.due))s+=60;
    if(i.type==='obligation'&&isToday(i.content?.due))s+=45;
    if(isOverdue(i.content?.due))s+=40;
    if(isToday(i.content?.due))s+=25;
    if(routineDue(i))s+=30;
    if(i.priority==='high')s+=15;
    if(i.type==='reflection')s-=50;
    if(isEvening)s+=5;
    return s;
  };
  return a.slice().sort((a,b)=>score(b)-score(a))[0]||null;
}
function pickNudge(){
  const a=items.filter(i=>i.status==='active');
  const doneToday=items.filter(i=>i.status==='done'&&isToday(i.completed_at||i.created_at));
  const donePersonalToday=doneToday.filter(i=>i.context==='personal');
  const oldIdeas=a.filter(i=>i.type==='idea'&&ageDays(i.created_at)>=3);
  const overdueOblig=a.filter(i=>i.type==='obligation'&&isOverdue(i.content?.due));
  const overduePersonal=a.filter(i=>i.type==='task'&&i.context==='personal'&&isOverdue(i.content?.due));
  const workCount=a.filter(i=>i.context!=='personal'&&i.type!=='routine').length;
  const personalCount=a.filter(i=>i.context==='personal').length;
  const dueRoutines=a.filter(i=>routineDue(i));
  const nudges=[];
  if(overdueOblig.length)nudges.push(`${overdueOblig.length} overdue obligation${overdueOblig.length>1?'s':''} — worth attending to.`);
  if(dueRoutines.length)nudges.push(`Your ${dueRoutines[0].content?.title||'routine'} is due. Small things compound.`);
  if(overduePersonal.length)nudges.push(`${overduePersonal.length} overdue personal task${overduePersonal.length>1?'s':''} — no rush, just worth a look.`);
  if(isEvening&&!donePersonalToday.length&&personalCount>0)nudges.push('Nothing personal ticked off today yet. Even one small thing counts.');
  if(oldIdeas.length>=3)nudges.push(`${oldIdeas.length} ideas getting dusty. Worth a quick pass?`);
  if(workCount>6&&personalCount<2)nudges.push('Work is stacking up. Your personal list is quiet — maybe that\'s fine.');
  if(isMorning&&doneToday.length===0)nudges.push('Morning. One small thing done before noon makes the rest easier.');
  return nudges[0]||null;
}
function checkStop(){
  const a=items.filter(i=>i.status==='active');
  const hasOverdue=a.some(i=>isOverdue(i.content?.due)&&i.type!=='reflection');
  const hasHighWork=a.some(i=>i.context!=='personal'&&i.priority==='high'&&i.type!=='reflection');
  const donePersonalToday=items.filter(i=>i.status==='done'&&i.context==='personal'&&isToday(i.completed_at||i.created_at));
  return !hasOverdue&&!hasHighWork&&donePersonalToday.length>0;
}

// ── Today Focus ────────────────────────────────────────────────────────────
function saveTF(){localStorage.setItem('tf',JSON.stringify(todayFocus))}
function pinItem(id){
  if(todayFocus.includes(id)){todayFocus=todayFocus.filter(x=>x!==id);saveTF();render();return}
  if(todayFocus.length>=3){showToast('Today Focus full');return}
  todayFocus.push(id);saveTF();render();showToast('Pinned to Today')}
function removeTodayPin(id,e){e&&e.stopPropagation();todayFocus=todayFocus.filter(x=>x!==id);saveTF();render()}
function buildTodayFocus(){
  const pinned=todayFocus.filter(id=>items.find(i=>i.id===id&&i.status==='active'));
  if(pinned.length>=3)return pinned.map(id=>({id,auto:false}));
  const used=new Set(pinned);const suggestions=[];
  const a=items.filter(i=>i.status==='active');
  const personal=a.filter(i=>(i.context==='personal'||i.type==='routine')&&!used.has(i.id));
  if(personal.length&&suggestions.length<3-pinned.length){suggestions.push({id:personal[0].id,auto:true});used.add(personal[0].id)}
  const urgW=a.filter(i=>i.context!=='personal'&&isUrgent(i)&&!used.has(i.id));
  if(urgW.length&&suggestions.length<3-pinned.length){suggestions.push({id:urgW[0].id,auto:true});used.add(urgW[0].id)}
  const meaningful=a.filter(i=>!used.has(i.id)&&i.priority!=='low'&&i.type!=='reflection');
  if(meaningful.length&&suggestions.length<3-pinned.length)suggestions.push({id:meaningful[0].id,auto:true});
  return[...pinned.map(id=>({id,auto:false})),...suggestions].slice(0,3);
}

function typeBadge(t){

        </div>

      </div>

  if(nudge&&energy!=='low')h+=`<div class="guidance-card nudge-card"><div class="gc-label">💬 Quiet nudge</div><div class="nudge-text">${esc(nudge)}</div></div>`;

function renderCommandLayer(){
  const el=document.getElementById('command-layer');

  const active=items.filter(i=>i.status==='active');
  const focus=active.filter(i=>i.priority==='high'&&i.type!=='reflection').slice(0,3);

  if(urgent.length)h+=mkCmd('🔴 Urgent',urgent,'urgent-item',i=>`markDone('${i.id}')`);

function mkCmd(label,arr,cls,actionFn,actionLabel){
  let h=`<div class="section-head">${label}<span></span></div><div class="cmd-items">`;
  arr.forEach(i=>{
    const meta=i.content?.due?(isOverdue(i.content.due)?'Overdue':isToday(i.content.due)?'Today':''):'';
    const act=(actionLabel?actionLabel(i):null)||(i.type==='task'||i.type==='obligation'?'Done':i.type==='routine'?'Done':'View');
    h+=`<div class="cmd-item ${cls||''} ${i.context==='personal'||i.type==='routine'?'personal-item':''}" onclick="scrollToCard('${i.id}')">
      <span class="cmd-item-text">${i.important_personal?'🌟 ':''}${esc(itemTitle(i))}</span>

      <button class="cmd-action" onclick="event.stopPropagation();${actionFn(i)}">${act}</button>

function renderTodayFocus(){

      if(it)h+=`<div class="today-slot filled${slot.auto?' suggested':''}" onclick="scrollToCard('${it.id}')">
        <span class="today-slot-text">${it.important_personal?'🌟 ':''}${esc(itemTitle(it))}</span>
        ${slot.auto?'<span class="today-slot-tag">suggested</span>':''}
        ${!slot.auto?`<button class="today-remove" onclick="removeTodayPin('${it.id}',event)">✕</button>`:''}
      </div>`;

  el.innerHTML=h+'</div>';
}
function getVisibleItems(){
  let a=items.filter(i=>i.status==='active');
  if(energy==='low')a=a.filter(i=>i.context==='personal'||i.type==='routine'||i.type==='obligation'||isUrgent(i));
  if(activeFilter==='personal')a=a.filter(i=>i.context==='personal'||i.type==='routine'||i.type==='reflection');
  else if(activeFilter==='work')a=a.filter(i=>i.context==='work'&&i.type!=='routine'&&i.type!=='reflection'&&i.type!=='obligation');
  else if(['obligation','routine','reflection'].includes(activeFilter))a=a.filter(i=>i.type===activeFilter);
  return a;
}
function sortItems(arr){
  const o=i=>{
    if(i.important_personal)return 0;
    if(i.type==='routine'&&routineDue(i))return 1;
    if(i.type==='obligation'&&isUrgent(i))return 1;
    if(i.context==='personal')return 2;
    if(isUrgent(i))return 3;
    if(i.type==='communication')return 4;
    if(i.type==='task')return 5;
    if(i.type==='reflection')return 8;
    return 6;
  };
  return[...arr].sort((a,b)=>o(a)-o(b)||new Date(b.created_at)-new Date(a.created_at));
}
function renderStream(){
  const el=document.getElementById('stream');

  let html='',lastSec='';
  sorted.forEach(i=>{
    const sec=i.important_personal?'important':i.type==='routine'?'routine':i.type==='obligation'?'obligation':i.type==='reflection'?'reflection':i.context==='personal'?'personal':isUrgent(i)?'urgent':i.type==='communication'?'inbox':i.type==='task'?'tasks':'ideas';
    if(sec!==lastSec){
      const lbl={important:'🌟 Important',routine:'🔄 Routines',obligation:'📋 Obligations',reflection:'✦ Reflections',personal:'🌿 Personal',urgent:'🔴 Urgent',inbox:'📧 Inbox',tasks:'✅ Tasks',ideas:'💡 Ideas'};
      html+=`<div class="section-head">${lbl[sec]}<span></span></div>`;

}
function renderLowLater(){

    </div>`;
  }else if(item.type==='task'){
    const over=isOverdue(c.due),tod=isToday(c.due);
    inner=`<div class="card-header"><div class="card-meta">${typeBadge('task')}<span class="badge badge-priority-${item.priority||'medium'}">${item.priority||'medium'}</span>${over?'<span class="badge badge-overdue">Overdue</span>':''}${effortBadge(effort)}${imp?'<span class="badge badge-imp">🌟</span>':''}${ctxBadge}</div><span class="card-time">${ts}</span></div>
    ${item._editing?`<div class="inline-edit-wrap"><input class="inline-edit" id="ie-${item.id}" value="${esc(c.title||'')}" onkeydown="if(event.key==='Enter')saveInlineEdit('${item.id}');if(event.key==='Escape')cancelEdit('${item.id}')"></div>`:`<div class="card-title">${esc(c.title||'Untitled')}</div>`}
    ${c.due?`<div class="card-due${over?' overdue':''}">${over?'⚠️ Overdue · ':tod?'📅 Today · ':'📅 '}${c.due}</div>`:''}
    <div class="card-actions">
      ${!done?`<button class="action-btn success" onclick="markDone('${item.id}')">✓ Done</button>
        ${item._editing?`<button class="action-btn primary" onclick="saveInlineEdit('${item.id}')">Save</button><button class="action-btn" onclick="cancelEdit('${item.id}')">✕</button>`:`<button class="action-btn" onclick="startEdit('${item.id}')">Edit</button>`}
        ${todayBtn}${impToggle}${delBtn}`:'<span class="badge badge-done">Done</span>'+delBtn}
    </div>`;
  }else{
    // idea
    const ageBadge=age>=7?`<span class="badge badge-age-old">${age}d old</span>`:age>=3?`<span class="badge badge-age">${age}d</span>`:'';
    const showReview=age>=7&&!done;
    inner=`<div class="card-header"><div class="card-meta">${typeBadge('idea')}${ageBadge}${effortBadge(effort)}${ctxBadge}</div><span class="card-time">${ts}</span></div>
    <div class="card-content">${esc(c.text||'')}</div>
    <div class="card-actions">
      <button class="action-btn primary" onclick="convertToTask('${item.id}')">→ Task</button>
      ${!done?`<button class="action-btn" onclick="archiveItem('${item.id}')">Archive</button>${todayBtn}${delBtn}`:''}
    </div>
    ${showReview?`<div class="review-actions"><span style="font-size:11px;color:var(--text3);font-weight:600;margin-right:4px">Review:</span>
      <button class="action-btn today-btn" onclick="convertToTask('${item.id}')">→ Task</button>
      <button class="action-btn today-btn" onclick="archiveItem('${item.id}')">Archive</button>
      <button class="action-btn today-btn" onclick="keepItem('${item.id}')">Keep</button>
    </div>`:''} `;
  }
  return`<div class="card type-${item.type} ctx-${ctx}${done?' done':''}${urgent?' is-urgent':''}${focus&&!urgent?' is-focus':''}" id="card-${item.id}">${inner}</div>`;
}

// ── Card actions ───────────────────────────────────────────────────────────
function startEdit(id){const i=items.find(x=>x.id===id);if(!i)return;i._editing=true;render();setTimeout(()=>{const e=document.getElementById('ie-'+id);if(e){e.focus();e.select()}},50)}
function cancelEdit(id){const i=items.find(x=>x.id===id);if(i){i._editing=false;render()}}
async function saveInlineEdit(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const el=document.getElementById('ie-'+id);if(!el)return;
  const field=i.type==='obligation'?'title':'title';
  i.content[field]=el.value;i._editing=false;
  i.effort=detectEffort(el.value,i.type);
  await dbUpdate(id,{content:i.content,effort:i.effort});render();showToast('Saved')}

async function toggleCtx(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  i.context=i.context==='personal'?'work':'personal';
  if(i.context!=='personal')i.important_personal=false;
  await dbUpdate(id,{context:i.context,important_personal:i.important_personal});render();showToast('Context updated')}

async function toggleImp(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  i.important_personal=!i.important_personal;
  if(i.important_personal)i.context='personal';
  await dbUpdate(id,{important_personal:i.important_personal,context:i.context});render();showToast(i.important_personal?'Marked important 🌟':'Unmarked')}

function setTone(id,tone){
  const i=items.find(x=>x.id===id);if(!i)return;
  i.content.tone=tone;
  i.content.reply=generateReply(i.content.category,tone,i.content.full||i.content.preview||'');
  dbUpdate(id,{content:i.content});
  const rt=document.getElementById('rt-'+id);const re=document.getElementById('re-'+id);
  if(rt)rt.textContent=i.content.reply;if(re)re.value=i.content.reply;
  document.querySelectorAll(`#card-${id} .tone-btn`).forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===tone));
  showToast('Tone updated')}

function toggleEdit(id){
  const te=document.getElementById('rt-'+id),ee=document.getElementById('re-'+id),btn=document.getElementById('edit-btn-'+id);
  if(!te||!ee)return;
  if(ee.style.display==='none'){ee.style.display='block';te.style.display='none';if(btn)btn.textContent='Save'}
  else{const v=ee.value;te.textContent=v;ee.style.display='none';te.style.display='block';if(btn)btn.textContent='Edit';
    const i=items.find(x=>x.id===id);if(i){i.content.reply=v;dbUpdate(id,{content:i.content})}}}

function copyReply(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const r=i.content?.reply||'';
  navigator.clipboard.writeText(r).catch(()=>{const ta=document.createElement('textarea');ta.value=r;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});
  showToast('Reply copied!')}

async function markDone(id){
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  const prev=JSON.parse(JSON.stringify(items[idx]));
  const ts=new Date().toISOString();
  const eff=items[idx].effort||'medium';
  if(eff==='low')bMem.completedLow++;else if(eff==='medium')bMem.completedMed++;else bMem.completedHigh++;
  saveBMem();
  items[idx].status='done';items[idx].completed_at=ts;
  render();
  await dbUpdate(id,{status:'done',completed_at:ts});
  showUndo(id,prev);
  setTimeout(()=>{
    const nextNA=pickNextAction();
    if(nextNA){
      const card=document.getElementById('card-'+nextNA.id);if(card)card.classList.add('chain-next');
      const gcn=document.getElementById('gc-next');if(gcn)gcn.classList.add('chain-highlight');
      setTimeout(()=>{if(card)card.classList.remove('chain-next');if(gcn)gcn.classList.remove('chain-highlight')},1600);
    }
  },400);
}
async function completeRoutine(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  i.content.last_completed=todayStr;
  const ts=new Date().toISOString();
  await dbUpdate(id,{content:i.content,completed_at:ts});
  render();showToast('Routine done for today ✓')}

async function keepItem(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const ts=new Date().toISOString();
  i.reviewed_at=ts;
  await dbUpdate(id,{reviewed_at:ts});render();showToast('Kept')}

async function archiveItem(id){
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  items[idx].status='archived';render();await dbUpdate(id,{status:'archived'});showToast('Archived')}

async function convertToTask(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const txt=i.content.text||i.content.title||'Task from idea';
  const effort=detectEffort(txt,'task');
  const saved=await dbSave({type:'task',content:{title:txt},priority:'medium',context:i.context||'work',important_personal:i.important_personal||false,effort,status:'active',created_at:new Date().toISOString()});
  if(saved){items.unshift(enrichItem(saved));await markDone(id);render();showToast('Converted!')}}

function showUndo(id,prev){
  clearTimeout(undoTimer);undoStack={id,prev};
  document.getElementById('undo-bar').classList.add('show');
  undoTimer=setTimeout(()=>{document.getElementById('undo-bar').classList.remove('show');undoStack=null},5000)}
async function undoDone(){
  if(!undoStack)return;
  const{id,prev}=undoStack;
  const idx=items.findIndex(i=>i.id===id);
  if(idx>=0){
    const eff=items[idx].effort||'medium';
    if(eff==='low'&&bMem.completedLow>0)bMem.completedLow--;
    else if(eff==='medium'&&bMem.completedMed>0)bMem.completedMed--;
    else if(bMem.completedHigh>0)bMem.completedHigh--;
    saveBMem();
    items[idx]=prev;await dbUpdate(id,{status:'active',completed_at:null});render();showToast('Undone!')}
  document.getElementById('undo-bar').classList.remove('show');undoStack=null;clearTimeout(undoTimer)}

function scrollToCard(id){
  const el=document.getElementById('card-'+id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--purple)';setTimeout(()=>el.style.outline='none',1500)}}

// ── Modal ──────────────────────────────────────────────────────────────────
function onSmartInput(){
  if(override)return;
  const val=document.getElementById('smart-input').value;
  const det=detectType(val);
  const sugCtx=val.length>2?detectCtx(val):null;
  const el=document.getElementById('modal-detect');
  const icons={task:'✅',idea:'💡',reflection:'✦',obligation:'📋',routine:'🔄',communication:'📧'};
  const lbls={task:'Treating as task',idea:'Saving as idea',reflection:'Saving as reflection',obligation:'Saving as obligation',routine:'Saving as routine',communication:'Email detected'};
  if(!det){el.innerHTML='What\'s on your mind?';return}
  el.innerHTML=`${icons[det]||'💡'} <span>${lbls[det]||'Saving'}</span>${sugCtx==='personal'?' · <span style="color:var(--green)">🌿 personal?</span>':''}`;
  if(sugCtx&&sugCtx!==modalCtx)setCtx(sugCtx);
  // show freq for routine/obligation
  const ff=document.getElementById('freq-field');
  if(ff)ff.style.display=(det==='routine'||det==='obligation')?'block':'none';
}
function setOverride(type,btn){
  override=type===override?null:type;
  document.querySelectorAll('.override-btn').forEach(b=>b.classList.remove('active'));
  if(override)btn.classList.add('active');
  const ff=document.getElementById('freq-field');
  if(ff)ff.style.display=(override==='routine'||override==='obligation')?'block':'none';
  const el=document.getElementById('modal-detect');
  const icons={task:'✅',idea:'💡',reflection:'✦',obligation:'📋',routine:'🔄',communication:'📧'};
  const lbls={task:'Treating as task',idea:'Saving as idea',reflection:'Saving as reflection',obligation:'Saving as obligation',routine:'Saving as routine',communication:'Email detected'};
  if(override)el.innerHTML=`${icons[override]} <span>Forced: ${lbls[override]||override}</span>`;
  else onSmartInput();
}
function setCtx(ctx){
  modalCtx=ctx;
  document.getElementById('ctx-work').className='ctx-btn'+(ctx==='work'?' active-work':'');
  document.getElementById('ctx-personal').className='ctx-btn'+(ctx==='personal'?' active-personal':'');}
function toggleRefine(btn){
  const f=document.getElementById('refine-fields');
  const open=f.classList.toggle('open');
  btn.textContent=(open?'▾':'▸')+' Refine';}
function openModal(){
  document.getElementById('overlay').classList.add('open');
  override=null;modalCtx='work';
  document.querySelectorAll('.override-btn').forEach(b=>b.classList.remove('active'));
  setCtx('work');
  document.getElementById('modal-detect').innerHTML='What\'s on your mind?';
  document.getElementById('refine-fields').classList.remove('open');
  document.getElementById('refine-toggle-btn').textContent='▸ Refine';
  document.getElementById('smart-input').value='';
  const ff=document.getElementById('freq-field');if(ff)ff.style.display='none';
  setTimeout(()=>document.getElementById('smart-input').focus(),80);}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function closeModalOutside(e){if(e.target===document.getElementById('overlay'))closeModal()}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');renderStream();}

async function submitSmart(){
  const txt=document.getElementById('smart-input').value.trim();
  if(!txt){showToast('Type something first');return}
  const type=override||detectType(txt)||'idea';
  const priority=document.getElementById('item-priority').value||'medium';
  const ctx=modalCtx||'work';
  const due=document.getElementById('task-due').value;
  const freq=document.getElementById('task-freq').value;
  const effort=detectEffort(txt,type);
  const impP=ctx==='personal'&&detectImportantPersonal(txt);
  const now=new Date().toISOString();
  let item={status:'active',created_at:now,context:ctx,priority,effort,important_personal:impP};
  if(type==='communication'){
    const{category,confidence}=classifyEmail(txt);
    const reply=generateReply(category,'normal',txt);
    item={...item,type:'communication',content:{preview:txt.replace(/\s+/g,' ').slice(0,300),category,confidence,reply,full:txt,tone:'normal'}};
  }else if(type==='task'){
    item={...item,type:'task',content:{title:txt,due}};
  }else if(type==='reflection'){
    item={...item,type:'reflection',context:'personal',content:{text:txt}};
  }else if(type==='obligation'){
    item={...item,type:'obligation',context:ctx==='personal'?ctx:'personal',content:{title:txt,due,frequency:freq||null}};
  }else if(type==='routine'){
    item={...item,type:'routine',context:'personal',content:{title:txt,frequency:freq||'weekly',last_completed:null}};
  }else{
    item={...item,type:'idea',content:{text:txt}};
  }
  const saved=await dbSave(item);
  if(saved){items.unshift(enrichItem(saved));render();closeModal();showToast(type==='communication'?`Classified: ${saved.content.category}`:`Saved${impP?' 🌟':ctx==='personal'?' 🌿':''}`)}
}

function setEnergy(level,btn){
  energy=level;document.querySelectorAll('.energy-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render()}

let toastT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400)}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openModal()}});
</script>
