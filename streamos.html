<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StreamOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f4f4f4;--surface:#fff;--surface2:#f0f0f0;--surface3:#e6e6e6;
  --on-s:#111;--on-s2:#555;--on-s3:#999;--on-s4:#ccc;
  --border:#e0e0e0;--border-l:#ebebeb;
  --accent:#1a73e8;--accent-l:#e8f0fe;
  --green:#1a7340;--green-l:#e6f4ea;--green-b:#9dd4b0;
  --orange:#b55a00;--orange-l:#fff3e0;
  --red:#c5221f;--red-l:#fce8e6;--red-b:#f1b8b5;
  --teal:#00757a;--teal-l:#e0f7fa;
  --purple:#6a0dad;--purple-l:#f3e5f5;
  --personal-bg:#edf7f0;--personal-b:#9dd4b0;
  --s1:0 1px 3px rgba(0,0,0,.08);
  --s2:0 2px 10px rgba(0,0,0,.12);
  --s3:0 8px 28px rgba(0,0,0,.16);
  --r:12px;--rsm:8px;--rpill:100px;
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  --na-size:18px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d0d0d;--surface:#1a1a1a;--surface2:#222;--surface3:#2c2c2c;
  --on-s:#f0f0f0;--on-s2:#999;--on-s3:#555;--on-s4:#333;
  --border:#2a2a2a;--border-l:#222;
  --accent:#5ca7f8;--accent-l:#132038;
  --green:#4caf76;--green-l:#0a1f12;--green-b:#1d5c30;
  --orange:#ffb347;--orange-l:#1f1000;
  --red:#f28080;--red-l:#200808;--red-b:#4a1010;
  --teal:#5dc7d0;--teal-l:#001518;
  --purple:#c084f5;--purple-l:#1a0028;
  --personal-bg:#0a1f12;--personal-b:#1d5c30;
  --s1:0 1px 3px rgba(0,0,0,.4);
  --s2:0 2px 10px rgba(0,0,0,.5);
  --s3:0 8px 28px rgba(0,0,0,.7);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{font-family:var(--f);background:var(--bg);color:var(--on-s);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#boot{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#boot.off{display:none}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.boot-lbl{font-size:13px;color:var(--on-s3);font-weight:500}
#boot-err{display:none;text-align:center;padding:0 32px;max-width:320px}
.boot-err-h{font-size:16px;font-weight:600;color:var(--on-s);margin-bottom:6px}
.boot-err-p{font-size:13px;color:var(--on-s2);margin-bottom:18px;line-height:1.5}
.boot-err-btns{display:flex;gap:10px;justify-content:center}
#banner{display:none;position:sticky;top:0;z-index:300;background:var(--red-l);border-bottom:1px solid var(--red-b);padding:10px 20px}
#banner.show{display:block}
.banner-in{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.banner-txt{font-size:13px;color:var(--red);font-weight:500}
.banner-btns{display:flex;gap:8px}
.btn{border:none;cursor:pointer;font-family:var(--f);font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;border-radius:var(--rpill);font-size:13px}
.btn:hover{opacity:.85}.btn:disabled{opacity:.35;cursor:not-allowed}
.b-fill{background:var(--accent);color:#fff;padding:8px 18px}
.b-fill.g{background:var(--green)}.b-fill.r{background:var(--red)}
.b-out{background:transparent;border:1px solid var(--border);color:var(--on-s2);padding:7px 15px}
.b-ghost{background:transparent;color:var(--on-s2);padding:6px 10px}
.b-sm{padding:5px 12px;font-size:12px}
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
#auth.show{display:flex}
.auth-card{background:var(--surface);border-radius:16px;padding:40px 32px;max-width:360px;width:100%;box-shadow:var(--s2)}
.auth-logo{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:-.5px}
.auth-tag{font-size:13px;color:var(--on-s3);margin-bottom:28px}
.flbl{display:block;font-size:11px;font-weight:600;color:var(--on-s2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:14px;color:var(--on-s);font-family:var(--f);outline:none;transition:border-color .15s;margin-bottom:10px}
.finput:focus{border-color:var(--accent);background:var(--surface)}
.auth-div{text-align:center;font-size:11px;color:var(--on-s3);margin:8px 0}
.auth-msg{font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.auth-msg.ok{color:var(--green)}.auth-msg.err{color:var(--red)}
#app{display:none}
#app.show{display:block;padding-bottom:100px}
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border-l);padding:0 20px}
.topbar-in{max-width:640px;margin:0 auto;height:50px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:16px;font-weight:700;color:var(--on-s);letter-spacing:-.4px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mode-grp{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rpill);padding:2px;gap:1px}
.mode-opt{border:none;background:transparent;font-family:var(--f);font-size:11px;font-weight:600;color:var(--on-s3);padding:4px 11px;cursor:pointer;transition:all .15s;border-radius:var(--rpill)}
.mode-opt.on{background:var(--surface);color:var(--on-s);box-shadow:var(--s1)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;transition:background .3s}
.sync-dot.saving{background:var(--orange)}.sync-dot.err{background:var(--red)}.sync-dot.reconn{background:var(--accent)}
.profile-btn{border:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rpill);padding:4px 11px;font-size:12px;font-weight:500;color:var(--on-s2);cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:6px}
.profile-btn:hover{border-color:var(--on-s3)}
.profile-menu{position:absolute;top:50px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--s2);min-width:160px;z-index:400;display:none;overflow:hidden}
.profile-menu.open{display:block}
.pm-item{display:block;width:100%;text-align:left;border:none;background:none;font-family:var(--f);font-size:13px;padding:11px 16px;cursor:pointer;color:var(--on-s2);transition:background .12s}
.pm-item:hover{background:var(--surface2)}.pm-item.danger{color:var(--red)}
.pm-divider{height:1px;background:var(--border-l)}
.page{max-width:640px;margin:0 auto;padding:0 20px}
.anchor-zone{padding:16px 0 4px}
.personal-anchor{background:var(--personal-bg);border:1.5px solid var(--personal-b);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:box-shadow .15s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.personal-anchor:hover{box-shadow:var(--s1)}
.personal-anchor.no-item{opacity:.5;cursor:default;pointer-events:none}
.pa-left{flex:1;min-width:0}
.pa-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--green);margin-bottom:5px}
.pa-title{font-size:16px;font-weight:600;color:var(--on-s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.pa-meta{font-size:12px;color:var(--on-s3);margin-top:3px}
.pa-action{flex-shrink:0;border:none;background:var(--green);color:#fff;border-radius:var(--rsm);padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);transition:opacity .15s;white-space:nowrap}
.pa-action:hover{opacity:.9}.pa-action:disabled{opacity:.35;cursor:not-allowed}
.na-zone{padding:8px 0 4px}
.na-card{background:var(--accent-l);border:1.5px solid var(--accent);border-radius:var(--r);padding:18px 18px 16px;transition:box-shadow .15s}
.na-card.urgent{background:var(--red-l);border-color:var(--red-b)}
.na-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:8px}
.na-card.urgent .na-eyebrow{color:var(--red)}
.na-title{font-size:var(--na-size);font-weight:600;color:var(--on-s);line-height:1.3;margin-bottom:4px;cursor:pointer}
.na-meta{font-size:12px;color:var(--on-s3);margin-bottom:14px}
.na-btn{width:100%;border:none;background:var(--accent);color:#fff;border-radius:var(--rsm);padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--f);transition:opacity .15s;letter-spacing:-.1px}
.na-btn:hover{opacity:.9}.na-btn:disabled{opacity:.35;cursor:not-allowed}
.na-btn.g{background:var(--green)}.na-btn.r{background:var(--red)}
body.stopped .stream-items{pointer-events:none;opacity:.3}
body.stopped .na-zone{pointer-events:none;opacity:.5}
.stop-zone{display:none;padding:8px 0}
body.stopped .stop-zone{display:block}
.stop-card{background:var(--green-l);border:1.5px solid var(--green-b);border-radius:var(--r);padding:20px 20px 16px;text-align:center}
.stop-title{font-size:17px;font-weight:700;color:var(--green);margin-bottom:6px}
.stop-sub{font-size:13px;color:var(--green);opacity:.85;line-height:1.5;margin-bottom:14px}
.stop-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.stop-act{border:1px solid var(--green-b);background:var(--surface);color:var(--green);border-radius:var(--rpill);padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .15s}
.stop-act:hover{background:var(--green-l)}.stop-act.primary{background:var(--green);color:#fff;border-color:var(--green)}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--on-s4);padding:16px 0 6px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border-l)}
.stream-items{display:flex;flex-direction:column;gap:1px}
.card{background:var(--surface);border-radius:0;border-bottom:1px solid var(--border-l);transition:background .12s,opacity .2s;overflow:hidden}
.card:first-child{border-radius:var(--r) var(--r) 0 0}
.card:last-child{border-radius:0 0 var(--r) var(--r);border-bottom:none}
.card:only-child{border-radius:var(--r)}
.card.done{opacity:.32;pointer-events:none}
.card.locked .ca-lock{pointer-events:none;opacity:.35}
.card.w-urgent{border-left:3px solid var(--red)}
.card.w-high{border-left:3px solid var(--orange)}
.card.w-personal{border-left:3px solid var(--green)}
.card.w-normal{border-left:3px solid transparent}
.card.type-reflection{background:var(--purple-l)}
.card.type-routine{background:var(--teal-l)}
.card.type-obligation.w-urgent{background:var(--red-l)}
.card.in-progress-card{box-shadow:inset 3px 0 0 var(--accent)}
.card-in{padding:12px 14px 11px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.card-in:hover{background:rgba(0,0,0,.02)}
.card-left{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--on-s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.card-sub{font-size:12px;color:var(--on-s3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub.urgent{color:var(--red);font-weight:500}
.ip-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:5px;vertical-align:middle;opacity:.7}
.card-act{flex-shrink:0;border:none;border-radius:var(--rsm);padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);transition:opacity .15s;white-space:nowrap}
.card-act:hover{opacity:.85}.card-act:disabled{opacity:.35;cursor:not-allowed}
.card-act.done{background:var(--green);color:#fff}
.card-act.copy{background:var(--accent-l);color:var(--accent)}
.card-act.routine{background:var(--teal-l);color:var(--teal)}
.card-detail{display:none;padding:0 14px 12px 16px;border-top:1px solid var(--border-l)}
.card-detail.open{display:block}
.card-detail-actions{display:flex;gap:5px;flex-wrap:wrap;padding-top:10px}
.ca{border:none;cursor:pointer;font-family:var(--f);font-weight:500;font-size:12px;padding:5px 11px;border-radius:var(--rpill);transition:all .12s}
.ca-muted{background:var(--surface2);color:var(--on-s2)}.ca-muted:hover{background:var(--surface3)}
.ca-accent{background:var(--accent-l);color:var(--accent)}
.ca-danger{background:transparent;color:var(--red)}.ca-danger:hover{background:var(--red-l)}
.ca-imp.on{background:var(--orange-l);color:var(--orange)}
.ca:disabled{opacity:.35;cursor:not-allowed}
.inline-edit{width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:var(--rsm);padding:7px 10px;font-size:14px;color:var(--on-s);font-family:var(--f);outline:none;margin:8px 0}
.reply-wrap{background:var(--surface2);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px}
.reply-ey{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--on-s3);margin-bottom:5px}
.reply-body{font-size:12px;color:var(--on-s2);line-height:1.6;white-space:pre-wrap}
.reply-edit{width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:var(--rsm);padding:8px 10px;font-size:12px;color:var(--on-s);line-height:1.6;resize:vertical;min-height:70px;font-family:var(--f);outline:none}
.tone-row{display:flex;gap:4px;margin-bottom:8px;align-items:center}
.tlbl{font-size:11px;color:var(--on-s3);margin-right:2px}
.tbtn{border:1px solid var(--border);background:none;font-size:11px;padding:3px 9px;border-radius:var(--rpill);cursor:pointer;color:var(--on-s2);font-family:var(--f)}
.tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.rfl-body{font-size:13px;color:var(--on-s2);font-style:italic;line-height:1.6;padding:8px 0 4px}
.routine-next{font-size:12px;color:var(--teal);margin-bottom:6px}
.stream-group{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--s1);margin-bottom:4px}
.empty{text-align:center;padding:40px 20px;color:var(--on-s3);font-size:14px}
.nudge-strip{padding:12px 0 4px}
.nudge-txt{font-size:12px;color:var(--on-s3);line-height:1.5;font-style:italic;text-align:center}
.fab{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;border:none;border-radius:var(--rpill);padding:0 24px;height:52px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:var(--s3);display:flex;align-items:center;gap:8px;z-index:200;font-family:var(--f);transition:opacity .15s}
.fab:hover{opacity:.92}.fab:disabled{opacity:.35;cursor:not-allowed}
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
@media(min-width:640px){.sheet-bg{align-items:center;padding:20px}}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:0 0 32px;box-shadow:var(--s3);max-height:88vh;overflow-y:auto}
@media(min-width:640px){.sheet{border-radius:14px;max-height:76vh}}
.sheet-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 14px}
@media(min-width:640px){.sheet-drag{display:none}}
.sheet-body{padding:0 18px}
.sheet-detect{font-size:11px;color:var(--on-s3);margin-bottom:7px;min-height:16px;font-weight:500}
.sheet-detect span{color:var(--accent)}
.cap-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:13px;font-size:16px;color:var(--on-s);font-family:var(--f);outline:none;resize:none;min-height:80px;line-height:1.5;transition:border-color .15s}
.cap-ta:focus{border-color:var(--accent);background:var(--surface)}
.sheet-advanced{display:none;flex-direction:column;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-l)}
.sheet-advanced.open{display:flex}
.adv-toggle{border:none;background:none;font-size:12px;color:var(--on-s3);cursor:pointer;font-family:var(--f);margin-top:10px;padding:0;font-weight:500}
.adv-toggle:hover{color:var(--accent)}
.srow{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.srow-lbl{font-size:11px;font-weight:600;color:var(--on-s3);white-space:nowrap}
.sc{border:1px solid var(--border);background:none;font-size:12px;font-weight:500;padding:4px 11px;border-radius:var(--rpill);cursor:pointer;color:var(--on-s3);font-family:var(--f);transition:all .12s}
.sc.on{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}
.sc.ctx-p.on{background:var(--personal-bg);color:var(--green);border-color:var(--personal-b)}
.flbl2{display:block;font-size:11px;font-weight:600;color:var(--on-s3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fi,.fsel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 11px;font-size:13px;color:var(--on-s);font-family:var(--f);outline:none}
.fi:focus,.fsel:focus{border-color:var(--accent)}
.cap-save-row{margin-top:14px}
.cap-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--f);transition:opacity .15s}
.cap-save:hover{opacity:.9}.cap-save:disabled{opacity:.35;cursor:not-allowed}
.undo-bar{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--on-s);color:var(--surface);padding:9px 14px;border-radius:var(--rpill);font-size:13px;font-weight:500;z-index:999;display:flex;align-items:center;gap:11px;box-shadow:var(--s3);opacity:0;transition:opacity .2s;pointer-events:none;font-family:var(--f)}
.undo-bar.show{opacity:1;pointer-events:all}
.undo-act{background:var(--accent);color:#fff;border:none;border-radius:var(--rpill);padding:4px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--on-s);color:var(--surface);padding:9px 18px;border-radius:var(--rpill);font-size:13px;font-weight:500;z-index:998;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.stream-err{display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px 20px;text-align:center}
.stream-err p{font-size:14px;color:var(--on-s2);line-height:1.5}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-spin" class="spinner"></div>
  <div id="boot-lbl" class="boot-lbl">Starting up…</div>
  <div id="boot-err">
    <div class="boot-err-h">Couldn't start</div>
    <div class="boot-err-p" id="boot-err-p">Check your connection.</div>
    <div class="boot-err-btns">
      <button class="btn b-fill b-sm" onclick="retryBoot()">Try again</button>
      <button class="btn b-out b-sm" onclick="signOut()">Sign out</button>
    </div>
  </div>
</div>

<div id="banner">
  <div class="banner-in">
    <span class="banner-txt" id="banner-msg">Session expired.</span>
    <div class="banner-btns">
      <button class="btn b-out b-sm" onclick="handleReconnect()">Reconnect</button>
      <button class="btn b-fill b-sm r" onclick="signOut()">Sign out</button>
    </div>
  </div>
</div>

<div id="auth">
  <div class="auth-card">
    <div class="auth-logo">StreamOS</div>
    <div class="auth-tag">Your daily operating layer</div>
    <div id="auth-magic">
      <label class="flbl">Email</label>
      <input class="finput" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
      <button class="btn b-fill" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="sendMagicLink()">Send magic link</button>
      <div class="auth-div">or</div>
      <button class="btn b-out" style="width:100%;justify-content:center;padding:9px" onclick="showPwForm()">Sign in with password</button>
    </div>
    <div id="auth-pw" style="display:none">
      <label class="flbl">Email</label>

const routineND=i=>{const f=i.content?.frequency,l=i.content?.last_completed;if(!f||!l)return null;const d=new Date(l);if(f==='daily')d.setDate(d.getDate()+1);else if(f==='weekly')d.setDate(d.getDate()+7);else if(f==='monthly')d.setMonth(d.getMonth()+1);else if(f==='yearly')d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10)};

const iTitle=i=>{if(i.type==='task')return i.content?.title;if(i.type==='communication')return(i.content?.category||'Email')+' email';if(i.type==='routine')return i.content?.title||i.content?.text;if(i.type==='obligation')return i.content?.title||i.content?.text;return trunc(i.content?.text,52)};
function dCtx(txt){return/\b(buy|gym|dinner|family|rest|holiday|kids?|home|cook|sleep|relax|mum|dad|wife|husband|partner|friends?|weekend|grocery|groceries|birthday|health|doctor|dentist|exercise|run|walk|movie|date night|lunch|breakfast|clean|laundry|bank|renew|garden|pet|school|journal|meditate)\b/i.test(String(txt||''))?'personal':'work'}
function dType(txt){
  if(!txt||txt.trim().length<2)return null;
  const t=txt.trim(),s=t.toLowerCase();
  if(t.length>80&&/from:|to:|subject:|dear |hi,|hello,|regards,|sincerely,/.test(s))return'communication';
  if(/\b(feel|feeling|felt|i am|i'm feeling|sad|anxious|grateful|overwhelmed|tired|happy|worried|stressed|frustrated|excited|hopeful|lonely|angry|proud|ashamed|confused|need to process)\b/i.test(s))return'reflection';
  if(/\b(pay|bill|renew|renewal|deadline|appointment|insurance|roadtax|tax|subscription|due|expiry|expires|visa|passport|registration|rent|mortgage|utilities|invoice)\b/i.test(s))return'obligation';
  if(/\b(gym|run|jog|journal|meditate|clean|tidy|family dinner|weekly review|workout|exercise|stretch|water plants)\b/i.test(s))return'routine';
  if(/^(call|follow up|followup|send|email|write|ping|remind|buy|book|schedule|prepare|review|check|fix|update|submit|complete|talk|meet|order|pay|register|sign|fill|collect|research|draft)\b/i.test(t))return'task';
  return'idea';
}
function dEffort(txt,type){if(!txt)return'medium';const t=String(txt).toLowerCase();if(type==='idea'||type==='reflection'||type==='routine')return'low';if(/\b(call|meeting|plan|review|report|discuss|present|proposal|analyse|analyze|design|strategy|interview|prepare)\b/.test(t))return'high';if(t.length<40&&/\b(send|reply|buy|pay|book|ping|check|read|confirm|update)\b/.test(t))return'low';if(t.length<40)return'low';return'medium'}
function dImp(txt){return/\b(family|health|doctor|dentist|partner|wife|husband|rest|kids?|child|children|therapy|medication|hospital|emergency|appointment|mum|dad|parents?)\b/i.test(String(txt||''))}

// ── Part A: Energy decay (D) ────────────────────────────────────────────────

  actionsLocked=s==='session_expired'||s==='error'||s==='reconnecting';
  if(fab)fab.disabled=actionsLocked;if(saveBtn)saveBtn.disabled=actionsLocked;
  if(s==='session_expired'||s==='error'){banner.classList.add('show');document.getElementById('banner-msg').textContent=msg||(s==='session_expired'?'Session expired.':'Something went wrong.')}
  else banner.classList.remove('show');

// ── Auto-convert stale ideas ───────────────────────────────────────────────
async function autoConvertStaleIdeas(){
  const stale=items.filter(i=>i.type==='idea'&&i.status==='active'&&ageDays(i.created_at)>=7&&!i.reviewed_at);
  if(!stale.length)return;
  for(const i of stale){
    const txt=i.content?.text||'Task from idea';
    const snapshot={type:i.type,content:{...i.content},effort:i.effort,reviewed_at:i.reviewed_at};
    const updated={type:'task',content:{title:txt,due:''},effort:dEffort(txt,'task'),reviewed_at:new Date().toISOString()};
    Object.assign(i,updated);
    try{await dbUpdate(i.id,updated)}
    catch(e){Object.assign(i,snapshot);console.warn('Auto-convert failed for',i.id,e.message)}
  }
  render();
}

// ── Guidance ───────────────────────────────────────────────────────────────
function allowedEffort(){
  let base;
  if(mode==='overwhelmed')base=new Set(['low']);
  else if(mode==='manage')base=new Set(['low','medium','high']);
  else if(isMorning)base=new Set(['low','medium']); // Part B
  else if(isEvening)base=new Set(['low']);           // Part F
  else base=new Set(['low','medium','high']);
  return energyDecayedEffort(base);                  // Part D overlay
}

// ── Part B/F: Personal Anchor priority score ───────────────────────────────
function pmScore(i){
  let s=0;
  // Explicit priority order: obligation > health/critical > routine > personal task
  if(i.type==='obligation'&&(isOverdue(i.content?.due)||isToday(i.content?.due)))s+=80;
  else if(i.type==='obligation')s+=40;
  if(i.important_personal){
    // Health/critical personal outranks generic important
    const txt=(i.content?.text||i.content?.title||'').toLowerCase();
    const isHealth=/\b(doctor|dentist|hospital|therapy|medication|health|medical|appointment)\b/.test(txt);
    s+=isHealth?70:50;
  }
  if(routineDue(i)){
    s+=30;
    if(isMorning)s+=20; // Part B: morning routine boost
  }
  if(i.context==='personal'){
    s+=15;
    if(isMorning)s+=10; // Part B: morning personal boost
    if(isEvening)s+=15; // Part F: evening personal boost (additional)
  }
  if(isOverdue(i.content?.due))s+=40;
  if(isToday(i.content?.due))s+=25;
  if(i.priority==='high')s+=15;
  // Part F: reflections can surface as PA in evening when no urgent items
  if(i.type==='reflection'){
    if(isEvening){
      const hasUrgent=items.some(x=>x.status==='active'&&isUrgent(x));
      if(!hasUrgent)s+=20;
      else s-=50;
    }else{
      s-=50;
    }
  }
  // Part F: evening — multiply personal weight
  if(isEvening&&(i.context==='personal'||i.type==='routine'))s=Math.floor(s*1.5);
  return s;
}

// ── Part C: Strategic override detection ──────────────────────────────────
function isStrategicItem(i){
  const t=(i.content?.title||i.content?.text||'').toLowerCase();
  return(i.effort==='high'||i.effort==='medium')||(
    /\b(plan|review|strategy|proposal|discuss|prepare|analyse|analyze|design|report)\b/.test(t)
  );
}

function naScore(i){
  if(i.type==='reflection'&&!i.important_personal)return-100;
  let s=0;
  if(i.important_personal)s+=100;
  if(i.context==='personal')s+=20;
  if(isOverdue(i.content?.due))s+=50;
  if(isToday(i.content?.due))s+=30;
  if(i.type==='obligation'&&(isOverdue(i.content?.due)||isToday(i.content?.due)))s+=60;
  if(routineDue(i))s+=35;
  if(i.priority==='high')s+=15;
  if(i.type==='communication')s+=5;
  const e=i.effort||'medium';
  const ae=allowedEffort();
  if(ae.has(e))s+=10;else s-=20;
  if(e==='low'&&bMem.low>bMem.high)s+=5;
  // Part E: in-progress boost
  if(i.in_progress)s+=10;
  // Part F: evening — non-personal items cannot override unless obligation overdue
  if(isEvening&&i.context!=='personal'&&i.type!=='obligation'){
    const overdue=isOverdue(i.content?.due)||isToday(i.content?.due);
    if(!overdue)s-=60;
  }
  // Part B: morning — routines get priority unless obligation overdue
  if(isMorning&&i.type==='routine'&&routineDue(i))s+=25;
  return s;
}

function pickNA(){
  const a = items.filter(i => i.status === 'active' && isActionable(i));
  if(!a.length)return null;
  let candidates=a.slice().sort((a,b)=>naScore(b)-naScore(a));
  // Part C: if on a reactive streak, force strategic item
  if(consecutiveCompletions>=3){
    const strategic=candidates.find(i=>isStrategicItem(i));
    if(strategic)return strategic;
  }
  // Part B: morning — don't override due routine unless obligation is overdue
  if(isMorning){
    const dueRoutine=candidates.find(i=>i.type==='routine'&&routineDue(i));
    const overdueObligation=candidates.find(i=>i.type==='obligation'&&(isOverdue(i.content?.due)||isToday(i.content?.due)));
    if(dueRoutine&&!overdueObligation)return dueRoutine;
  }
  return candidates[0]||null;
}

function pickPM(){
  const base=items.filter(i=>i.status==='active' && isActionable(i)&&(
    i.context==='personal'||i.type==='routine'||i.type==='obligation'||
    (i.type==='reflection'&&isEvening)
  ));
  if(!base.length)return null;
  return base.slice().sort((a,b)=>pmScore(b)-pmScore(a))[0];
}

function pickNudge(){
  const a = items.filter(i => i.status === 'active' && isActionable(i));
  const dt=items.filter(i=>i.status==='done'&&isToday(i.completed_at||i.created_at));
  const dtP=dt.filter(i=>i.context==='personal');
  const oob=a.filter(i=>i.type==='obligation'&&isOverdue(i.content?.due));
  const dr=a.filter(i=>routineDue(i));
  const oi=a.filter(i=>i.type==='idea'&&ageDays(i.created_at)>=3);
  const op=a.filter(i=>i.type==='task'&&i.context==='personal'&&isOverdue(i.content?.due));
  if(oob.length)return`${oob.length} overdue obligation${oob.length>1?'s':''}.`;
  if(dr.length)return`${dr[0].content?.title||'A routine'} is due.`;
  if(op.length)return`${op.length} personal task${op.length>1?'s':''} overdue.`;
  // Part F/B time-aware nudges
  if(isNight)return'Capture anything left, then stop.';
  if(isEvening&&!dtP.length&&a.some(i=>i.context==='personal'))return'Close what you can today.';
  if(isEvening)return'Close what you can today.';
  if(isMorning&&dt.length===0)return'Start with one small thing.';
  if(oi.length>=3)return`${oi.length} ideas getting old.`;
  return'Start with one small thing.';
}

// ── Part G: Stop state with continueQuota ─────────────────────────────────
function checkStop(){
  if(stopOverride)return false;
  const a=items.filter(i=>i.status==='active' && isActionable(i));
  return!a.some(i=>isOverdue(i.content?.due)&&i.type!=='reflection')
    &&!a.some(i=>i.context!=='personal'&&i.priority==='high'&&i.type!=='reflection')
    &&items.some(i=>i.status==='done'&&i.context==='personal'&&isToday(i.completed_at||i.created_at));
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  recomputeTime(); // Always fresh on render
  const stop=checkStop()&&mode!=='manage';
  document.body.classList.toggle('stopped',stop);
  const na=pickNA(),pm=pickPM(),naIspm=na&&pm&&na.id===pm.id;
  renderPersonalAnchor(pm,na);renderStop(stop);renderNA(na,naIspm);renderNudge();renderStream();
}

function renderStop(stop){

// Part G: controlled continuation
function doContinue(){
  continueQuota=1;
  stopOverride=true;
  document.body.classList.remove('stopped');
  showToast('Continuing…');
  render();
}

function renderNA(na,naIspm){
  const el=document.getElementById('na-area');

  }

function renderNudge(){
  const el=document.getElementById('nudge-area');
  if(mode==='overwhelmed'){el.innerHTML='';return}
  const nudge=pickNudge();
  el.innerHTML=nudge?`<div class="nudge-strip"><div class="nudge-txt">${esc(nudge)}</div></div>`:'';
}

// ── getVisible ─────────────────────────────────────────────────────────────
function getVisible(){
  const a = items.filter(i => i.status === 'active' && isActionable(i));
  if(mode==='overwhelmed'){
    const slots=[],used=new Set();
    // Slot 1: soonest overdue/due-today obligation
    const ob=a.filter(i=>i.type==='obligation'&&(isOverdue(i.content?.due)||isToday(i.content?.due))).sort((a,b)=>new Date(a.content?.due||0)-new Date(b.content?.due||0));
    if(ob.length){slots.push(ob[0]);used.add(ob[0].id)}
    // Slot 2: most urgent task
    const urg=a.filter(i=>i.type==='task'&&isUrgent(i)&&!used.has(i.id)).sort((a,b)=>{const ao=isOverdue(a.content?.due)?0:1,bo=isOverdue(b.content?.due)?0:1;return ao-bo||new Date(a.content?.due||0)-new Date(b.content?.due||0)});
    if(urg.length&&slots.length<4){slots.push(urg[0]);used.add(urg[0].id)}
    // Slot 3: most important personal
    const imp=a.filter(i=>i.important_personal&&!used.has(i.id)).sort((a,b)=>(b.priority==='high'?1:0)-(a.priority==='high'?1:0));
    if(imp.length&&slots.length<4){slots.push(imp[0]);used.add(imp[0].id)}
    // Slot 4: most overdue routine
    const rtn=a.filter(i=>i.type==='routine'&&routineDue(i)&&!used.has(i.id)).sort((a,b)=>{const an=routineND(a)||'9999',bn=routineND(b)||'9999';return an<bn?-1:1});
    if(rtn.length&&slots.length<4){slots.push(rtn[0]);used.add(rtn[0].id)}
    // Part J fix: backfill to min 3 (or all available if <3) with highest naScore
    if(slots.length<3){
      const remaining=a.filter(i=>!used.has(i.id)&&i.type!=='reflection').sort((a,b)=>naScore(b)-naScore(a));
      for(const r of remaining){
        if(slots.length>=3)break;
        slots.push(r);used.add(r.id);
      }
    }
    return slots;
  }
  const base=a.filter(i=>i.type!=='reflection');
  if(mode==='manage')return[...base,...items.filter(i=>i.status==='done'||i.status==='archived'),...a.filter(i=>i.type==='reflection')];
  return base;
}

function sortItems(arr){const o=i=>{if(i.status==='done'||i.status==='archived')return 10;if(i.important_personal)return 0;if(i.type==='routine'&&routineDue(i))return 1;if(i.type==='obligation'&&isUrgent(i))return 1;if(i.context==='personal')return 2;if(isUrgent(i))return 3;if(i.type==='communication')return 4;if(i.type==='task')return 5;if(i.type==='reflection')return 8;return 6};return[...arr].sort((a,b)=>o(a)-o(b)||new Date(b.created_at)-new Date(a.created_at))}

function renderStream(){
  const el=document.getElementById('stream-area');
  const vis=getVisible();
  if(!vis.length){el.innerHTML=`<div class="empty">🌊 Stream is clear.</div>`;return}
  const sorted=sortItems(vis);
  const sections=[];let curSec=null,curItems=[];
  sorted.forEach(i=>{const sec=i.status==='done'?'done':i.status==='archived'?'archived':i.important_personal?'important':i.type==='routine'?'routine':i.type==='obligation'?'obligation':i.type==='reflection'?'reflection':i.context==='personal'?'personal':isUrgent(i)?'urgent':i.type==='communication'?'inbox':i.type==='task'?'tasks':'ideas';if(sec!==curSec){if(curItems.length)sections.push({sec:curSec,items:[...curItems]});curSec=sec;curItems=[]}curItems.push(i)});
  if(curItems.length)sections.push({sec:curSec,items:curItems});
  const lblMap={important:'Important',routine:'Routines',obligation:'Obligations',reflection:'Reflections',personal:'Personal',urgent:'Urgent',inbox:'Inbox',tasks:'Tasks',ideas:'Ideas',done:'Completed today',archived:'Archived'};
  el.innerHTML=sections.map(({sec,items:grp})=>`<div><div class="slbl">${lblMap[sec]||sec}</div><div class="stream-group">${grp.map(i=>renderCard(i)).join('')}</div></div>`).join('');
}

// ── setMode: clears state, resets override ────────────────────────────────
function setMode(m){
  mode=m;stopOverride=false;continueQuota=0;consecutiveCompletions=0;
  document.querySelectorAll('.mode-opt').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase().startsWith(m)));
  const visibleIds=new Set(getVisible().map(i=>i.id));
  expandedCards=new Set([...expandedCards].filter(id=>visibleIds.has(id)));
  render();
}

// ── focusCard: render in-place without mode switch ────────────────────────
function focusCard(id){
  const exists=items.find(i=>i.id===id);
  if(!exists)return;
  expandedCards.add(id);
  // Check if card is currently in rendered DOM
  const existing=document.getElementById('card-'+id);
  if(!existing){
    // Only switch to manage if truly necessary (not in current visible set)
    const visibleIds=new Set(getVisible().map(i=>i.id));
    if(!visibleIds.has(id)){
      mode='manage';
      document.querySelectorAll('.mode-opt').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase().startsWith('manage')));
      const newVis=new Set(getVisible().map(i=>i.id));
      expandedCards=new Set([...expandedCards].filter(id=>newVis.has(id)));
      expandedCards.add(id);
    }
  }
  render();
  setTimeout(()=>{const el=document.getElementById('card-'+id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--accent)';setTimeout(()=>el.style.outline='none',1600)}},80);
}

// ── Card render ────────────────────────────────────────────────────────────
function renderCard(item){
  const done=item.status==='done'||item.status==='archived';
  const c=item.content||{};
  const ctx=item.context||'work';
  const ov=isOverdue(c.due),tod=isToday(c.due);
  const expanded=expandedCards.has(item.id);
  const lk=actionsLocked||done;
  const isFocus=mode==='focus';

  let wCls='w-normal';
  if(!done){if(ov||(item.type==='obligation'&&(ov||tod)))wCls='w-urgent';else if(item.priority==='high'||tod)wCls='w-high';else if(item.context==='personal'||item.type==='routine')wCls='w-personal'}
  let typeCls='';
  if(item.type==='reflection')typeCls=' type-reflection';
  if(item.type==='routine')typeCls=' type-routine';
  if(item.type==='obligation'&&wCls==='w-urgent')typeCls=' type-obligation';
  const ipCls=item.in_progress&&!done?' in-progress-card':'';

  const sub=()=>{
    if(ov)return`<div class="card-sub urgent">Overdue${c.due?' · '+c.due:''}</div>`;
    if(tod)return`<div class="card-sub urgent">Due today</div>`;
    if(item.type==='routine'){const nd=routineND(item);return`<div class="card-sub">${c.last_completed?'Last: '+c.last_completed:'Not started'}${nd?' · Next: '+nd:''}</div>`}
    if(item.type==='communication')return`<div class="card-sub">${c.category||'Email'} · ${fmt(item.created_at)}</div>`;
    if(item.type==='reflection')return`<div class="card-sub">${fmt(item.created_at)}</div>`;
    if(c.due)return`<div class="card-sub">Due ${c.due}</div>`;
    return'';
  };

  const primaryBtn=()=>{
    if(done)return'';
    if(item.type==='communication')return`<button class="card-act copy ca-lock" onclick="copyReply('${item.id}');event.stopPropagation()" ${lk?'disabled':''}>Copy reply</button>`;
    if(item.type==='routine')return`<button class="card-act routine ca-lock" onclick="completeRoutine('${item.id}');event.stopPropagation()" ${lk?'disabled':''}>Done today</button>`;
    if(item.type==='reflection')return'';
    return`<button class="card-act done ca-lock" onclick="markDone('${item.id}');event.stopPropagation()" ${lk?'disabled':''}>Done</button>`;
  };

  let detail='';
  if(expanded){
    if(item.type==='reflection'){
      detail=`<div class="rfl-body">${esc(c.text||'')}</div>
      <div class="card-detail-actions">
        <button class="ca ca-muted" onclick="keepItem('${item.id}')">Keep</button>
        <button class="ca ca-accent ca-lock" onclick="convertToTask('${item.id}')" ${lk?'disabled':''}>→ Task</button>
        ${!isFocus?`<button class="ca ca-muted ca-lock" onclick="archiveItem('${item.id}')" ${lk?'disabled':''}>Archive</button>`:''}
        ${!isFocus?`<button class="ca ca-danger" onclick="deleteItem('${item.id}')">Delete</button>`:''}
      </div>`;
    }else if(item.type==='communication'){
      const tone=c.tone||'normal';
      detail=`<div class="tone-row"><span class="tlbl">Tone</span>
        <button class="tbtn${tone==='soft'?' on':''}" onclick="setTone('${item.id}','soft')">Soft</button>
        <button class="tbtn${tone==='normal'?' on':''}" onclick="setTone('${item.id}','normal')">Normal</button>
        <button class="tbtn${tone==='firm'?' on':''}" onclick="setTone('${item.id}','firm')">Firm</button>
      </div>
      <div class="reply-wrap"><div class="reply-ey">Suggested reply</div>
        <div class="reply-body" id="rt-${item.id}">${esc(c.reply||'')}</div>
        <textarea class="reply-edit" id="re-${item.id}" style="display:none">${esc(c.reply||'')}</textarea>
      </div>
      <div class="card-detail-actions">
        <button class="ca ca-muted" onclick="toggleEdit('${item.id}')">Edit reply</button>
        <button class="ca ca-muted ca-lock" onclick="markDone('${item.id}')" ${lk?'disabled':''}>Mark done</button>
        ${!isFocus?`<button class="ca ca-danger" onclick="deleteItem('${item.id}')">Delete</button>`:''}
      </div>`;
    }else{
      const focusActions=`
        ${item._editing?`<button class="ca ca-accent ca-lock" onclick="saveIE('${item.id}')" ${lk?'disabled':''}>Save</button><button class="ca ca-muted" onclick="cancelIE('${item.id}')">Cancel</button>`:`<button class="ca ca-muted ca-lock" onclick="startIE('${item.id}')" ${lk?'disabled':''}>Edit</button>`}
        <button class="ca ca-muted ca-lock ca-imp${item.important_personal?' on':''}" onclick="toggleImp('${item.id}')" ${lk?'disabled':''}>${item.important_personal?'🌟 Important':'Mark important'}</button>
        <button class="ca ca-muted ca-lock" onclick="toggleCtx('${item.id}')" ${lk?'disabled':''}>${ctx==='personal'?'→ Work':'→ Personal'}</button>`;
      const manageExtra=!isFocus?`
        ${item.type==='idea'?`<button class="ca ca-accent ca-lock" onclick="convertToTask('${item.id}')" ${lk?'disabled':''}>→ Task</button>`:''}
        ${item.type==='task'||item.type==='obligation'||item.type==='idea'?`<button class="ca ca-muted ca-lock" onclick="archiveItem('${item.id}')" ${lk?'disabled':''}>Archive</button>`:''}
        <button class="ca ca-danger" onclick="deleteItem('${item.id}')">Delete</button>`:'';
      detail=`${item._editing?`<input class="inline-edit" id="ie-${item.id}" value="${esc(c.title||c.text||iTitle(item))}" onkeydown="if(event.key==='Enter')saveIE('${item.id}');if(event.key==='Escape')cancelIE('${item.id}')">`:''}
        <div class="card-detail-actions">${focusActions}${manageExtra}</div>`;
    }
  }

  // Part E: in-progress dot indicator
  const ipDot=item.in_progress&&!done?`<span class="ip-dot" title="In progress"></span>`:'';

  return`<div class="card${done?' done':''}${typeCls} ${wCls}${ipCls}" id="card-${item.id}">
    <div class="card-in" onclick="toggleCardExpand('${item.id}')">
      <div class="card-left">
        <div class="card-title">${esc(iTitle(item))}${item.important_personal&&!done?' 🌟':''}${ipDot}</div>
        ${sub()}
      </div>${primaryBtn()}
    </div>
    ${!done?`<div class="card-detail${expanded?' open':''}"><div style="padding-top:0">${detail}</div></div>`:''}
  </div>`;
}

// ── Part E: expand tracking with in-progress timer ────────────────────────
function toggleCardExpand(id){
  if(expandedCards.has(id)){
    expandedCards.delete(id);
    // Clear in-progress timer if collapsing before threshold
    if(expandTimer&&expandTimer.id===id){
      clearTimeout(expandTimer.t);
      expandTimer=null;
    }
  }else{
    expandedCards.add(id);
    // Start 10s timer to mark in-progress
    if(expandTimer){clearTimeout(expandTimer.t);expandTimer=null}
    expandTimer={
      id,
      t:setTimeout(()=>{
        const i=items.find(x=>x.id===id);
        if(i&&!i.in_progress&&i.status==='active'&&i.type!=='reflection'){
          i.in_progress=true;
          render();
        }
        expandTimer=null;
      },10000)
    };
  }
  resetIdleTimer();
  render();
}

// ── Card actions ───────────────────────────────────────────────────────────
function startIE(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  i._editing=true;
  resetIdleTimer();
  consecutiveCompletions=0; // Reset streak on edit
  render();
  setTimeout(()=>{const e=document.getElementById('ie-'+id);if(e){e.focus();e.select()}},50);
}
function cancelIE(id){const i=items.find(x=>x.id===id);if(i){i._editing=false;render()}}
async function saveIE(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const el=document.getElementById('ie-'+id);if(!el)return;
  const prev={content:{...i.content},effort:i.effort};
  i.content.title=el.value;i._editing=false;i.effort=dEffort(el.value,i.type);
  consecutiveCompletions=0; // Reset streak on edit
  resetIdleTimer();
  render();
  try{await dbUpdate(id,{content:i.content,effort:i.effort});showToast('Saved')}
  catch(e){Object.assign(i,prev);render();showToast('Sync issue — retry')}
}
async function toggleCtx(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  const prev={context:i.context,important_personal:i.important_personal};
  i.context=i.context==='personal'?'work':'personal';if(i.context!=='personal')i.important_personal=false;
  resetIdleTimer();
  render();
  try{await dbUpdate(id,{context:i.context,important_personal:i.important_personal})}
  catch(e){Object.assign(i,prev);render();showToast('Sync issue — retry')}
}
async function toggleImp(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  const prev={important_personal:i.important_personal,context:i.context};
  i.important_personal=!i.important_personal;if(i.important_personal)i.context='personal';
  resetIdleTimer();
  render();
  try{await dbUpdate(id,{important_personal:i.important_personal,context:i.context});showToast(i.important_personal?'Marked important':'Removed')}
  catch(e){Object.assign(i,prev);render();showToast('Sync issue — retry')}
}
function setTone(id,tone){
  const i=items.find(x=>x.id===id);if(!i)return;
  const n=extractName(i.content.full||i.content.preview||''),g=n?`Dear ${n},\n\n`:'Dear valued supporter,\n\n',sign='\n\nWarm regards,\nSPCA Selangor';
  const T={soft:{Neutering:`${g}Thank you for reaching out about neutering. Our subsidised programme, Potong Royong, is available. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}We understand. Intake is on a waiting list. Please share species, breed, age, and a photo.${sign}`,Volunteering:`${g}Thank you! New volunteers complete our Pet Care Programme (PCP) first. Register at [INSERT PCP LINK].${sign}`,Donation:`${g}Your support means everything. Donate at [INSERT DONATION LINK].${sign}`,General:`${g}Thank you for reaching out. We'll respond within 2–3 working days.${sign}`},normal:{Neutering:`${g}Thank you for contacting SPCA Selangor. Our subsidised neutering programme, Potong Royong, is available. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}Thank you. Intake is on a waiting list. Please share species, breed, age, and a photo.${sign}`,Volunteering:`${g}All first-time volunteers complete our Pet Care Programme (PCP) at [INSERT PCP LINK].${sign}`,Donation:`${g}Thank you. Donate via [INSERT DONATION LINK].${sign}`,General:`${g}Thank you. We'll respond within 2–3 working days.${sign}`},firm:{Neutering:`${g}Our subsidised programme, Potong Royong, is slot-based. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}Intake is on a strict waiting list. Provide: species, breed, age, reason, photo.${sign}`,Volunteering:`${g}All volunteers complete PCP first. Register at [INSERT PCP LINK].${sign}`,Donation:`${g}Donate via [INSERT DONATION LINK] only.${sign}`,General:`${g}We respond within 2–3 working days.${sign}`}};
  const prev={tone:i.content.tone,reply:i.content.reply};
  i.content.tone=tone;i.content.reply=(T[tone]||T.normal)[i.content.category]||(T[tone]||T.normal).General;
  const rt=document.getElementById('rt-'+id),re=document.getElementById('re-'+id);
  if(rt)rt.textContent=i.content.reply;if(re)re.value=i.content.reply;
  document.querySelectorAll(`#card-${id} .tbtn`).forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===tone));
  resetIdleTimer();
  dbUpdate(id,{content:i.content}).catch(()=>{i.content.tone=prev.tone;i.content.reply=prev.reply;showToast('Sync issue — retry')});
  showToast('Tone updated');
}
function extractName(text){const m=text.match(/(?:my name is|i am|i'm|from|regards,|sincerely,|cheers,)\s*([A-Z][a-z]+(?: [A-Z][a-z]+)?)/i);if(m)return m[1];for(const l of text.split('\n').slice(-5)){const nm=l.trim().match(/^([A-Z][a-z]+(?: [A-Z][a-z]+)?)$/);if(nm&&nm[1].length<30)return nm[1]}return null}
function toggleEdit(id){const te=document.getElementById('rt-'+id),ee=document.getElementById('re-'+id);if(!te||!ee)return;if(ee.style.display==='none'){ee.style.display='block';te.style.display='none'}else{const v=ee.value;te.textContent=v;ee.style.display='none';te.style.display='block';const i=items.find(x=>x.id===id);if(i){const prev=i.content.reply;i.content.reply=v;dbUpdate(id,{content:i.content}).catch(()=>{i.content.reply=prev;showToast('Sync issue — retry')})}}}
function copyReply(id){const i=items.find(x=>x.id===id);if(!i)return;navigator.clipboard.writeText(i.content?.reply||'').catch(()=>{const ta=document.createElement('textarea');ta.value=i.content?.reply||'';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});resetIdleTimer();showToast('Reply copied')}

async function markDone(id){
  if(!requireSession())return;
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  const prev=JSON.parse(JSON.stringify(items[idx]));
  const ts=new Date().toISOString();
  const eff=items[idx].effort||'medium';
  if(eff==='low')bMem.low++;else if(eff==='medium')bMem.med++;else bMem.high++;
  items[idx].status='done';items[idx].completed_at=ts;
  expandedCards.delete(id);

  // Part C: increment streak
  consecutiveCompletions++;
  resetIdleTimer();

  // Part G: controlled continuation decrement
    if(stopOverride&&continueQuota>0){
    continueQuota--;
    if(continueQuota<=0){
      stopOverride=false;
      continueQuota=0;
    }
  }

  stopOverride=stopOverride&&continueQuota>0; // Recalculate
  render();
  try{await dbUpdate(id,{status:'done',completed_at:ts});saveBMem()}
  catch(e){
    if(eff==='low'&&bMem.low>0)bMem.low--;else if(eff==='medium'&&bMem.med>0)bMem.med--;else if(bMem.high>0)bMem.high--;
    consecutiveCompletions=Math.max(0,consecutiveCompletions-1);
    items[idx]=prev;render();showToast('Sync issue — retry');return;
  }
  showUndo(id,prev);
  setTimeout(()=>{renderNA(pickNA(),((na,pm)=>na&&pm&&na.id===pm.id)(pickNA(),pickPM()));renderPersonalAnchor(pickPM(),pickNA())},300);
}

async function completeRoutine(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  const prev={content:{...i.content},completed_at:i.completed_at};
  i.content.last_completed=todayStr;i.completed_at=new Date().toISOString();
  consecutiveCompletions++;
  resetIdleTimer();
  if(stopOverride&&continueQuota>0){continueQuota--;if(continueQuota<=0){stopOverride=false;continueQuota=0}}
  render();showToast('Routine done ✓');
  try{await dbUpdate(id,{content:i.content,completed_at:i.completed_at})}
  catch(e){i.content=prev.content;i.completed_at=prev.completed_at;consecutiveCompletions=Math.max(0,consecutiveCompletions-1);render();showToast('Sync issue — retry')}
}

async function keepItem(id){const i=items.find(x=>x.id===id);if(!i)return;const prev={reviewed_at:i.reviewed_at};const ts=new Date().toISOString();i.reviewed_at=ts;try{await dbUpdate(id,{reviewed_at:ts});expandedCards.delete(id);render();showToast('Kept')}catch(e){i.reviewed_at=prev.reviewed_at;render();showToast('Sync issue — retry')}}

async function archiveItem(id){
  if(!requireSession())return;
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  const prev=items[idx].status;
  items[idx].status='archived';expandedCards.delete(id);resetIdleTimer();render();
  try{await dbUpdate(id,{status:'archived'});showToast('Archived')}
  catch(e){items[idx].status=prev;render();showToast('Sync issue — retry')}
}

async function convertToTask(id){
  if(!requireSession())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  const txt=i.content.text||i.content.title||'Task from idea';
  try{const saved=await dbSave({type:'task',content:{title:txt,due:''},priority:'medium',context:i.context||'work',important_personal:i.important_personal||false,effort:dEffort(txt,'task'),status:'active',created_at:new Date().toISOString()});if(saved){items.unshift(enrich(saved));stopOverride=false;continueQuota=0;consecutiveCompletions=0;await markDone(id);render();showToast('Converted to task')}}catch(e){}
}
async function createFolder(name, parentId=null){
  if(!requireSession()) return;

  const now = new Date().toISOString();

  const folder = {
    name,
    node_type: 'folder',
    parent_id: parentId,
    status: 'active',
    created_at: now,
    context: 'work',
    priority: 'low',
    effort: 'low',
    important_personal: false
  };

  try{
    const saved = await dbSave(folder);
    if(saved){
      items.unshift(enrich(saved));
      render();
      return saved;
    }
  }catch(e){
    showToast('Failed to create folder');
  }
}
async function deleteItem(id){
  if(!confirm('Delete permanently?'))return;
  const snapshot=[...items];
  items=items.filter(i=>i.id!==id);expandedCards.delete(id);resetIdleTimer();render();
  try{await dbDelete(id);showToast('Deleted')}
  catch(e){items=snapshot;render();showToast('Sync issue — retry')}
}

function showUndo(id,prev){clearTimeout(undoTimer);undoStack={id,prev};document.getElementById('undo-bar').classList.add('show');undoTimer=setTimeout(()=>{document.getElementById('undo-bar').classList.remove('show');undoStack=null},5000)}
async function undoDone(){
  if(!undoStack)return;
  const{id,prev}=undoStack;const idx=items.findIndex(i=>i.id===id);
  if(idx>=0){
    const eff=items[idx].effort||'medium';if(eff==='low'&&bMem.low>0)bMem.low--;else if(eff==='medium'&&bMem.med>0)bMem.med--;else if(bMem.high>0)bMem.high--;
    consecutiveCompletions=Math.max(0,consecutiveCompletions-1);
    items[idx]=prev;
    try{await dbUpdate(id,{status:'active',completed_at:null});saveBMem();render();showToast('Undone')}
    catch(e){render();showToast('Sync issue — retry')}
  }
  document.getElementById('undo-bar').classList.remove('show');undoStack=null;clearTimeout(undoTimer);
}

// ── Capture ────────────────────────────────────────────────────────────────
function onCapIn(){if(ovr)return;const val=document.getElementById('cap-in').value,det=dType(val),sugCtx=val.length>2?dCtx(val):null,el=document.getElementById('detect-hint');if(!det){el.innerHTML='What needs to happen?';return}const lbl={task:'Task',idea:'Idea',reflection:'Reflection',obligation:'Obligation',routine:'Routine',communication:'Email'};el.innerHTML=`<span>${lbl[det]||det} detected</span>${sugCtx==='personal'?' · Personal?':''}`;const fw=document.getElementById('freq-w');if(fw)fw.style.display=(det==='routine'||det==='obligation')?'block':'none';if(sugCtx&&sugCtx!==capCtx)setCtx(sugCtx)}
function setOvr(type,btn){ovr=type===ovr?null:type;document.querySelectorAll('.sc:not(#ctx-work):not(#ctx-personal)').forEach(b=>b.classList.remove('on'));if(ovr)btn.classList.add('on');const fw=document.getElementById('freq-w');if(fw)fw.style.display=(ovr==='routine'||ovr==='obligation')?'block':'none';const el=document.getElementById('detect-hint');if(ovr){const lbl={task:'Task',idea:'Idea',reflection:'Reflection',obligation:'Obligation',routine:'Routine',communication:'Email'};el.innerHTML=`<span>Set to: ${lbl[ovr]}</span>`}else onCapIn()}
function setCtx(ctx){capCtx=ctx;document.getElementById('ctx-work').className='sc'+(ctx==='work'?' on':'');document.getElementById('ctx-personal').className='sc ctx-p'+(ctx==='personal'?' on':'')}
function toggleAdv(){const b=document.getElementById('sheet-adv'),btn=document.getElementById('adv-btn');const open=b.classList.toggle('open');btn.textContent=(open?'▾':'▸')+' Options'}
function openSheet(){
  if(!requireSession())return;
  document.getElementById('sheet-bg').classList.add('open');
  ovr=null;capCtx='work';document.querySelectorAll('.sc').forEach(b=>b.classList.remove('on'));setCtx('work');
  document.getElementById('detect-hint').innerHTML='What needs to happen?';
  document.getElementById('sheet-adv').classList.remove('open');document.getElementById('adv-btn').textContent='▸ Options';
  document.getElementById('cap-in').value='';document.getElementById('cap-due').value='';document.getElementById('cap-freq').value='';document.getElementById('cap-pri').value='medium';
  const fw=document.getElementById('freq-w');if(fw)fw.style.display='none';
  setTimeout(()=>document.getElementById('cap-in').focus(),80);
}
function closeSheet(){document.getElementById('sheet-bg').classList.remove('open')}
function bgClick(e){if(e.target===document.getElementById('sheet-bg'))closeSheet()}

async function submitCap(){
  if(!requireSession())return;
  const txt=document.getElementById('cap-in').value.trim();if(!txt){showToast('Type something first');return}
  const type=ovr||dType(txt)||'idea',pri=document.getElementById('cap-pri').value||'medium',ctx=capCtx||'work';
    const due=document.getElementById('cap-due').value,freq=document.getElementById('cap-freq').value;
  const effort=dEffort(txt,type),impP=ctx==='personal'&&dImp(txt),now=new Date().toISOString();

  let item={
    status:'active',
    created_at:now,
    context:ctx,
    priority:pri,
    effort,
    important_personal:impP,
    node_type:'item',
    parent_id:currentFolderId
  };
  if(type==='communication'){const s=txt.toLowerCase();let sc=0,cat='General';if(/neuter|mandul|spay|castrat|potong/.test(s)){cat='Neutering';sc=2}else if(/surrender|rehome|re-home|give up/.test(s)){cat='Surrender';sc=2}else if(/volunteer|volunteering/.test(s)){cat='Volunteering';sc=2}else if(/donat|contribut|fund/.test(s)){cat='Donation';sc=2}const n=extractName(txt),g=n?`Dear ${n},\n\n`:'Dear valued supporter,\n\n',sign='\n\nWarm regards,\nSPCA Selangor';const replies={Neutering:`${g}Thank you for contacting SPCA Selangor. Our subsidised neutering programme, Potong Royong, is available. Register at [INSERT POTONG ROYONG LINK].${sign}`,Surrender:`${g}Thank you. Intake is on a waiting list. Please share species, breed, age, and a photo.${sign}`,Volunteering:`${g}All first-time volunteers complete our Pet Care Programme (PCP) at [INSERT PCP LINK].${sign}`,Donation:`${g}Thank you. Donate via [INSERT DONATION LINK].${sign}`,General:`${g}Thank you for reaching out. We'll respond within 2–3 working days.${sign}`};item={...item,type:'communication',content:{preview:txt.replace(/\s+/g,' ').slice(0,300),category:cat,confidence:sc>=2?'medium':'low',reply:replies[cat]||replies.General,full:txt,tone:'normal'}}}
  else if(type==='task')item={...item,type:'task',content:{title:txt,due}}
  else if(type==='reflection')item={...item,type:'reflection',context:'personal',content:{text:txt}}
  else if(type==='obligation')item={...item,type:'obligation',context:ctx,content:{title:txt,due,frequency:freq||null}}
  else if(type==='routine')item={...item,type:'routine',context:'personal',content:{title:txt,frequency:freq||'weekly',last_completed:null}}
  else item={...item,type:'idea',content:{text:txt}}
  document.getElementById('save-btn').disabled=true;
  // Part G/H: reset override on new item
  stopOverride=false;continueQuota=0;consecutiveCompletions=0;
  try{const saved=await dbSave(item);if(saved){items.unshift(enrich(saved));render();closeSheet();showToast('Saved')}}catch(e){}
  document.getElementById('save-btn').disabled=false;
}

let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000)}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSheet()}});
bootstrap();
</script>
